id}\" style=\"background:transparent;border:1px solid #e0c9c5;color:var(--red);width:100%;margin-top:10px;padding:12px\">Delete transaction<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#et-amt');if(i)setTimeout(()=>{i.focus();i.select();},30);\n}\nfunction submitEditTx(id){\n  const t=State.transactions.find(x=>x.id===id);if(!t){closeModal();return;}\n  if(t.type==='adjustment'){\n    t.amount=Math.round(Number(String((($('#et-amt')||{}).value)||'').replace(/,/g,''))||0);\n  }else{\n    const amt=parseAmt(($('#et-amt')||{}).value);\n    if(amt<=0){toast('Enter an amount');return;}\n    t.amount=amt;\n  }\n  const date=($('#et-date')||{}).value||t.date;t.date=date;t.cid=cycleIdOfDate(parseD(date));\n  t.note=($('#et-note')||{}).value||'';\n  const cat=$('#et-cat');if(cat&&(t.type==='expense'||t.type==='cc_charge')){const v=cat.value.trim();if(v)t.category=v;}\n  const fromEl=$('#et-from');if(fromEl&&(t.type==='expense'||t.type==='transfer'||t.type==='cc_payment'))t.from=fromEl.value;\n  const toEl=$('#et-to');if(toEl&&(t.type==='income'||t.type==='transfer'||t.type==='cc_charge'||t.type==='cc_payment'||t.type==='adjustment'))t.to=toEl.value;\n  if(t.type==='transfer'&&t.from===t.to){toast('Pick two different accounts');return;}\n  const excEl=$('#et-exclude');\n  if(excEl)t.exclude=excEl.checked;\n  save();closeModal();toast('Transaction updated');\n}\n\n/* ---- in-app input sheets (replace native prompt() gray boxes) ---- */\nfunction openAddCat(cid,type){\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">New ${esc(type)} category<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:18px\">Name this envelope — set its planned amount right after in the budget list.<\u002Fdiv>\n    <div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Category name<\u002Fdiv>\n    <input id=\"addcat-name\" type=\"text\" class=\"seamless-text\" placeholder=\"e.g. Gym membership\" style=\"margin-bottom:22px\">\n    <button class=\"btn btn-pri\" data-action=\"submit-add-cat\" data-cid=\"${cid}\" data-type=\"${esc(type)}\">Add category<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#addcat-name');if(i)setTimeout(()=>i.focus(),30);\n}\nfunction submitAddCat(cid,type){\n  const name=(($('#addcat-name')||{}).value||'').trim();\n  if(!name){toast('Enter a category name');return;}\n  (State.budgets[cid]||(State.budgets[cid]=[])).push({id:uid('b'),type,category:name,planned:0});\n  save();closeModal();toast('Category added');\n}\nfunction openAddDebt(){\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Add debt / IOU<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:18px\">A personal loan or money you owe someone — kept out of your card totals.<\u002Fdiv>\n    <div class=\"stack\" style=\"gap:16px;margin-bottom:22px\">\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Who do you owe?<\u002Fdiv><input id=\"adddebt-name\" type=\"text\" class=\"seamless-text\" placeholder=\"e.g. UOB 2672, Mom\"><\u002Fdiv>\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Note (optional)<\u002Fdiv><input id=\"adddebt-note\" type=\"text\" class=\"seamless-text\" placeholder=\"e.g. Personal loan\"><\u002Fdiv>\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Balance owed (VND)<\u002Fdiv><input id=\"adddebt-bal\" type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" placeholder=\"0\"><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"submit-add-debt\">Add debt<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#adddebt-name');if(i)setTimeout(()=>i.focus(),30);\n}\nfunction submitAddDebt(){\n  const name=(($('#adddebt-name')||{}).value||'').trim();\n  if(!name){toast('Enter who you owe');return;}\n  const note=(($('#adddebt-note')||{}).value||'').trim();\n  const bal=Math.max(0,parseAmt(($('#adddebt-bal')||{}).value));\n  State.separateDebts.push({id:uid('debt'),name,note,balance:bal});\n  save();closeModal();toast('Debt added');\n}\nfunction openAddPerson(){\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Add person<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:18px\">Someone who owes you money. Tracked in Net Worth but excluded from Safe-to-Spend until repaid.<\u002Fdiv>\n    <div class=\"stack\" style=\"gap:16px;margin-bottom:22px\">\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Who owes you?<\u002Fdiv><input id=\"addperson-name\" type=\"text\" class=\"seamless-text\" placeholder=\"e.g. Minh\"><\u002Fdiv>\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Amount owed (VND)<\u002Fdiv><input id=\"addperson-bal\" type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" placeholder=\"0\"><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"submit-add-person\">Add person<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#addperson-name');if(i)setTimeout(()=>i.focus(),30);\n}\nfunction submitAddPerson(){\n  const name=(($('#addperson-name')||{}).value||'').trim();\n  if(!name){toast('Enter a name');return;}\n  const bal=Math.max(0,parseAmt(($('#addperson-bal')||{}).value));\n  State.accounts.push({id:uid('acc'),name,type:'Receivable',start:bal,inCurrent:false,inNet:true,updated:isoD(new Date())});\n  save();closeModal();toast('Person added');\n}\nfunction openEditPerson(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc)return;\n  const cur=Math.max(0,Math.round(accountBalance(acc)));\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:18px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Edit person<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:16px;margin-bottom:22px\">\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Name<\u002Fdiv><input id=\"editperson-name\" type=\"text\" class=\"seamless-text\" value=\"${esc(acc.name)}\"><\u002Fdiv>\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Amount they owe you (VND)<\u002Fdiv><input id=\"editperson-bal\" type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" value=\"${groupNum(String(cur))}\"><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"submit-edit-person\" data-id=\"${id}\">Save changes<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#editperson-name');if(i)setTimeout(()=>i.focus(),30);\n}\nfunction submitEditPerson(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc){closeModal();return;}\n  const nm=(($('#editperson-name')||{}).value||'').trim();if(nm)acc.name=nm;\n  const cur=Math.round(accountBalance(acc));\n  const amt=Math.max(0,parseAmt(($('#editperson-bal')||{}).value));\n  acc.start+=amt-cur;\n  save();closeModal();toast('Updated');\n}\nfunction openSettle(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc)return;\n  const bal=Math.max(0,Math.round(accountBalance(acc)));\n  if(bal<=0){toast('Already settled');return;}\n  const cashAccts=State.accounts.filter(a=>a.id!==id&&a.type!=='Receivable');\n  const defDest=(cashAccts.find(a=>a.inCurrent&&(a.type==='Cash'||a.type==='Bank'))||cashAccts.find(a=>a.type==='Cash'||a.type==='Bank')||cashAccts.find(a=>a.inCurrent)||cashAccts[0]||{}).id;\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Record repayment<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:16px\"><b>${esc(acc.name)}<\u002Fb> owes you <b class=\"mono\">${fmt(bal)}<\u002Fb>. Log the full amount or a partial installment.<\u002Fdiv>\n    <div style=\"text-align:center;margin-bottom:14px\"><input id=\"settle-amt\" type=\"text\" inputmode=\"numeric\" value=\"${groupNum(String(bal))}\" class=\"mono amt-fmt\" style=\"border:none;text-align:center;font-weight:500;font-size:40px;color:var(--ink2);padding:0;width:100%\"><div style=\"font-size:11px;color:var(--faint)\">VND<\u002Fdiv><\u002Fdiv>\n    <div id=\"settle-chips\" style=\"display:flex;gap:8px;margin-bottom:16px\">\n      <div class=\"chip\" data-settle-quick=\"${Math.round(bal/2)}\" style=\"flex:1;text-align:center\">Half<\u002Fdiv>\n      <div class=\"chip on\" data-settle-quick=\"${bal}\" style=\"flex:1;text-align:center\">Full<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Pay into<\u002Fdiv>\n    <select id=\"settle-dest\" style=\"margin-bottom:16px\">${cashAccts.length?cashAccts.map(a=>`<option value=\"${a.id}\" ${a.id===defDest?'selected':''}>${esc(a.name)}<\u002Foption>`).join(''):`<option value=\"\" disabled selected>Add a cash or bank account first<\u002Foption>`}<\u002Fselect>\n    <button class=\"btn btn-pri\" data-action=\"submit-settle\" data-id=\"${id}\">Confirm repayment<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#settle-amt');if(i)setTimeout(()=>{i.focus();i.select();},30);\n}\nfunction submitSettle(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc){closeModal();return;}\n  const bal=Math.max(0,Math.round(accountBalance(acc)));\n  const paid=Math.min(bal,parseAmt(($('#settle-amt')||{}).value));\n  if(paid<=0){toast('Enter an amount');return;}\n  const dest=($('#settle-dest')||{}).value;\n  if(!dest){toast('Add a cash or bank account first');return;}\n  State.transactions.unshift({id:uid('t'),date:isoD(new Date()),cid:currentCycleId(),type:'transfer',from:acc.id,to:dest,category:'Transfer',note:'Repayment \\u2014 '+acc.name,amount:paid});\n  save();closeModal();toast('Received '+fmt(paid));\n}\nfunction openRenameCat(cid,id){\n  const it=(State.budgets[cid]||[]).find(b=>b.id===id);if(!it)return;\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Rename category<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:18px\">Renaming also updates this label across your transaction history, keeping your ledger consistent.<\u002Fdiv>\n    <div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Category name<\u002Fdiv>\n    <input id=\"rencat-name\" type=\"text\" class=\"seamless-text\" value=\"${esc(it.category)}\" style=\"margin-bottom:22px\">\n    <button class=\"btn btn-pri\" data-action=\"submit-rename-cat\" data-cid=\"${cid}\" data-id=\"${id}\">Save name<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#rencat-name');if(i)setTimeout(()=>{i.focus();i.select();},30);\n}\nfunction submitRenameCat(cid,id){\n  const it=(State.budgets[cid]||[]).find(b=>b.id===id);if(!it){closeModal();return;}\n  const oldName=it.category;\n  const newName=(($('#rencat-name')||{}).value||'').trim();\n  if(!newName){toast('Enter a name');return;}\n  if(newName!==oldName){it.category=newName;State.transactions.forEach(t=>{if(t.category===oldName)t.category=newName;});save();closeModal();toast('Category renamed');}\n  else{closeModal();}\n}\n\n/* ============================================================ EVENTS ============================================================ */\ndocument.addEventListener('click',e=>{\n  // quick-log chip / type (no re-render — keep keyboard)\n  const chip=e.target.closest('[data-logcat]');if(chip){document.querySelectorAll('#log-chips .chip').forEach(c=>c.classList.toggle('on',c===chip));logDraft.category=chip.dataset.logcat;const csel=$('#log-category');if(csel)csel.value=chip.dataset.logcat;const amt=$('#log-amt');if(amt)amt.focus();return;}\n  const seg=e.target.closest('[data-logtype]');if(seg){applyLogType(seg.dataset.logtype);return;}\n  const pq=e.target.closest('[data-pay-quick]');if(pq){const a=$('#pay-amt');if(a){a.value=groupNum(String(pq.dataset.payQuick));a.focus();}document.querySelectorAll('#pay-chips .chip').forEach(c=>c.classList.toggle('on',c===pq));return;}\n  const sq=e.target.closest('[data-settle-quick]');if(sq){const a=$('#settle-amt');if(a){a.value=groupNum(String(sq.dataset.settleQuick));a.focus();}document.querySelectorAll('#settle-chips .chip').forEach(c=>c.classList.toggle('on',c===sq));return;}\n  const el=e.target.closest('[data-action]');if(!el)return;\n  const a=el.dataset.action;\n  switch(a){\n    case 'tab':UI.tab=el.dataset.tab;historyRenderLimit=50;render();$('#scroll').scrollTop=0;break;\n    case 'load-more-history':historyRenderLimit+=50;render();break;\n    case 'open-log':openLog();break;\n    case 'open-settings':openSettings();break;\n    case 'close-modal':closeModal();break;\n    case 'cycle':UI.viewCycle=shiftCycle(UI.viewCycle,+el.dataset.d);historyRenderLimit=50;render();break;\n    case 'pay':openPay(el.dataset.id);break;\n    case 'undo-pay':{const tx=State.transactions.find(t=>t.type==='cc_payment'&&t.to===el.dataset.id&&t.cid===currentCycleId());if(tx){if(confirm('Undo this payment?'))delTx(tx.id);}else{toast('Payment not found');}break;}\n    case 'force-sync':{if(SYNC_URL){toast('Syncing to cloud...');save();}else{toast('Cloud sync only works when deployed to Google Apps Script');}break;}\n    case 'create-budget':createBudget();break;\n    case 'del-tx':if(confirm('Delete this transaction?'))delTx(el.dataset.id);break;\n    case 'edit-tx':openEditTx(el.dataset.id);break;\n    case 'submit-edit-tx':submitEditTx(el.dataset.id);break;\n    case 'reset':resetData();closeModal();break;\n    case 'start-fresh':{if(!confirm('WARNING: This will delete ALL transactions and reset account/card balances to 0. Your categories and setup will remain. Proceed?'))break;State.transactions=[];State.accounts.forEach(a=>a.start=0);State.cards.forEach(c=>c.start=0);State.installments=[];State.separateDebts=[];State.savingsPlan={};UI.viewCycle=currentCycleId();save();closeModal();toast('App reset to Day 1');break;}\n    case 'export-csv':exportCSV();break;\n    case 'archive-data':{\n      if(!confirm('Archive transactions older than 90 days? Their balances will be permanently merged into your accounts/cards starting balances to speed up the app.'))break;\n      const cutoff=isoD(new Date(Date.now()-90*86400000));\n      const oldTxs=State.transactions.filter(t=>t.date<cutoff);\n      const newTxs=State.transactions.filter(t=>t.date>=cutoff);\n      if(!oldTxs.length){toast('No old data to archive');break;}\n      State.accounts.forEach(a=>{let b=a.start;for(const t of oldTxs){if(t.type==='income'&&t.to===a.id)b+=t.amount;else if(t.type==='expense'&&t.from===a.id)b-=t.amount;else if(t.type==='transfer'){if(t.from===a.id)b-=t.amount;if(t.to===a.id)b+=t.amount;}else if(t.type==='cc_payment'&&t.from===a.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===a.id)b+=t.amount;}a.start=b;});\n      State.cards.forEach(c=>{let b=c.start;for(const t of oldTxs){if(t.type==='cc_charge'&&t.to===c.id)b+=t.amount;else if(t.type==='cc_payment'&&t.to===c.id)b-=t.amount;}c.start=b;});\n      exportCSV();alert('A CSV backup has been downloaded before archiving.');\n      State.transactions=newTxs;\n      save();render();toast(`Archived ${oldTxs.length} transactions`);\n      break;\n    }\n    case 'reconcile':openReconcile(el.dataset.id);break;\n    case 'toggle':{const o=State.accounts.find(x=>x.id===el.dataset.id);if(o){o[el.dataset.f]=!o[el.dataset.f];save();render();}break;}\n    case 'submit-log':submitLog();break;\n    case 'submit-pay':submitPay();break;\n    case 'toggle-split':toggleSplit();break;\n    case 'toggle-fx':toggleFx();break;\n    case 'submit-reconcile':submitReconcile();break;\n    case 'add-acc':{const a={id:uid('acc'),name:'New account',type:'Bank',start:0,inCurrent:true,inNet:true,updated:isoD(new Date())};State.accounts.push(a);save();UI.tab='accounts';openEditAcc(a.id);break;}\n    case 'edit-acc':openEditAcc(el.dataset.id);break;\n    case 'del-acc':{const hasHistory=State.transactions.some(t=>t.from===el.dataset.id||t.to===el.dataset.id);if(hasHistory){alert('Cannot delete: This account has transaction history. Please rename it, or Archive old data first.');break;}if(confirm('Remove account?')){State.accounts=State.accounts.filter(x=>x.id!==el.dataset.id);save();UI.tab='accounts';closeModal();}break;}\n    case 'add-card':{const c={id:uid('card'),name:'New card',start:0,apr:0.35,statementDay:1,graceDays:15,minPayPct:0.05};State.cards.push(c);save();UI.tab='accounts';openEditCard(c.id);break;}\n    case 'edit-card':openEditCard(el.dataset.id);break;\n    case 'del-card':{const hasHistory=State.transactions.some(t=>t.from===el.dataset.id||t.to===el.dataset.id);if(hasHistory){alert('Cannot delete: This card has transaction history. Please rename it, or Archive old data first.');break;}if(confirm('Remove card?')){State.cards=State.cards.filter(x=>x.id!==el.dataset.id);save();UI.tab='accounts';closeModal();}break;}\n    case 'add-installment':UI.tab='accounts';openInstallment(null);break;\n    case 'edit-installment':UI.tab='accounts';openInstallment(el.dataset.id);break;\n    case 'submit-installment':submitInstallment(el.dataset.id);break;\n    case 'del-installment':if(confirm('Remove this installment plan?')){State.installments=State.installments.filter(x=>x.id!==el.dataset.id);save();UI.tab='accounts';closeModal();}break;\n    case 'add-goal':{const name=(prompt('Goal name?','New goal')||'').trim();if(!name)break;const target=parseAmt(prompt('Target amount (VND)?','10000000')||'0')||10000000;const g={id:uid('g'),name:name,target:target,current:0,monthly:1000000,priority:'Medium'};State.goals.push(g);if(!State.savingsPlan[UI.viewCycle])State.savingsPlan[UI.viewCycle]={};State.savingsPlan[UI.viewCycle][g.id]=g.monthly;if(!State.accounts.find(a=>a.type==='Savings'&&a.name===name)){State.accounts.push({id:uid('a'),name:name,type:'Savings',start:0,inCurrent:false,inNet:true,updated:isoD(new Date())});}save();render();toast('Goal added');break;}\n    case 'del-goal':State.goals=State.goals.filter(x=>x.id!==el.dataset.id);save();render();break;\n    case 'add-cat':openAddCat(el.dataset.cid,el.dataset.type);break;\n    case 'submit-add-cat':submitAddCat(el.dataset.cid,el.dataset.type);break;\n    case 'edit-cat':openRenameCat(el.dataset.cid,el.dataset.id);break;\n    case 'submit-rename-cat':submitRenameCat(el.dataset.cid,el.dataset.id);break;\n    case 'del-cat':if(confirm('Delete category? Past transactions will lose this label.')){State.budgets[el.dataset.cid]=(State.budgets[el.dataset.cid]||[]).filter(b=>b.id!==el.dataset.id);save();render();toast('Category removed');}break;\n    case 'del-debt':if(confirm('Remove this debt?')){State.separateDebts=State.separateDebts.filter(x=>x.id!==el.dataset.id);save();render();toast('Debt removed');}break;\n    case 'add-debt':openAddDebt();break;\n    case 'submit-add-debt':submitAddDebt();break;\n    case 'add-person':openAddPerson();break;\n    case 'submit-add-person':submitAddPerson();break;\n    case 'del-person':{const hasHistory=State.transactions.some(t=>t.from===el.dataset.id||t.to===el.dataset.id);if(hasHistory){alert('Cannot delete: This person has transaction history. Please rename it, or Archive old data first.');break;}if(confirm('Remove this person?')){State.accounts=State.accounts.filter(x=>x.id!==el.dataset.id);save();render();toast('Removed');}break;}\n    case 'edit-person':openEditPerson(el.dataset.id);break;\n    case 'submit-edit-person':submitEditPerson(el.dataset.id);break;\n    case 'settle':openSettle(el.dataset.id);break;\n    case 'submit-settle':submitSettle(el.dataset.id);break;\n  }\n});\n\n// live select changes in quick log (no full re-render)\ndocument.addEventListener('change',e=>{\n  const el=e.target;\n  if(el.id==='log-method'){logDraft.method=el.value;updateCcNote();const amt=$('#log-amt');if(amt)amt.focus();return;}\n  if(el.id==='log-to'){logDraft.toId=el.value;return;}\n  if(el.id==='log-date'){logDraft.date=el.value;return;}\n  if(el.id==='fx-currency'){fetchFxRate();return;}\n  if(el.id==='log-category'){logDraft.category=el.value;document.querySelectorAll('#log-chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.logcat===el.value));return;}\n  // settings binds\n  const bind=el.dataset.bind;if(!bind)return;\n  const id=el.dataset.id,f=el.dataset.f;\n  let val=el.type==='checkbox'?el.checked:el.value;\n  if(el.classList.contains('amt-fmt')){val=Number(String(val).replace(/,/g,''))||0;}\n  else if(el.type==='number'){val=Number(val)||0;} // fallback for APR\n  if(bind==='acc'){const o=State.accounts.find(x=>x.id===id);if(o)o[f]=val;}\n  else if(bind==='card'){const o=State.cards.find(x=>x.id===id);if(o){if(f==='aprPct')o.apr=Math.max(0,Number(val)||0)/100;else if(f==='minPayPctPct')o.minPayPct=Math.max(0,Number(val)||0)/100;else if(f==='statementDay')o.statementDay=Math.min(28,Math.max(1,Number(val)||1));else if(f==='graceDays')o.graceDays=Math.max(0,Number(val)||0);else o[f]=val;}}\n  else if(bind==='goal'){const o=State.goals.find(x=>x.id===id);if(o){if(f==='name'){const oldName=o.name;o.name=val;const linkedAcc=State.accounts.find(a=>a.type==='Savings'&&a.name===oldName);if(linkedAcc)linkedAcc.name=val;}else if(f==='target'||f==='current')o[f]=Math.max(0,Number(val)||0);else o[f]=val;}}\n  else if(bind==='setting'){State.settings[f]=Math.min(28,Math.max(1,Number(val)||SALARY_DAY_DEFAULT));}\n  save();\n  if(bind==='setting'){UI.viewCycle=currentCycleId();render();}\n  else if(bind==='goal'&&UI.tab==='goals')render();\n});\n\n// as-you-type currency grouping for amount inputs (Quick Log, Pay, Reconcile, FX)\ndocument.addEventListener('input',e=>{\n  const el=e.target;\n  if(el.id==='hist-search'){const q=el.value.toLowerCase();document.querySelectorAll('.tx-item').forEach(row=>{row.style.display=row.innerText.toLowerCase().includes(q)?'flex':'none';});return;}\n  if(!el.classList||!el.classList.contains('amt-fmt'))return;\n  formatAmtInput(el);\n  if((el.id==='log-amt'||el.id==='fx-rate')&&logDraft&&logDraft.fx)updateFx();\n  if(logDraft&&logDraft.split)updateSplit();\n});\n// editable planned amounts — live, focus-preserving\ndocument.addEventListener('input',e=>{\n  const el=e.target;if(!el.dataset.plan)return;\n  const cid=el.dataset.cid,kind=el.dataset.plan,key=el.dataset.key;const val=Math.round(Number(String(el.value).replace(/,/g,''))||0);\n  if(kind==='saving'){if(!State.savingsPlan[cid])State.savingsPlan[cid]={};State.savingsPlan[cid][key]=Math.max(0,val);}\n  else{const it=(State.budgets[cid]||[]).find(b=>b.id===key);if(it)it.planned=Math.max(0,val);}\n  save();refreshBudgetNumbers();\n});\n// clamp debt floor on blur\ndocument.addEventListener('blur',e=>{\n  const el=e.target;if(!el.dataset||el.dataset.plan!=='debt')return;\n  const floor=Number(el.dataset.floor)||0;const currentVal=Number(String(el.value).replace(/,/g,''))||0;if(currentVal<floor){const it=(State.budgets[el.dataset.cid]||[]).find(b=>b.id===el.dataset.key);if(it){it.planned=floor;save();}el.value=groupNum(String(floor));refreshBudgetNumbers();toast('Debt plan can\\u2019t go below the minimums floor');}\n},true);\n\n// desktop keyboard: Enter = confirm primary action, Esc = close (only while a sheet is open)\ndocument.addEventListener('keydown',e=>{\n  if(!$('#modal').classList.contains('show'))return;\n  if(e.key==='Escape'){e.preventDefault();closeModal();return;}\n  if(e.key==='Enter'){\n    const t=e.target;\n    if(t&&(t.tagName==='TEXTAREA'||t.tagName==='SELECT'))return; // let these handle Enter natively\n    const btn=document.querySelector('#modal .sheet .btn-pri[data-action]');\n    if(btn){e.preventDefault();btn.click();}\n  }\n});\n\n/* ---------- init ---------- */\nload();\nmigrateState();\nUI.viewCycle=currentCycleId();\nrender();\nloadCloud();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
