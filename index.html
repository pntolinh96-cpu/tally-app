            writer.close();

family:ui-monospace,'SF Mono',SFMono-Regular,Consolas,monospace;font-size:13.5px;font-weight:500;color:var(--ink2);text-align:right;border:none;border-bottom:1px solid transparent;background:transparent;border-radius:0;padding:4px 0;width:100%;outline:none;transition:border-color 0.2s;}\n  .seamless-input:focus{border-bottom-color:var(--green);}\n  .seamless-input::-webkit-outer-spin-button,.seamless-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}\n  .seamless-text{font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);border:none;border-bottom:1px solid transparent;background:transparent;border-radius:0;padding:4px 0;width:100%;outline:none;}\n  .seamless-text:focus{border-bottom-color:var(--green);}\n  .seg{display:flex;background:#f3f5f1;border-radius:10px;padding:3px;gap:2px;}\n  .seg>div{flex:1;text-align:center;cursor:pointer;font-weight:600;font-size:12px;border-radius:8px;padding:8px 0;color:var(--faint);}\n  .seg>div.on{background:#fff;color:var(--ink);}\n  .chip{cursor:pointer;font-weight:600;font-size:12px;border-radius:10px;padding:9px 14px;background:#f3f5f1;color:var(--muted);border:1px solid var(--line2);}\n  .chip.on{background:var(--green);color:#fff;border-color:var(--green);}\n  #fab{position:absolute;left:50%;transform:translateX(-50%);bottom:80px;width:58px;height:58px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(15,107,72,.42);cursor:pointer;z-index:20;}\n  #fab span{color:#fff;font-weight:300;font-size:32px;line-height:1;margin-top:-3px;}\n  #nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 2px calc(20px + env(safe-area-inset-bottom));z-index:15;}\n  #nav .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;}\n  #nav .tab svg{width:22px;height:22px;stroke:var(--faint);fill:none;stroke-width:1.9;}\n  #nav .tab span{font-weight:600;font-size:9px;color:var(--faint);}\n  #nav .tab.on svg{stroke:var(--green);}\n  #nav .tab.on span{color:var(--green);}\n  #modal{position:absolute;inset:0;z-index:30;display:none;}\n  #modal.show{display:flex;align-items:flex-end;}\n  .scrim{position:absolute;inset:0;background:rgba(20,30,25,.42);animation:fade .15s ease;}\n  .sheet{position:relative;width:100%;max-height:92%;overflow-y:auto;background:#fff;border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));animation:up .24s cubic-bezier(.2,.7,.3,1);}\n  .grip{width:38px;height:4px;border-radius:2px;background:#dfe3dd;margin:0 auto 14px;}\n  @keyframes fade{from{opacity:0;}to{opacity:1;}}\n  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}\n  .note{font-size:11px;line-height:1.5;color:var(--amber-d);background:var(--amber-bg);border-radius:9px;padding:9px 11px;}\n  .x{cursor:pointer;font-size:22px;color:var(--faint);line-height:1;}\n  .navarrow{cursor:pointer;width:34px;height:34px;border-radius:8px;background:#f3f5f1;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,'SF Mono',SFMono-Regular,Consolas,monospace;color:var(--muted);font-size:15px;}\n  .check{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;}\n  .del{cursor:pointer;color:var(--red);font-weight:600;font-size:12px;background:none;border:none;padding:7px 5px;line-height:1;}\n  .miniadd{cursor:pointer;color:var(--green-d);font-weight:600;font-size:12px;background:#e9f4ee;border:1px solid #cfe6db;border-radius:9px;padding:9px;text-align:center;}\n  .toast{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;background:var(--ink);color:#fff;font-size:12px;font-weight:500;padding:10px 16px;border-radius:10px;z-index:40;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}\n  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<div id=\"phone\">\n  <header>\n    <div class=\"brand\"><div class=\"dot\"><\u002Fdiv>Tally<\u002Fdiv>\n    <div class=\"hdr-right\">\n      <div class=\"pill\" id=\"hdr-cycle\">Cycle<\u002Fdiv>\n      <div id=\"sync-status\" data-action=\"force-sync\" style=\"font-size:14px;margin-right:10px;cursor:pointer;padding:4px;\" aria-label=\"Force Sync\">☁️<\u002Fdiv>\n      <div class=\"gear\" data-action=\"open-settings\" aria-label=\"Settings\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19 12a7 7 0 00-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 00-1.7-1l-.3-2.6H9.7l-.3 2.6a7 7 0 00-1.7 1l-2.3-1-2 3.4L3.1 11a7 7 0 000 2l-2 1.5 2 3.4 2.3-1a7 7 0 001.7 1l.3 2.6h4.6l.3-2.6a7 7 0 001.7-1l2.3 1 2-3.4-2-1.5a7 7 0 00.1-1z\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n  <div id=\"scroll\"><div id=\"view\"><\u002Fdiv><\u002Fdiv>\n  <div id=\"fab\" data-action=\"open-log\"><span>+<\u002Fspan><\u002Fdiv>\n  <nav id=\"nav\"><\u002Fnav>\n  <div id=\"modal\"><\u002Fdiv>\n  <div class=\"toast\" id=\"toast\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n\"use strict\";\n/* ============================================================\n   Tally — vanilla JS Safe-to-Spend / envelope budgeting app.\n   No frameworks. Real-time dates. Double-entry ledger.\n   Per-cycle editable envelopes; dynamic STS.\n   ============================================================ */\nconst LS_KEY='tally_vanilla_v2';\nconst SYNC_URL='https://script.google.com/macros/s/AKfycbx8j48oMH9ysWmh37D9A87QXulCVOBRDexR60P30MGa31opDuc3aVnJFO986U8uSFwImQ/exec';\n/* Cloud-sync secret is stored per-device in localStorage — NEVER hard-coded, so shared/exported\n   copies of this file carry no credential. The owner sets it once in Settings → Cloud Sync. */\nconst SYNC_SECRET_LS='tally_sync_secret';\nfunction syncSecret(){try{return localStorage.getItem(SYNC_SECRET_LS)||'';}catch(e){return '';}}\nfunction syncEnabled(){return !!SYNC_URL&&!!syncSecret();}\nfunction setSyncStatus(state){const el=document.getElementById('sync-status');if(!el)return;if(state==='syncing'){el.textContent='⏳';el.style.color='';}else if(state==='synced'){el.textContent='☁️✓';el.style.color='var(--green)';}else if(state==='error'){el.textContent='☁️✕';el.style.color='var(--red)';}else{el.textContent='☁️';el.style.color='';}}\nconst SALARY_DAY_DEFAULT=9;\nconst MIN_PAYMENT_FLOOR=500000; /* VND floor for a card minimum payment */\nconst pad=n=>String(n).padStart(2,'0');\nconst uid=p=>(p||'id')+Math.random().toString(36).slice(2,7)+Date.now().toString(36).slice(-3);\n\n/* ---------- dates ---------- */\nconst MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nconst dOnly=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());\nconst parseD=s=>{const p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);};\nconst isoD=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;\nconst diffDays=(a,b)=>Math.round((dOnly(b)-dOnly(a))/86400000);\nconst fD=d=>`${d.getDate()} ${MON[d.getMonth()]}`;\nconst fDY=d=>`${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`;\nfunction salaryDay(){return (State&&State.settings.salaryDay)||SALARY_DAY_DEFAULT;}\nfunction cycleStartOfDate(date){const d=salaryDay();return date.getDate()>=d?new Date(date.getFullYear(),date.getMonth(),d):new Date(date.getFullYear(),date.getMonth()-1,d);}\nfunction cycleIdOfStart(s){return `${s.getFullYear()}-${pad(s.getMonth()+1)}`;}\nfunction cycleIdOfDate(date){return cycleIdOfStart(cycleStartOfDate(date));}\nfunction startOfCycleId(id){const[y,m]=id.split('-').map(Number);return new Date(y,m-1,salaryDay());}\nfunction endOfCycleId(id){const s=startOfCycleId(id);return new Date(s.getFullYear(),s.getMonth()+1,salaryDay()-1);}\nfunction nextPaydayOfCycleId(id){const s=startOfCycleId(id);return new Date(s.getFullYear(),s.getMonth()+1,salaryDay());}\nfunction shiftCycle(id,delta){const s=startOfCycleId(id);return cycleIdOfStart(new Date(s.getFullYear(),s.getMonth()+delta,salaryDay()));}\nfunction cycleLabel(id){return `${fD(startOfCycleId(id))} – ${fD(endOfCycleId(id))}`;}\nfunction currentCycleId(){return cycleIdOfDate(new Date());}\nfunction daysToPayday(){return diffDays(new Date(),nextPaydayOfCycleId(currentCycleId()));}\nfunction cycleProgress(){const id=currentCycleId(),s=startOfCycleId(id),p=nextPaydayOfCycleId(id);const total=diffDays(s,p)||1;return Math.max(2,Math.min(100,Math.round(diffDays(s,new Date())/total*100)));}\nfunction inCycle(dateStr,id){return cycleIdOfDate(parseD(dateStr))===id;}\nfunction daysUntil(dateStr){return diffDays(new Date(),parseD(dateStr));}\nfunction activeDueDate(dueStr){let d=parseD(dueStr);const today=new Date();while(diffDays(today,d)<-15){d=new Date(d.getFullYear(),d.getMonth()+1,d.getDate());}return isoD(d);}\n\n/* ---------- format ---------- */\nconst fmt=n=>{const s=Math.round(Math.abs(n)).toLocaleString('en-US');return (n<0?'\\u2212\\u20ab':'\\u20ab')+s;};\nconst fmtShort=n=>{if(State&&State.settings&&State.settings.compactNumbers===false)return fmt(n);const a=Math.abs(n);let s;if(a>=1e9)s=(a/1e9).toFixed(2)+'B';else if(a>=1e6)s=(a/1e6).toFixed(1)+'M';else if(a>=1e3)s=Math.round(a/1e3)+'k';else s=String(Math.round(a));return (n<0?'\\u2212\\u20ab':'\\u20ab')+s;};\nconst aprFmt=a=>(a*100).toFixed((a*100)%1?2:0)+'%';\nconst esc=s=>String(s==null?'':s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\n\n/* ============================================================ STATE ============================================================ */\nlet State=null;\nlet UI={tab:'home',viewCycle:null};\nlet historyRenderLimit=50;\n\n/* Category → icon lookup, aligned to the user's Excel master plan. Used purely for\n   display (labels), so category matching in the ledger still keys off the raw name. */\nconst CAT_ICONS={\n  'Net Salary':'💰','OT & Allowances':'⏱️','Biz Trip & Reimburse':'✈️','Bonus & Debt Collect':'🎁',\n  'Family Support':'🏠','Health & Medical':'💊','Debt payments':'💳',\n  'Self Spending':'☕','Lifestyle & Travel':'🛍️','Unexpected (Short-term)':'⚠️',\n  'Emergency Fund':'🛡️','Dream House':'🏡','Life Insurance':'📑','Bond & Gold Invest':'📈'\n};\nfunction catIcon(name){return CAT_ICONS[name]||'';}\nfunction catLabel(name){const i=catIcon(name);return (i?i+' ':'')+name;}\nfunction defaultBudgetTemplate(){\n  return [\n    /* FIXED (non-negotiable) */\n    {id:uid('b'),type:'Fixed',category:'Family Support',planned:8000000,required:true},\n    {id:uid('b'),type:'Fixed',category:'Health & Medical',planned:1500000,required:true},\n    {id:uid('b'),type:'Fixed',category:'Debt payments',planned:15400000,required:true,isDebt:true},\n    /* FLEXIBLE (the Safe-to-Spend buckets) */\n    {id:uid('b'),type:'Flexible',category:'Self Spending',planned:5000000},\n    {id:uid('b'),type:'Flexible',category:'Lifestyle & Travel',planned:3000000},\n    {id:uid('b'),type:'Flexible',category:'Unexpected (Short-term)',planned:2000000}\n  ];\n}\nfunction buildSeed(){\n  const today=new Date();\n  const cid=currentCycleIdRaw(today);\n  const cs=startOfCycleIdRaw(cid);\n  const elapsed=Math.max(0,diffDays(cs,today));\n  const onDay=off=>isoD(new Date(cs.getFullYear(),cs.getMonth(),cs.getDate()+Math.min(off,elapsed)));\n  const dueIn=k=>isoD(new Date(today.getFullYear(),today.getMonth(),today.getDate()+k));\n  const payday=new Date(cs.getFullYear(),cs.getMonth()+1,SALARY_DAY_DEFAULT);\n  const beforePayday=Math.max(1,Math.min(diffDays(today,payday)-1,6));\n  const prevId=shiftCycleRaw(cid,-1);\n  const pcs=startOfCycleIdRaw(prevId);\n  const pOn=off=>isoD(new Date(pcs.getFullYear(),pcs.getMonth(),pcs.getDate()+off));\n  const monthsAgo=n=>{const d=new Date(today.getFullYear(),today.getMonth()-n,1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;};\n  const seed={\n    settings:{currency:'VND',salaryDay:SALARY_DAY_DEFAULT,compactNumbers:true,lastInterestReview:null},\n    accounts:[\n      {id:'acc_vcb',name:'Vietcombank',type:'Bank',start:1000000,inCurrent:true,inNet:true,updated:onDay(elapsed)},\n      {id:'acc_cash',name:'Cash Wallet',type:'Cash',start:5100000,inCurrent:true,inNet:true,updated:onDay(elapsed)},\n      {id:'acc_tcb',name:'Techcombank',type:'Bank',start:6200000,inCurrent:true,inNet:true,updated:onDay(elapsed)},\n      {id:'acc_momo',name:'MoMo Wallet',type:'Wallet',start:3650000,inCurrent:true,inNet:true,updated:onDay(elapsed)},\n      {id:'acc_g_emerg',name:'Emergency Fund',type:'Savings',start:22000000,inCurrent:false,inNet:true,updated:onDay(0)},\n      {id:'acc_g_house',name:'Dream House',type:'Savings',start:15000000,inCurrent:false,inNet:true,updated:onDay(0)},\n      {id:'acc_g_insure',name:'Life Insurance',type:'Savings',start:4167000,inCurrent:false,inNet:true,updated:onDay(0)},\n      {id:'acc_g_invest',name:'Bond & Gold Invest',type:'Savings',start:10000000,inCurrent:false,inNet:true,updated:onDay(0)},\n      {id:'acc_owed',name:'Owed to Me',type:'Receivable',start:0,inCurrent:false,inNet:true,updated:isoD(today)}\n    ],\n    cards:[\n      {id:'sc5109',name:'Standard Chartered 5109',start:24620000,apr:0.35,statementDay:5,graceDays:15,minPayPct:0.05},\n      {id:'cardA',name:'Card A',start:79400000,apr:0.35,statementDay:18,graceDays:15,minPayPct:0.05},\n      {id:'cardB',name:'Card B',start:37860000,apr:0.3975,statementDay:25,graceDays:15,minPayPct:0.05},\n      {id:'cardD',name:'Card D',start:27880000,apr:0.35,statementDay:10,graceDays:15,minPayPct:0.05}\n    ],\n    separateDebts:[{id:'uob2672',name:'UOB 2672',balance:13270000,note:'Personal loan · kept out of card totals'}],\n    installments:[\n      {id:uid('i'),name:'iPhone 16 Pro',cardId:'cardA',monthlyAmt:1500000,totalMonths:16,startMonth:monthsAgo(4)},\n      {id:uid('i'),name:'Home appliances',cardId:'cardA',monthlyAmt:900000,totalMonths:12,startMonth:monthsAgo(2)},\n      {id:uid('i'),name:'Laptop',cardId:'cardB',monthlyAmt:1400000,totalMonths:18,startMonth:monthsAgo(8)},\n      {id:uid('i'),name:'Camera',cardId:'cardD',monthlyAmt:1100000,totalMonths:12,startMonth:monthsAgo(2)},\n      {id:uid('i'),name:'Motorbike loan',cardId:null,monthlyAmt:2500000,totalMonths:24,startMonth:monthsAgo(6)}\n    ],\n    goals:[\n      {id:'g_emerg',name:'Emergency Fund',target:60000000,current:0,monthly:3000000,priority:'High',linkedAccountId:'acc_g_emerg',icon:'🛡️'},\n      {id:'g_house',name:'Dream House',target:3000000000,current:0,monthly:2000000,priority:'High',linkedAccountId:'acc_g_house',icon:'🏡'},\n      {id:'g_insure',name:'Life Insurance',target:8334000,current:0,monthly:700000,priority:'Medium',linkedAccountId:'acc_g_insure',icon:'📑'},\n      {id:'g_invest',name:'Bond & Gold Invest',target:0,current:0,monthly:1000000,priority:'Medium',linkedAccountId:'acc_g_invest',icon:'📈'}\n    ],\n    budgets:{[cid]:defaultBudgetTemplate(),[prevId]:defaultBudgetTemplate()},\n    // savings planned per cycle, keyed by cycleId -> { goalId: planned }\n    savingsPlan:{[cid]:{g_emerg:3000000,g_house:2000000,g_insure:700000,g_invest:1000000},[prevId]:{g_emerg:3000000,g_house:2000000,g_insure:700000,g_invest:1000000}},\n    // planned income per cycle, keyed by cycleId -> [{id,source,planned}]\n    incomePlan:{[cid]:[{id:uid('inc'),source:'Net Salary',planned:38000000},{id:uid('inc'),source:'OT & Allowances',planned:3000000},{id:uid('inc'),source:'Biz Trip & Reimburse',planned:1000000}],[prevId]:[{id:uid('inc'),source:'Net Salary',planned:38000000},{id:uid('inc'),source:'OT & Allowances',planned:3000000},{id:uid('inc'),source:'Biz Trip & Reimburse',planned:1000000}]},\n    recurring:[],\n    transactions:[\n      {id:uid('t'),date:onDay(0),type:'income',from:null,to:'acc_vcb',category:'Net Salary',note:'Monthly salary',amount:42000000},\n      {id:uid('t'),date:onDay(0),type:'expense',from:'acc_vcb',to:null,category:'Family Support',note:'Rent',amount:5000000},\n      {id:uid('t'),date:onDay(0),type:'expense',from:'acc_vcb',to:null,category:'Debt service',note:'Prior-cycle card payments',isDebtService:true,amount:22000000},\n      {id:uid('t'),date:onDay(0),type:'transfer',from:'acc_vcb',to:'acc_g_emerg',category:'Transfer',note:'To Emergency Fund',amount:3000000},\n      {id:uid('t'),date:onDay(1),type:'expense',from:'acc_vcb',to:null,category:'Self Spending',note:'Internet',amount:300000},\n      {id:uid('t'),date:onDay(3),type:'expense',from:'acc_vcb',to:null,category:'Family Support',note:'Electricity',amount:900000},\n      {id:uid('t'),date:onDay(0),type:'expense',from:'acc_vcb',to:null,category:'Self Spending',note:'Streaming',amount:450000},\n      {id:uid('t'),date:onDay(2),type:'expense',from:'acc_cash',to:null,category:'Self Spending',note:'Groceries',amount:600000},\n      {id:uid('t'),date:onDay(6),type:'expense',from:'acc_cash',to:null,category:'Self Spending',note:'Dinner out',amount:800000},\n      {id:uid('t'),date:onDay(10),type:'expense',from:'acc_momo',to:null,category:'Self Spending',note:'Lunch + coffee',amount:900000},\n      {id:uid('t'),date:onDay(4),type:'expense',from:'acc_momo',to:null,category:'Self Spending',note:'Grab',amount:400000},\n      {id:uid('t'),date:onDay(8),type:'expense',from:'acc_momo',to:null,category:'Self Spending',note:'Fuel',amount:500000},\n      {id:uid('t'),date:onDay(5),type:'expense',from:'acc_tcb',to:null,category:'Lifestyle & Travel',note:'Clothes',amount:1400000},\n      {id:uid('t'),date:onDay(7),type:'expense',from:'acc_momo',to:null,category:'Lifestyle & Travel',note:'Cinema',amount:350000},\n      {id:uid('t'),date:onDay(9),type:'cc_charge',from:null,to:'cardA',category:'Lifestyle & Travel',note:'Home stuff (Card A)',amount:1000000},\n      {id:uid('t'),date:pOn(2),type:'expense',from:'acc_cash',to:null,category:'Self Spending',note:'Groceries (prev cycle)',amount:1200000},\n      {id:uid('t'),date:pOn(6),type:'expense',from:'acc_tcb',to:null,category:'Lifestyle & Travel',note:'Shoes (prev cycle)',amount:1800000}\n    ]\n  };\n  seed.transactions.forEach(t=>t.cid=cycleIdOfDate(parseD(t.date)));\n  return seed;\n}\nfunction startOfCycleIdRaw(id){const[y,m]=id.split('-').map(Number);return new Date(y,m-1,SALARY_DAY_DEFAULT);}\nfunction currentCycleIdRaw(date){const d=SALARY_DAY_DEFAULT;const s=date.getDate()>=d?new Date(date.getFullYear(),date.getMonth(),d):new Date(date.getFullYear(),date.getMonth()-1,d);return `${s.getFullYear()}-${pad(s.getMonth()+1)}`;}\nfunction shiftCycleRaw(id,delta){const s=startOfCycleIdRaw(id);const n=new Date(s.getFullYear(),s.getMonth()+delta,SALARY_DAY_DEFAULT);return `${n.getFullYear()}-${pad(n.getMonth()+1)}`;}\n\nfunction migrateState(){\n  if(!State.installments)State.installments=[];\n  (State.cards||[]).forEach(c=>{\n    if(c.statementDay==null){let sd=15;if(c.due){const d=parseD(c.due);const st=new Date(d.getFullYear(),d.getMonth(),d.getDate()-(c.graceDays||15));sd=st.getDate();}c.statementDay=Math.min(28,Math.max(1,sd));}\n    if(c.graceDays==null)c.graceDays=15;\n    if(c.minPayPct==null)c.minPayPct=0.05;\n  });\n  (State.installments||[]).forEach(i=>{\n    if(!i.id)i.id=uid('i');\n    if(i.cardId===undefined)i.cardId=null;\n    if(i.monthlyAmt==null)i.monthlyAmt=+i.monthly||0;\n    if(i.startMonth==null){\n      /* migrate legacy decrement model -> time-derived; anchor start to this month so current remaining is preserved */\n      const rem=i.remainingMonths!=null?i.remainingMonths:(i.monthlyAmt>0?Math.max(1,Math.round((+i.remaining||0)/i.monthlyAmt)):0);\n      const now=new Date();\n      i.startMonth=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;\n      if(i.totalMonths==null)i.totalMonths=rem;\n    }\n    if(i.totalMonths==null)i.totalMonths=i.remainingMonths||0;\n    delete i.remainingMonths;\n  });\n  if(!State.incomePlan)State.incomePlan={};\n  if(!State.recurring)State.recurring=[];\n  if(State.settings){if(State.settings.compactNumbers===undefined)State.settings.compactNumbers=true;if(State.settings.lastInterestReview===undefined)State.settings.lastInterestReview=null;}\n  const _ccid=currentCycleId();\n  if(!State.incomePlan[_ccid]||!State.incomePlan[_ccid].length){\n    const prevInc=State.incomePlan[shiftCycle(_ccid,-1)];\n    State.incomePlan[_ccid]=(prevInc&&prevInc.length)?prevInc.map(x=>({...x,id:uid('inc')})):[{id:uid('inc'),source:'Salary',planned:actualIncome(_ccid)||0}];\n  }\n  // one-time backfill: if the auto-seeded plan is still a lone untouched Salary at 0 while income exists, set it\n  if(State.settings&&!State.settings._incomeSeeded){const ip=State.incomePlan[_ccid];if(ip&&ip.length===1&&ip[0].source==='Salary'&&!(+ip[0].planned)){const ai=actualIncome(_ccid);if(ai>0)ip[0].planned=ai;}State.settings._incomeSeeded=true;}\n  (State.goals||[]).forEach(g=>{\n    if(g.linkedAccountId===undefined){\n      const a=State.accounts.find(x=>x.type==='Savings'&&x.name===g.name);\n      g.linkedAccountId=a?a.id:null;\n    }\n  });\n}\nfunction load(){try{const r=localStorage.getItem(LS_KEY);if(r){State=JSON.parse(r);if(!State.savingsPlan)State.savingsPlan={};if(State.transactions)State.transactions.forEach(t=>{if(!t.cid)t.cid=cycleIdOfDate(parseD(t.date));});migrateState();return;}}catch(e){}State=buildSeed();save();}\nfunction loadCloud(){\n  if(!syncEnabled())return;\n  setSyncStatus('syncing');\n  fetch(SYNC_URL+'?action=load&key='+encodeURIComponent(syncSecret())).then(r=>r.json()).then(data=>{\n    if(data&&typeof data==='object'&&(data.transactions||data.accounts)){\n      const cloudTime=data.lastUpdated||0;\n      const localTime=State.lastUpdated||0;\n      if(cloudTime>localTime){\n        State=data;if(!State.savingsPlan)State.savingsPlan={};if(State.transactions)State.transactions.forEach(t=>{if(!t.cid)t.cid=cycleIdOfDate(parseD(t.date));});migrateState();\n        try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}\n        UI.viewCycle=currentCycleId();render();\n        setSyncStatus('synced');\n        if(typeof toast==='function')toast('Data synced from cloud');\n      }else if(localTime>cloudTime){\n        save();\n      }else{\n        setSyncStatus('synced');\n      }\n    }else{\n      setSyncStatus('synced');\n    }\n  }).catch(()=>{setSyncStatus('error');});\n}\nfunction save(){\n  State.lastUpdated=Date.now();\n  try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}\n  if(syncEnabled()){\n    setSyncStatus('syncing');\n    fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...State,_secret:syncSecret()})})\n      .then(()=>{State.unsynced=false;try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}setSyncStatus('synced');})\n      .catch(()=>{State.unsynced=true;try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}setSyncStatus('error');toast('Saved locally (Offline)');});\n  }\n}\nfunction resetData(){State=buildSeed();UI.viewCycle=currentCycleId();save();render();toast('Sample data restored');}\n\n/* ============================================================ DERIVED ============================================================ */\nconst isCard=id=>State.cards.some(c=>c.id===id);\nfunction accountBalance(acc){let b=acc.start;for(const t of State.transactions){if(t.type==='income'&&t.to===acc.id)b+=t.amount;else if(t.type==='expense'&&t.from===acc.id)b-=t.amount;else if(t.type==='transfer'){if(t.from===acc.id)b-=t.amount;if(t.to===acc.id)b+=t.amount;}else if(t.type==='cc_payment'&&t.from===acc.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===acc.id)b+=t.amount;}return b;}\nfunction cardDebt(card){let b=card.start;for(const t of State.transactions){if(t.type==='cc_charge'&&t.to===card.id)b+=t.amount;else if(t.type==='cc_payment'&&t.to===card.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===card.id)b+=t.amount;}return b;}\n/* Statement balance = what was owed at the START of this cycle (plus any in-cycle\n   adjustments like interest/reconciliation), EXCLUDING charges & payments made during the\n   cycle. Bank minimums bill against the statement, not the live balance — a fresh charge\n   made this cycle appears on NEXT cycle's statement, so it must not inflate this cycle's\n   required minimum. Derived from the live balance so it always carries the card's opening `start`. */\nfunction statementDebt(card,cid){return State.transactions.reduce((b,t)=>{if(t.to!==card.id)return b;if(t.cid<cid){if(t.type==='cc_charge'||t.type==='adjustment')b+=t.amount;else if(t.type==='cc_payment')b-=t.amount;}else if(t.cid===cid&&t.type==='adjustment'){b+=t.amount;}return b;},card.start);}\nconst currentBalance=()=>State.accounts.filter(a=>a.inCurrent).reduce((s,a)=>s+accountBalance(a),0);\nconst assets=()=>State.accounts.filter(a=>a.inNet).reduce((s,a)=>s+accountBalance(a),0);\nconst externalInstalDebt=()=>(State.installments||[]).filter(i=>!i.cardId).reduce((s,i)=>s+i.monthlyAmt*getRemainingMonths(i),0);\nconst liabilities=()=>State.cards.reduce((s,c)=>s+cardDebt(c),0)+State.separateDebts.reduce((s,x)=>s+x.balance,0)+externalInstalDebt();\nconst netWorth=()=>assets()-liabilities();\n\nconst amountPaidThisCycle=(card,cid=currentCycleId())=>State.transactions.filter(t=>t.type==='cc_payment'&&t.to===card.id&&t.cid===cid).reduce((sum,t)=>sum+t.amount,0);\nconst cardPaidThisCycle=(card,cid=currentCycleId())=>amountPaidThisCycle(card,cid)>0;\nfunction spentForCategory(cat,cid){return State.transactions.filter(t=>(t.type==='expense'||t.type==='cc_charge')&&t.category===cat&&t.cid===cid&&!t.exclude).reduce((s,t)=>s+t.amount,0);}\nfunction getRemainingMonths(inst){\n  const today=new Date();\n  const currAbsMonth=today.getFullYear()*12+today.getMonth();\n  const [sY,sM]=String(inst.startMonth||'').split('-').map(Number);\n  const startAbsMonth=(sY||0)*12+((sM||1)-1);\n  const passed=Math.max(0,currAbsMonth-startAbsMonth);\n  return Math.max(0,(inst.totalMonths||0)-passed);\n}\nfunction getCardDates(card){\n  const today=new Date();\n  if(card.dueDay){\n    const dd=Math.min(28,Math.max(1,card.dueDay));\n    let due=new Date(today.getFullYear(),today.getMonth(),dd);\n    while(diffDays(today,due)<-15)due=new Date(due.getFullYear(),due.getMonth()+1,due.getDate());\n    return isoD(due);\n  }\n  const sd=Math.min(28,Math.max(1,card.statementDay||1));\n  let stmt=new Date(today.getFullYear(),today.getMonth(),sd);\n  if(stmt>today)stmt=new Date(today.getFullYear(),today.getMonth()-1,sd);\n  let due=new Date(stmt.getFullYear(),stmt.getMonth(),stmt.getDate()+(card.graceDays||15));\n  // A statement-only card must roll its due date forward each month instead of reading\n  // \"N days overdue\" forever once the grace window has clearly passed.\n  while(diffDays(today,due)<-15)due=new Date(due.getFullYear(),due.getMonth()+1,due.getDate());\n  return isoD(due);\n}\n/* Minimum payment derived from an arbitrary balance (so we can compute it as-of any\n   point in time, not just the live balance). */\nfunction minFromBalance(card,bal){\n  bal=Math.max(0,bal);\n  if(bal<=0)return 0;\n  const cardInstals=(State.installments||[]).filter(i=>i.cardId===card.id&&getRemainingMonths(i)>0);\n  const instalMonthlyTotal=cardInstals.reduce((s,i)=>s+i.monthlyAmt,0);\n  const instalPrincipalRemaining=cardInstals.reduce((s,i)=>s+(i.monthlyAmt*getRemainingMonths(i)),0);\n  let regDebt=Math.max(0,bal-instalPrincipalRemaining);\n  const calculatedMin=instalMonthlyTotal+(regDebt*(card.minPayPct||0.05));\n  return Math.min(bal,(calculatedMin<MIN_PAYMENT_FLOOR&&calculatedMin>0)?Math.min(bal,MIN_PAYMENT_FLOOR):calculatedMin);\n}\n/* overrideDebt lets callers pass the PRE-payment balance so the required minimum is\n   computed off the statement balance, not the shrinking real-time balance. Without it,\n   logging a payment lowered cardDebt -> lowered the minimum -> debtFloor then subtracted\n   `paid` from that already-lowered minimum: a double-deduction that inflated Safe-to-Spend. */\nfunction getCardMinimum(card,overrideDebt=null){return minFromBalance(card,overrideDebt!==null?Math.max(0,overrideDebt):cardDebt(card));}\nfunction debtFloor(cid){\n  const cycleEnd=endOfCycleId(cid);\n  const past=cycleEnd<startOfCycleId(currentCycleId());\n  let f=0;\n  State.cards.forEach(c=>{\n    if(c.archived)return;\n    const paid=amountPaidThisCycle(c,cid);\n    if(past){\n      // Past cycles: base off the balance as it stood at cycle-end, adding `paid` back so\n      // the minimum is computed pre-payment (no double-dip against the subtraction below).\n      const base=Math.max(0,cardEndDebt(c,cycleEnd)+paid);\n      if(base>0){\n        const minRequired=Math.min(minFromBalance(c,base),base);\n        f+=Math.max(0,minRequired-paid);\n      }\n    }else{\n      const dueD=parseD(getCardDates(c));\n      // Current/future: enforce only if the due date falls ON or BEFORE the cycle end,\n      // and compute the minimum off the STATEMENT balance (excludes this cycle's charges).\n      if(dueD<=cycleEnd){\n        const sDebt=Math.max(0,statementDebt(c,cid));\n        const minRequired=Math.min(getCardMinimum(c,sDebt),sDebt);\n        f+=Math.max(0,minRequired-paid);\n      }\n    }\n  });\n  const extInstals=(State.installments||[]).filter(i=>!i.cardId&&getRemainingMonths(i)>0);\n  f+=extInstals.reduce((s,i)=>s+i.monthlyAmt,0);\n  return f;\n}\nfunction debtItem(cid){return (State.budgets[cid]||[]).find(b=>b.isDebt);}\nfunction plannedDebt(cid){const it=debtItem(cid);return Math.max(debtFloor(cid),it?it.planned:0);}\nfunction debtPaidThisCycle(cid){return State.transactions.filter(t=>t.type==='cc_payment'&&t.cid===cid).reduce((s,t)=>s+t.amount,0);}\nfunction fixedItems(cid){return (State.budgets[cid]||[]).filter(b=>b.type==='Fixed'&&!b.isDebt);}\nfunction fixedRemaining(cid){return fixedItems(cid).reduce((s,b)=>s+Math.max(0,b.planned-spentForCategory(b.category,cid)),0);}\nfunction remainingDebt(cid){\n  const it=debtItem(cid);\n  const planned=it?it.planned:0;\n  // debtFloor already shrinks proportionally with partial payments; hold the\n  // greater of the unpaid floor or the user's planned target net of payments.\n  return Math.max(debtFloor(cid),planned-debtPaidThisCycle(cid));\n}\nfunction plannedSavingFor(cid,goalId){const m=(State.savingsPlan&&State.savingsPlan[cid])||{};if(m[goalId]!=null)return m[goalId];const g=State.goals.find(x=>x.id===goalId);return g?g.monthly:0;}\nfunction savingsPlannedTotal(cid){return State.goals.reduce((s,g)=>s+plannedSavingFor(cid,g.id),0);}\nfunction transfersToSavingsThisCycle(cid){const sav=State.accounts.filter(a=>a.type==='Savings').map(a=>a.id);return State.transactions.filter(t=>t.cid===cid&&t.type==='transfer').reduce((s,t)=>{if(sav.includes(t.to))return s+t.amount;if(sav.includes(t.from))return s-t.amount;return s;},0);}\nfunction remainingGoals(cid){return Math.max(0,savingsPlannedTotal(cid)-transfersToSavingsThisCycle(cid));}\n/* A goal's progress comes from ONE source: the balance of its linked savings account.\n   Falls back to a legacy exact-name match, then to a manual `current` value —\n   so both the Goals tab and the Budget tab always read the same number. */\nfunction goalAccount(g){\n  if(g&&g.linkedAccountId){const a=State.accounts.find(x=>x.id===g.linkedAccountId&&x.type==='Savings');if(a)return a;}\n  return (g&&State.accounts.find(a=>a.type==='Savings'&&a.name===g.name))||null;\n}\nfunction savedFor(g){const a=goalAccount(g);return a?Math.round(accountBalance(a)):Math.round((g&&g.current)||0);}\n/* RECALIBRATED Safe-to-Spend (uses CURRENT cycle) */\n/* Deduct only savings still PLANNED but not yet funded (remainingGoals). Savings accounts\n   are excluded from currentBalance, so money already moved there is gone from spendable —\n   deducting actual transfers again would double-count. This also matches the on-screen breakdown.\n   Non-monthly (sinking-fund) envelopes are reserved too, so STS never suggests spending money\n   earmarked for annual fees / maintenance. */\nfunction nonMonthlyRemaining(cid){return groupItems(cid,'Non-Monthly').reduce((s,b)=>s+Math.max(0,b.planned-spentForCategory(b.category,cid)),0);}\n/* new card debt taken on this cycle (not archived). All cards are treated as transactors:\n   fresh charges lock cash immediately so Safe-to-Spend never inflates. Reimbursable (excluded) charges don't count. */\nfunction newRevolvingDebtThisCycle(cid){return State.cards.filter(c=>!c.archived).reduce((s,c)=>{const sDebt=Math.max(0,statementDebt(c,cid));const liveDebt=Math.max(0,cardDebt(c));return s+Math.max(0,liveDebt-sDebt);},0);}\nfunction newCardChargesThisCycle(cid){return State.transactions.filter(t=>{if(t.type!=='cc_charge'||t.cid!==cid||t.exclude)return false;const c=State.cards.find(x=>x.id===t.to);return c&&!c.archived;}).reduce((s,t)=>s+t.amount,0);}\nfunction safeToSpend(){const cid=currentCycleId();return currentBalance()-remainingDebt(cid)-fixedRemaining(cid)-nonMonthlyRemaining(cid)-remainingGoals(cid)-newRevolvingDebtThisCycle(cid);}\n\n/* ---- income planning (per cycle) ---- */\nfunction incomePlanItems(cid){return (State.incomePlan&&State.incomePlan[cid])||[];}\nfunction plannedIncome(cid){return incomePlanItems(cid).reduce((s,i)=>s+Math.max(0,+i.planned||0),0);}\nfunction actualIncome(cid){return State.transactions.filter(t=>t.type==='income'&&t.cid===cid).reduce((s,t)=>s+t.amount,0);}\nfunction plannedOutflows(cid){return plannedTotal(cid);}\nfunction projectedSurplus(cid){return plannedIncome(cid)-plannedOutflows(cid);}\n\n/* ---- quarterly interest / reconcile reminder ---- */\nfunction daysSinceInterestReview(){const last=State.settings&&State.settings.lastInterestReview;return last?diffDays(parseD(last),new Date()):null;}\nfunction interestReviewDue(){if(!State.cards.some(c=>cardDebt(c)>0))return false;const d=daysSinceInterestReview();return d==null||d>=90;}\nfunction markInterestReviewed(){State.settings.lastInterestReview=isoD(new Date());}\n\n/* ---- recurring / scheduled bills: auto-post once per cycle when their day arrives ---- */\nfunction postDueRecurring(){\n  const cid=currentCycleId();const cs=startOfCycleId(cid);const today=new Date();let posted=0;\n  (State.recurring||[]).forEach(r=>{\n    if(!r.active)return;const amt=+r.amount||0;if(amt<=0)return;\n    const day=Math.min(28,Math.max(1,+r.day||1));\n    let sched=new Date(cs.getFullYear(),cs.getMonth(),day);\n    if(sched<cs)sched=new Date(cs.getFullYear(),cs.getMonth()+1,day);\n    if(diffDays(today,sched)>0)return; // not due yet this cycle\n    if(State.transactions.some(t=>t.recurringId===r.id&&t.cid===cid))return; // already posted\n    const date=isoD(sched);\n    if(r.type==='transfer'&&r.toId){State.transactions.unshift({id:uid('t'),recurringId:r.id,date,cid,type:'transfer',from:r.accountId,to:r.toId,category:'Transfer',note:r.name+' \\u00b7 auto',amount:amt});}\n    else if(isCard(r.accountId)){State.transactions.unshift({id:uid('t'),recurringId:r.id,date,cid,type:'cc_charge',from:null,to:r.accountId,category:r.category||r.name,note:r.name+' \\u00b7 auto',amount:amt});}\n    else{State.transactions.unshift({id:uid('t'),recurringId:r.id,date,cid,type:'expense',from:r.accountId,to:null,category:r.category||r.name,note:r.name+' \\u00b7 auto',amount:amt});}\n    posted++;\n  });\n  if(posted){save();if(typeof toast==='function')toast(posted+' recurring item'+(posted>1?'s':'')+' auto-posted');}\n}\nfunction retagCycles(){State.transactions.forEach(t=>{t.cid=cycleIdOfDate(parseD(t.date));});}\n\n/* ---- debt coaching: phase, payoff projection, debt trend, on-time streak ---- */\nconst activeCards=()=>State.cards.filter(c=>!c.archived);\nconst cardsDebtTotal=()=>activeCards().reduce((s,c)=>s+Math.max(0,cardDebt(c)),0);\nfunction cardMinTotal(){return activeCards().reduce((s,c)=>s+getCardMinimum(c),0);}\nfunction anyOverdueCard(){return activeCards().some(c=>cardDebt(c)>0&&!cardPaidThisCycle(c)&&daysUntil(getCardDates(c))<0);}\nfunction unpaidDueCount(){return activeCards().filter(c=>cardDebt(c)>0&&!cardPaidThisCycle(c)&&parseD(getCardDates(c))<=nextPaydayOfCycleId(currentCycleId())).length;}\nfunction cardsPaidThisCycleCount(){return activeCards().filter(c=>cardPaidThisCycle(c)).length;}\nfunction cardsWithDebtCount(){return activeCards().filter(c=>cardDebt(c)>0||cardPaidThisCycle(c)).length;}\nfunction weightedMonthlyRate(){const tot=cardsDebtTotal();if(tot<=0)return 0;const wSum=activeCards().reduce((s,c)=>s+Math.max(0,cardDebt(c))*(c.apr/12),0);return wSum/tot;}\nfunction avgMonthlyDebtPayment(){let cy=shiftCycle(currentCycleId(),-1);const vals=[];for(let k=0;k<3;k++){const paid=State.transactions.filter(t=>t.type==='cc_payment'&&t.cid===cy).reduce((s,t)=>s+t.amount,0);if(paid>0)vals.push(paid);cy=shiftCycle(cy,-1);}const base=Math.max(cardMinTotal(),plannedDebt(currentCycleId()));if(!vals.length)return base;return Math.max(base,vals.reduce((a,b)=>a+b,0)/vals.length);}\nfunction monthsToDebtFree(payment){let bal=cardsDebtTotal();if(bal<=0)return 0;const r=weightedMonthlyRate();const pay=payment||avgMonthlyDebtPayment();if(pay<=bal*r+1)return Infinity;let m=0;while(bal>0&&m<600){bal=bal*(1+r)-pay;m++;}return m>=600?Infinity:m;}\nfunction debtFreeDate(){const m=monthsToDebtFree();if(!isFinite(m))return null;const d=new Date();return new Date(d.getFullYear(),d.getMonth()+m,1);}\nfunction interestSavedVsMin(){const start=cardsDebtTotal();if(start<=0)return 0;const mAvg=monthsToDebtFree(avgMonthlyDebtPayment());if(!isFinite(mAvg))return 0;const intAvg=Math.max(0,avgMonthlyDebtPayment()*mAvg-start);const mMin=monthsToDebtFree(cardMinTotal());if(!isFinite(mMin))return null;const intMin=Math.max(0,cardMinTotal()*mMin-start);return Math.max(0,intMin-intAvg);}\nfunction cardEndDebt(card,end){let b=card.start;for(const t of State.transactions){if(parseD(t.date)>end)continue;if(t.type==='cc_charge'&&t.to===card.id)b+=t.amount;else if(t.type==='cc_payment'&&t.to===card.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===card.id)b+=t.amount;}return Math.max(0,b);}\nfunction cardMinTotalAtCycleEnd(cid){const end=endOfCycleId(cid);return activeCards().reduce((s,c)=>s+minFromBalance(c,cardEndDebt(c,end)),0);}\nfunction cardDebtAtCycleEnd(cid){const end=endOfCycleId(cid);return State.cards.reduce((s,c)=>{let b=c.start;for(const t of State.transactions){if(parseD(t.date)>end)continue;if(t.type==='cc_charge'&&t.to===c.id)b+=t.amount;else if(t.type==='cc_payment'&&t.to===c.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===c.id)b+=t.amount;}return s+Math.max(0,b);},0);}\nfunction onTimeStreak(){let cy=shiftCycle(currentCycleId(),-1);let streak=0;for(let k=0;k<24;k++){const debtThen=cardDebtAtCycleEnd(cy);const minDue=cardMinTotalAtCycleEnd(cy);const paid=State.transactions.filter(t=>t.type==='cc_payment'&&t.cid===cy).reduce((s,t)=>s+t.amount,0);if(debtThen<=0&&paid<=0)break;const covered=minDue>0?(paid+1>=minDue):(paid>0);if(covered)streak++;else break;cy=shiftCycle(cy,-1);}return streak;}\nfunction monthlyIncomeRef(){const cid=currentCycleId();return plannedIncome(cid)||actualIncome(cid)||0;}\nfunction userPhase(){const debt=cardsDebtTotal();if(debt<=0)return 3;if(anyOverdueCard())return 1;const inc=monthlyIncomeRef();if(inc>0&&debt<=inc*2&&onTimeStreak()>=2)return 2;return 1;}\n\nfunction groupItems(cid,type){return (State.budgets[cid]||[]).filter(b=>b.type===type);}\nconst plannedTotal=cid=>(State.budgets[cid]||[]).reduce((s,b)=>s+(b.isDebt?plannedDebt(cid):b.planned),0)+savingsPlannedTotal(cid);\nfunction cycleSpent(cid){return State.transactions.filter(t=>(t.type==='expense'||t.type==='cc_charge')&&t.cid===cid&&!t.exclude&&!t.isDebtService&&t.category!=='Debt service'&&t.category!=='Balance adjustment').reduce((s,t)=>s+t.amount,0);}\nconst monthlyInterest=()=>activeCards().reduce((s,c)=>s+cardDebt(c)*c.apr/12,0);\nfunction avalancheCard(){const u=activeCards().filter(c=>cardDebt(c)>0).slice().sort((a,b)=>b.apr-a.apr);return u[0]||null;}\nfunction cardStatus(c){const cid=currentCycleId();const paid=amountPaidThisCycle(c,cid);const sDebt=statementDebt(c,cid);const req=getCardMinimum(c,sDebt);if(req>0&&paid>=req)return 'Paid';if(req===0&&cardDebt(c)<=0)return 'Paid';if(req===0&&sDebt<=0&&cardDebt(c)>0)return 'Safe';const d=daysUntil(getCardDates(c));if(d<0)return 'Overdue';if(d<=7)return 'Urgent';if(d<=14)return 'Upcoming';return 'Safe';}\nconst STATUS={Overdue:{dot:'#c43d33',bg:'#fbe9e7',bd:'#f3cfc9',sub:'#c43d33',badgeBg:'#c43d33',badgeC:'#fff'},Urgent:{dot:'#c47d12',bg:'#fbf1de',bd:'#eedcb6',sub:'#c47d12',badgeBg:'#c47d12',badgeC:'#fff'},Upcoming:{dot:'#d9a330',bg:'#fff',bd:'#ebeee9',sub:'#6f7a73',badgeBg:'#eef1ec',badgeC:'#6f7a73'},Safe:{dot:'#15875a',bg:'#fff',bd:'#ebeee9',sub:'#6f7a73',badgeBg:'#e9f4ee',badgeC:'#15875a'},Paid:{dot:'#9aa39d',bg:'#f5f7f4',bd:'#e6e9e4',sub:'#9aa39d',badgeBg:'#eef1ec',badgeC:'#9aa39d'}};\nconst accName=id=>{const a=State.accounts.find(x=>x.id===id);if(a)return a.name;const c=State.cards.find(x=>x.id===id);return c?c.name:'—';};\n\n/* ============================================================ RENDER ============================================================ */\nconst $=s=>document.querySelector(s);\nconst view=()=>$('#view');\nconst NAV=[\n  ['home','Home','M3 11l9-8 9 8M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9'],\n  ['debt','Debt','M3 10h18M7 15h2M3 6h18v12H3z'],\n  ['budget','Budget','M3 12h18M3 6h18M3 18h18'],\n  ['goals','Goals','M6 3v18M6 4h12l-2 4 2 4H6'],\n  ['accounts','Accounts','M3 7h18v10H3zM3 11h18M7 15h3']\n];\nfunction renderNav(){$('#nav').innerHTML=NAV.map(([k,l,p])=>{const n=(k==='debt')?unpaidDueCount():0;const badge=n>0?`<span style=\"position:absolute;top:-2px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:8px;font-weight:700;min-width:14px;height:14px;line-height:14px;text-align:center;border-radius:7px;padding:0 3px\">${n}<\u002Fspan>`:'';return `<div class=\"tab ${UI.tab===k?'on':''}\" data-action=\"tab\" data-tab=\"${k}\" style=\"position:relative\"><svg viewBox=\"0 0 24 24\"><path d=\"${p}\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg><span>${l}<\u002Fspan>${badge}<\u002Fdiv>`;}).join('');}\nfunction render(){\n  if(!UI.viewCycle)UI.viewCycle=currentCycleId();\n  if(!UI.insightCycle)UI.insightCycle=currentCycleId();\n  if(!UI.filterCid)UI.filterCid=currentCycleId();\n  $('#hdr-cycle').textContent='Cycle '+cycleLabel(currentCycleId());\n  renderNav();\n  const v=view();\n  if(UI.tab==='home')v.innerHTML=renderHome();\n  else if(UI.tab==='budget')v.innerHTML=renderBudget();\n  else if(UI.tab==='goals')v.innerHTML=renderGoals();\n  else if(UI.tab==='accounts')v.innerHTML=renderAccounts();\n  else if(UI.tab==='debt')v.innerHTML=renderDebt();\n  else if(UI.tab==='history')v.innerHTML=renderHistory();\n  else if(UI.tab==='insights')v.innerHTML=renderInsights();\n}\n\nconst stsRow=(l,v,last)=>`<div class=\"row\" style=\"font-size:12px;color:#fff;opacity:.92;${last?'':'margin-bottom:6px'}\"><span>${l}<\u002Fspan><span class=\"mono\">${v}<\u002Fspan><\u002Fdiv>`;\nfunction renderHome(){\n  const cid=currentCycleId();\n  const sts=safeToSpend(),cb=currentBalance();\n  const ncFixed=fixedItems(cid).reduce((s,b)=>s+b.planned,0);\n  const ncMins=activeCards().reduce((s,c)=>s+getCardMinimum(c),0);\n  const ncExtInst=(State.installments||[]).filter(i=>!i.cardId&&getRemainingMonths(i)>0).reduce((s,i)=>s+i.monthlyAmt,0);\n  const ncTotal=ncFixed+ncMins+ncExtInst+savingsPlannedTotal(cid);\n  const neg=sts<0,deep=sts<-0.08*Math.max(cb,1);\n  const bg=neg?(deep?'var(--clay-d)':'var(--clay)'):'var(--green-d)';\n  const lblC=neg?'rgba(255,255,255,.82)':'#a9dcc4';\n  const msg=neg?(deep?'You\\u2019ve committed more than you hold. Trim a planned envelope below, or hold off spending until payday.':'Very tight \\u2014 your plan uses almost everything. Spend carefully until payday.'):'Yours to spend after planned bills, debt and savings are set aside for this cycle.';\n  const top=avalancheCard();\n  const tip=top?`Funnel any spare cash into <b>${esc(top.name)}<\u002Fb> first \\u2014 highest APR (${aprFmt(top.apr)}), so every extra \\u20ab there cuts the most interest.`:'No active card debt \\u2014 nicely done.';\n  const ob=activeCards().slice().filter(c=>{const dd=getCardDates(c);const d=daysUntil(dd);return (!cardPaidThisCycle(c)&&parseD(dd)<=nextPaydayOfCycleId(cid))||d<=14;}).sort((a,b)=>{const aP=cardPaidThisCycle(a)?1:0;const bP=cardPaidThisCycle(b)?1:0;if(aP!==bP)return aP-bP;return daysUntil(getCardDates(a))-daysUntil(getCardDates(b));});\n  const lqRisk=daysToPayday()<=5;\n  const recvTotal=State.accounts.filter(a=>a.type==='Receivable').reduce((s,a)=>s+Math.max(0,accountBalance(a)),0);\n  const recvBlock=recvTotal>0?`<div style=\"background:#eef6fc;border:1px solid #d4e6f4;border-radius:16px;padding:15px 16px\"><div class=\"row\" style=\"margin-bottom:5px\"><div style=\"display:flex;align-items:center;gap:8px\"><div class=\"dot\" style=\"background:#2b5c8f;width:6px;height:6px\"><\u002Fdiv><span class=\"lbl\" style=\"color:#2b5c8f\">People owe you<\u002Fspan><\u002Fdiv><span class=\"mono\" style=\"font-size:13px;color:#2b5c8f\">${fmt(recvTotal)}<\u002Fspan><\u002Fdiv><div style=\"font-size:12.5px;line-height:1.5;color:#3a5670\">Don\\u2019t forget to collect your receivables. Track and settle them in the Debt tab.<\u002Fdiv><\u002Fdiv>`:'';\n  const phase=userPhase();\n  const urgent=activeCards().filter(c=>cardDebt(c)>0&&!cardPaidThisCycle(c)).sort((a,b)=>daysUntil(getCardDates(a))-daysUntil(getCardDates(b)))[0];\n  const dfDate=debtFreeDate();const dfMo=monthsToDebtFree();\n  const dfLabel=dfDate?`${MON[dfDate.getMonth()]} ${dfDate.getFullYear()}`:(isFinite(dfMo)?dfMo+' mo':'pay > min');\n  const paidCt=cardsPaidThisCycleCount(),debtCt=cardsWithDebtCount();\n  const debtHero=`<div style=\"background:var(--ink);border-radius:20px;padding:22px 20px;color:#fff\"><div class=\"lbl\" style=\"color:${anyOverdueCard()?'#f0b6ae':'#9fb4a8'}\">${anyOverdueCard()?'\\u26a0 Payment overdue \\u2014 pay first':'Debt comes first'}<\u002Fdiv>${urgent?`<div style=\"font-weight:600;font-size:16px;margin-top:9px\">${esc(urgent.name)}<\u002Fdiv><div class=\"mono\" style=\"font-weight:500;font-size:34px;letter-spacing:-.02em;margin-top:3px;line-height:1\">${fmt(getCardMinimum(urgent))}<\u002Fdiv><div style=\"font-size:12.5px;color:#c2d3ca;margin-top:7px\">Minimum due ${fD(parseD(getCardDates(urgent)))} \\u00b7 ${(()=>{const d=daysUntil(getCardDates(urgent));return d<0?`<b style=\"color:#f0b6ae\">${Math.abs(d)} days overdue<\u002Fb>`:`in ${d} day${d===1?'':'s'}`;})()}<\u002Fdiv><button class=\"btn\" style=\"background:var(--green);color:#fff;margin-top:15px;padding:12px;width:100%\" data-action=\"pay\" data-id=\"${urgent.id}\">Pay ${esc(urgent.name)} now<\u002Fbutton>`:`<div class=\"mono\" style=\"font-weight:500;font-size:26px;margin-top:9px\">All minimums paid \\u2713<\u002Fdiv><div style=\"font-size:12.5px;color:#c2d3ca;margin-top:6px\">Every card is covered this cycle. Send any spare cash to your highest-APR card.<\u002Fdiv>`}<div style=\"margin-top:16px;background:rgba(255,255,255,.1);border-radius:13px;padding:12px 14px;display:flex;justify-content:space-between;gap:10px\"><div><div style=\"font-size:10px;color:#9fb4a8\">Paid this cycle<\u002Fdiv><div class=\"mono\" style=\"font-size:14px;margin-top:3px\">${paidCt} / ${debtCt} cards<\u002Fdiv><\u002Fdiv><div style=\"text-align:right\"><div style=\"font-size:10px;color:#9fb4a8\">Debt-free est.<\u002Fdiv><div class=\"mono\" style=\"font-size:14px;margin-top:3px\">${dfLabel}<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n  const gTotalSaved=State.goals.reduce((s,g)=>s+savedFor(g),0);const gTotalTarget=State.goals.reduce((s,g)=>s+(+g.target||0),0);const gSurplus=projectedSurplus(cid);\n  const goalHero=`<div style=\"background:var(--green-d);border-radius:20px;padding:22px 20px;color:#fff\"><div class=\"lbl\" style=\"color:#a9dcc4\">Saved toward goals<\u002Fdiv><div class=\"mono\" style=\"font-weight:500;font-size:36px;letter-spacing:-.02em;margin-top:6px;line-height:1\">${fmt(gTotalSaved)}<\u002Fdiv><div style=\"font-size:12.5px;color:#a9dcc4;margin-top:6px\">of ${fmt(gTotalTarget)} target \\u00b7 projected ${gSurplus>=0?'surplus':'gap'} ${fmt(Math.abs(gSurplus))} this cycle<\u002Fdiv><button class=\"btn\" style=\"background:rgba(255,255,255,.16);color:#fff;margin-top:14px;padding:11px;width:100%\" data-action=\"tab\" data-tab=\"goals\">Review goals \\u2192<\u002Fbutton><\u002Fdiv>`;\n  return `<div class=\"stack\" style=\"gap:14px\">\n    ${phase===1?debtHero:(phase===3?goalHero:'')}\n    <div style=\"background:${bg};border-radius:20px;padding:22px 20px;color:#fff\">\n      <div class=\"lbl\" style=\"color:${lblC}\">Safe to spend<\u002Fdiv>\n      <div class=\"mono\" style=\"font-weight:500;font-size:38px;letter-spacing:-.02em;margin-top:6px;line-height:1\">${fmt(sts)}<\u002Fdiv>\n      <div style=\"font-size:12.5px;line-height:1.45;color:${lblC};margin-top:8px\">${msg}<\u002Fdiv>\n      <div style=\"margin-top:16px;background:rgba(255,255,255,.13);border-radius:13px;padding:13px 14px\">\n        ${stsRow('Current balance (spendable)',fmt(cb))}\n        ${stsRow('− Planned bills left','\\u2212'+fmt(fixedRemaining(cid)))}\n        ${stsRow('− Planned debt left','\\u2212'+fmt(remainingDebt(cid)))}\n        ${newRevolvingDebtThisCycle(cid)>0?stsRow('− New card debt this cycle','\\u2212'+fmt(newRevolvingDebtThisCycle(cid))):''}\n        ${nonMonthlyRemaining(cid)>0?stsRow('− Sinking funds','\\u2212'+fmt(nonMonthlyRemaining(cid))):''}\n        ${stsRow('− Set aside for goals','\\u2212'+fmt(remainingGoals(cid)),true)}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn\" style=\"background:var(--ink);color:#fff;margin-top:0;padding:13px;width:100%;font-size:13px\" data-action=\"tab\" data-tab=\"insights\">📊 View Cashflow Insights<\u002Fbutton>\n    <div class=\"card\">\n      <div class=\"row\" style=\"margin-bottom:10px\"><span style=\"font-weight:600;font-size:13px;color:var(--ink)\">${daysToPayday()} days to payday<\u002Fspan><span style=\"font-size:11.5px;color:var(--faint)\">Next salary ${fD(nextPaydayOfCycleId(cid))}<\u002Fspan><\u002Fdiv>\n      <div class=\"bar\"><i style=\"width:${cycleProgress()}%\"><\u002Fi><\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:7px\"><span style=\"font-size:10.5px;color:var(--faint)\">Cycle ${fD(startOfCycleId(cid))}<\u002Fspan><span style=\"font-size:10.5px;color:${lqRisk?'var(--amber)':'var(--faint)'}\">${lqRisk?'High-liquidity-risk window':'On track'}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    ${interestReviewDue()?`<div style=\"background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:16px;padding:15px 16px\"><div class=\"row\" style=\"margin-bottom:6px\"><div style=\"display:flex;align-items:center;gap:8px\"><div class=\"dot\" style=\"background:var(--amber);width:6px;height:6px\"><\u002Fdiv><span class=\"lbl\" style=\"color:var(--amber-d)\">Quarterly interest check<\u002Fspan><\u002Fdiv><\u002Fdiv><div style=\"font-size:12.5px;line-height:1.5;color:#5c4a1a;margin-bottom:11px\">${daysSinceInterestReview()==null?'You haven\\u2019t reconciled your cards yet.':'It\\u2019s been '+daysSinceInterestReview()+' days since your last review.'} Interest &amp; fees accrue silently — reconcile each card so balances stay accurate.<\u002Fdiv><div style=\"display:flex;gap:8px\"><button class=\"btn btn-sm\" style=\"background:var(--amber-d);color:#fff\" data-action=\"review-interest\">Review &amp; reconcile<\u002Fbutton><button class=\"btn btn-sm\" style=\"background:#fff;border:1px solid var(--amber-bd);color:var(--amber-d)\" data-action=\"dismiss-interest\">Mark done<\u002Fbutton><\u002Fdiv><\u002Fdiv>`:''}\n    <div>\n      <div class=\"row\" style=\"margin:2px 2px 9px\"><span class=\"sublbl\">Upcoming obligations<\u002Fspan><span style=\"font-weight:500;font-size:11px;color:var(--red)\">Reserve ${fmt(remainingDebt(cid)+fixedRemaining(cid))}<\u002Fspan><\u002Fdiv>\n      <div class=\"stack\" style=\"gap:9px\">\n        ${ob.map(c=>{const dd=getCardDates(c);const st=cardStatus(c),m=STATUS[st],d=daysUntil(dd),paid=st==='Paid';const sub=paid?'Minimum paid this cycle':(d<0?`Overdue ${Math.abs(d)} days`:`Due in ${d} days`+(parseD(dd)<=nextPaydayOfCycleId(cid)?' · before payday':''));const payable=!paid&&parseD(dd)<=nextPaydayOfCycleId(cid);\n          return `<div class=\"row\" style=\"padding:13px 14px;border-radius:13px;background:${m.bg};border:1px solid ${m.bd}\"><div style=\"display:flex;align-items:center;gap:11px\"><div class=\"dot\" style=\"background:${m.dot};width:8px;height:8px\"><\u002Fdiv><div><div style=\"font-weight:600;font-size:13px;color:var(--ink)\">${esc(c.name)}<\u002Fdiv><div style=\"font-size:11px;color:${m.sub}\">${sub}<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:9px\"><span class=\"mono\" style=\"font-size:12.5px;color:var(--ink2)\">min ${fmt(getCardMinimum(c))}<\u002Fspan>${paid?`<button class=\"btn btn-sm\" style=\"background:#eef1ec;color:var(--muted)\" data-action=\"undo-pay\" data-id=\"${c.id}\">Undo<\u002Fbutton>`:(payable?`<button class=\"btn btn-sm\" style=\"background:var(--green);color:#fff\" data-action=\"pay\" data-id=\"${c.id}\">Pay<\u002Fbutton>`:'')}<\u002Fdiv><\u002Fdiv>`;}).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${recvBlock}\n    <div class=\"card\" style=\"background:#f4f7fb;border:1px solid #dde7f1\"><div class=\"row\" style=\"margin-bottom:4px\"><span class=\"lbl\" style=\"color:#3a5670\">Next cycle heads-up<\u002Fspan><span class=\"mono\" style=\"font-size:13px;color:#2b5c8f\">≈ ${fmtShort(ncTotal)}<\u002Fspan><\u002Fdiv><div style=\"font-size:11.5px;color:#3a5670;line-height:1.5\">Starting ${fD(nextPaydayOfCycleId(cid))}, expect roughly <b>${fmt(ncTotal)}<\u002Fb> in fixed bills, card minimums${ncExtInst>0?', loan installments':''} and planned savings. Keep that much of your next paycheck spoken for.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:16px;padding:15px 16px\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><div class=\"dot\" style=\"background:var(--amber);width:6px;height:6px\"><\u002Fdiv><span class=\"lbl\" style=\"color:var(--amber-d)\">Debt strategy<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.5;color:#5c4a1a\">${tip}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction spendBudget(cid){return (State.budgets[cid]||[]).filter(b=>(b.type==='Fixed'&&!b.isDebt)||b.type==='Flexible'||b.type==='Non-Monthly').reduce((s,b)=>s+(+b.planned||0),0);}\nfunction budgetForCat(cid,cat){const it=(State.budgets[cid]||[]).find(b=>b.category===cat&&!b.isDebt);return it?(+it.planned||0):0;}\nfunction getInsightsData(){\n  let cycles=[];let curr=currentCycleId();\n  for(let i=5;i>=0;i--){let cid=shiftCycle(curr,-i);const income=actualIncome(cid),expense=cycleSpent(cid);\n    cycles.push({cid:cid,label:MON[startOfCycleId(cid).getMonth()],income:income,expense:expense,budget:spendBudget(cid),net:cycleNet(cid)});}\n  return cycles;\n}\n/* ---- ZBB macro layers: bucket every out-flow into 4 command-center layers ---- */\nconst MACRO_LAYERS=['Flexible','Needs','Debt & Fixed','Goals & Savings'];\nconst MACRO_META={\n  'Debt & Fixed':{c:'#46544e',lbl:'Debt & Fixed'},\n  'Goals & Savings':{c:'var(--green)',lbl:'Savings & Goals'},\n  'Needs':{c:'#828b85',lbl:'Needs'},\n  'Flexible':{c:'#cfd6cf',lbl:'Guilt-Free (Flex)'}\n};\nfunction savingsAccIds(){return State.accounts.filter(a=>a.type==='Savings').map(a=>a.id);}\n/* Strict 4-layer mapping — every out-flow resolves to exactly one command-center layer\n   (or null to be ignored). No hardcoded category table: budget TYPE drives the bucket,\n   so custom categories can never fall through the cracks. */\nfunction getMacroLayer(t){\n  if(t.type==='transfer'){const a=State.accounts.find(x=>x.id===t.to);return (a&&a.type==='Savings')?'Goals & Savings':null;}\n  if(t.type==='cc_charge'||t.type==='expense'){\n    if(t.exclude||t.category==='Balance adjustment')return null;\n    if(t.category==='Debt service')return 'Debt & Fixed';\n    const b=(State.budgets[t.cid]||[]).find(x=>x.category===t.category);\n    const bType=b?b.type:'Flexible';\n    if(bType==='Fixed'){return (t.category.includes('Health')||t.category.includes('Medical'))?'Needs':'Debt & Fixed';}\n    if(bType==='Non-Monthly')return 'Goals & Savings';\n    return 'Flexible';\n  }\n  return null;\n}\nfunction cycleAllocation(cid){\n  const layers={'Debt & Fixed':0,'Goals & Savings':0,'Needs':0,'Flexible':0};\n  State.transactions.forEach(t=>{if(t.cid!==cid)return;const m=getMacroLayer(t);if(m)layers[m]+=Math.abs(t.amount);});\n  return layers;\n}\nfunction ledgerFor(cid,macro){\n  return State.transactions.filter(t=>{if(t.cid!==cid)return false;const m=getMacroLayer(t);if(!m)return false;if(macro==null||macro==='')return true;return m===macro;}).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));\n}\nfunction renderInsights(){\n  const data=getInsightsData();\n  const sel=UI.filterCid||currentCycleId();\n  const macro=UI.filterMacro||null;\n  const alloc=data.map(c=>{const layers=cycleAllocation(c.cid);const allocTotal=MACRO_LAYERS.reduce((s,k)=>s+layers[k],0);return {...c,layers,allocTotal};});\n  const focus=alloc.find(x=>x.cid===sel)||alloc[alloc.length-1];\n  const maxVal=Math.max(1,...alloc.map(a=>Math.max(a.income,a.allocTotal)));\n  // ---- pure-SVG grouped + stacked bar chart ----\n  const W=344,H=232,padX=8,padTop=14,padBottom=44;\n  const plotH=H-padTop-padBottom,base=padTop+plotH,slotW=(W-2*padX)/6;\n  const incomeW=13,allocW=22,innerGap=6,groupW=incomeW+innerGap+allocW,off=(slotW-groupW)/2;\n  const sc=v=>v/maxVal*plotH;\n  let bars='';\n  alloc.forEach((a,i)=>{\n    const x0=padX+i*slotW+off,incX=x0,alX=x0+incomeW+innerGap,on=a.cid===sel;\n    if(on)bars+=`<rect x=\"${(padX+i*slotW).toFixed(1)}\" y=\"${padTop-4}\" width=\"${slotW.toFixed(1)}\" height=\"${plotH+8}\" rx=\"8\" fill=\"#f3f5f1\"><\u002Frect>`;\n    const ih=Math.max(0,sc(a.income));\n    bars+=`<rect data-action=\"filter-ledger\" data-cid=\"${a.cid}\" data-macro=\"Income\" x=\"${incX.toFixed(1)}\" y=\"${(base-ih).toFixed(1)}\" width=\"${incomeW}\" height=\"${ih.toFixed(1)}\" rx=\"2\" fill=\"#1c2521\" opacity=\"${(macro==='Income'&&on)?1:(macro&&macro!=='Income'?0.28:0.82)}\" style=\"cursor:pointer\"><\u002Frect>`;\n    let cy=base;\n    MACRO_LAYERS.forEach(k=>{const v=a.layers[k];if(v<=0)return;let h=sc(v);if(h<8)h=8;const y=cy-h;const seld=(on&&macro===k);\n      bars+=`<rect data-action=\"filter-ledger\" data-cid=\"${a.cid}\" data-macro=\"${k}\" x=\"${alX.toFixed(1)}\" y=\"${y.toFixed(1)}\" width=\"${allocW}\" height=\"${h.toFixed(1)}\" fill=\"${MACRO_META[k].c}\" opacity=\"${macro==null?0.92:(seld?1:0.28)}\" stroke=\"${seld?'#1c2521':'none'}\" stroke-width=\"${seld?1.5:0}\" style=\"cursor:pointer\"><\u002Frect>`;\n      cy=y;});\n    if(a.allocTotal<=0)bars+=`<rect x=\"${alX.toFixed(1)}\" y=\"${base-8}\" width=\"${allocW}\" height=\"8\" rx=\"2\" fill=\"#e6e9e4\"><\u002Frect>`;\n    bars+=`<rect data-action=\"filter-ledger\" data-cid=\"${a.cid}\" data-macro=\"\" x=\"${(padX+i*slotW).toFixed(1)}\" y=\"${base+2}\" width=\"${slotW.toFixed(1)}\" height=\"${padBottom-4}\" fill=\"transparent\" style=\"cursor:pointer\"><\u002Frect>`;\n    bars+=`<text x=\"${(x0+groupW/2).toFixed(1)}\" y=\"${base+18}\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"${on?700:500}\" fill=\"${on?'#1c2521':'#828b85'}\">${a.label}<\u002Ftext>`;\n    bars+=`<text x=\"${(x0+groupW/2).toFixed(1)}\" y=\"${base+32}\" text-anchor=\"middle\" font-size=\"9\" fill=\"${a.net>=0?'#15875a':'#c43d33'}\">${a.net<0?'\\u2212':''}${fmtShort(Math.abs(a.net))}<\u002Ftext>`;\n  });\n  const chart=`<svg viewBox=\"0 0 ${W} ${H}\" width=\"100%\" preserveAspectRatio=\"xMidYMid meet\" style=\"display:block\">\n    <line x1=\"${padX}\" y1=\"${base}\" x2=\"${W-padX}\" y2=\"${base}\" stroke=\"#ebeee9\" stroke-width=\"1\"><\u002Fline>\n    ${bars}\n  <\u002Fsvg>`;\n  const legend=`<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px\">${MACRO_LAYERS.map(k=>{const on=macro===k;const amt=focus?focus.layers[k]:0;\n    return `<div data-action=\"filter-ledger\" data-cid=\"${sel}\" data-macro=\"${k}\" style=\"cursor:pointer;display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:11px;border:1px solid ${on?'#1c2521':'var(--line)'};background:${on?'#f3f5f1':'#fff'}\"><span style=\"width:11px;height:11px;border-radius:3px;background:${MACRO_META[k].c};flex:none\"><\u002Fspan><span style=\"min-width:0\"><span style=\"display:block;font-size:11.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${MACRO_META[k].lbl}<\u002Fspan><span class=\"mono\" style=\"font-size:10.5px;color:var(--faint)\">${fmtShort(amt)}<\u002Fspan><\u002Fspan><\u002Fdiv>`;}).join('')}<\u002Fdiv>`;\n  const rows=ledgerFor(sel,macro);\n  const total=rows.reduce((s,t)=>s+Math.abs(t.amount),0);\n  const macroLbl=macro?((MACRO_META[macro]||{}).lbl||macro):'All out-flows';\n  const ledgerRows=rows.length?rows.map(t=>{const m=getMacroLayer(t);const meta=t.type==='transfer'?`${accName(t.from)} \\u2192 ${accName(t.to)}`:(t.type==='cc_charge'?`on ${accName(t.to)}`:(t.type==='cc_payment'?`${accName(t.from)} \\u2192 ${accName(t.to)}`:accName(t.from||t.to)));const mc=(MACRO_META[m]||{}).c||'#6f7a73';\n    return `<div class=\"row\" style=\"padding:12px 14px;border-bottom:1px solid #f3f5f1\"><div style=\"min-width:0\"><div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:8px;height:8px;border-radius:2px;background:${mc};flex:none\"><\u002Fspan><span style=\"font-weight:500;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${esc(t.category)}<\u002Fspan><\u002Fdiv><div style=\"font-size:10.5px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${fD(parseD(t.date))} \\u00b7 ${esc(t.note||meta)}<\u002Fdiv><\u002Fdiv><span class=\"mono\" style=\"font-size:13px;color:var(--ink2);flex:none;margin-left:10px\">\\u2212${fmtShort(Math.abs(t.amount))}<\u002Fspan><\u002Fdiv>`;}).join(''):`<div style=\"text-align:center;padding:26px;color:var(--faint);font-size:12.5px\">No ${macro?esc(macro.toLowerCase()):'out-flow'} transactions in ${focus?focus.label:'this'} cycle.<\u002Fdiv>`;\n  const clearBtn=macro?`<div data-action=\"clear-filter\" style=\"cursor:pointer;font-size:11px;font-weight:600;color:var(--green-d);background:#e9f4ee;border-radius:999px;padding:6px 12px;flex:none\">Clear \\u2715<\u002Fdiv>`:'';\n  return `<div class=\"stack\" style=\"gap:14px\">\n    <div class=\"row\" style=\"padding:0 2px\"><div style=\"display:flex;align-items:center;gap:9px;cursor:pointer\" data-action=\"tab\" data-tab=\"home\"><div class=\"navarrow\">\\u2039<\u002Fdiv><span style=\"font-weight:600;font-size:15px;color:var(--ink)\">Command Center<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"row\" style=\"margin-bottom:8px;align-items:flex-start\"><div><div style=\"font-weight:700;font-size:14px;color:var(--ink)\">Income vs Allocation<\u002Fdiv><div style=\"font-size:10.5px;color:var(--faint);margin-top:2px\">Last 6 cycles \\u00b7 tap a block or chip to inspect<\u002Fdiv><\u002Fdiv><span class=\"badge\" style=\"background:${sel===currentCycleId()?'#e9f4ee':'#eef1ec'};color:${sel===currentCycleId()?'var(--green-d)':'var(--muted)'}\">${cycleLabel(sel)}<\u002Fspan><\u002Fdiv>\n      ${chart}\n      <div style=\"display:flex;justify-content:center;gap:18px;margin-top:8px\"><span style=\"display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)\"><span style=\"width:9px;height:9px;border-radius:2px;background:#1c2521\"><\u002Fspan>Income<\u002Fspan><span style=\"display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)\"><span style=\"width:9px;height:9px;border-radius:2px;background:linear-gradient(#46544e,#cfd6cf)\"><\u002Fspan>Allocation stack<\u002Fspan><\u002Fdiv>\n      <div style=\"text-align:center;font-size:9.5px;color:var(--faint);margin-top:5px;line-height:1.4\">The ± figure under each month is net cash (income − spending) — not income minus the allocation stack, which also reserves debt payments &amp; savings.<\u002Fdiv>\n      ${legend}\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:0;overflow:hidden\">\n      <div class=\"row\" style=\"padding:15px 16px 13px\"><div style=\"min-width:0\"><div style=\"font-weight:700;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:7px\"><span style=\"width:9px;height:9px;border-radius:2px;background:${(MACRO_META[macro]||{}).c||'#6f7a73'};flex:none\"><\u002Fspan>${esc(macroLbl)}<\u002Fdiv><div style=\"font-size:10.5px;color:var(--faint);margin-top:3px\">${cycleLabel(sel)} \\u00b7 ${rows.length} item${rows.length===1?'':'s'} \\u00b7 ${fmtShort(total)}<\u002Fdiv><\u002Fdiv>${clearBtn}<\u002Fdiv>\n      ${ledgerRows}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction cycleSwitcher(){const id=UI.viewCycle,isCur=id===currentCycleId();return `<div class=\"card\" style=\"padding:11px 13px\"><div class=\"row\"><div class=\"navarrow\" data-action=\"cycle\" data-d=\"-1\">‹<\u002Fdiv><div style=\"text-align:center\"><div style=\"font-weight:600;font-size:13px;color:var(--ink)\">${cycleLabel(id)}<\u002Fdiv><div style=\"font-size:10px;color:var(--faint)\">${isCur?'Current cycle':(startOfCycleId(id)>new Date()?'Future cycle':'Past cycle')}<\u002Fdiv><\u002Fdiv><div class=\"navarrow\" data-action=\"cycle\" data-d=\"1\">›<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;}\n\n// editable planned input\nfunction plannedField(cid,kind,key,val,floor){return `<input class=\"seamless-input amt-fmt\" type=\"text\" inputmode=\"numeric\" data-plan=\"${kind}\" data-cid=\"${cid}\" data-key=\"${key}\" value=\"${groupNum(String(Math.round(val)))}\"${floor!=null?` data-floor=\"${floor}\"`:''} style=\"width:108px\">`;}\n\nfunction groupBlock(cid,type,items){\n  const editable=cid>=currentCycleId(); // can edit current & future cycles\n  const planned=items.reduce((s,i)=>s+i.eff,0);\n  const actual=items.reduce((s,i)=>s+i.actual,0);\n  const rem=planned-actual;\n  return `<div class=\"card\" data-group=\"${type}\">\n    <div class=\"row\" style=\"margin-bottom:14px\"><span style=\"font-weight:600;font-size:14px;color:var(--ink)\">${type}<\u002Fspan><span style=\"font-weight:600;font-size:12px;color:${rem<0?'var(--red)':'var(--green)'}\" data-rem=\"${type}\">${fmtShort(rem)} left<\u002Fspan><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px\">\n      ${items.map(i=>{const pct=Math.min(100,Math.round(i.actual/(i.eff||1)*100));const bc=i.actual>i.eff?'var(--red)':(i.eff&&i.actual/i.eff>0.85?'#d9a330':'var(--green)');\n        return `<div><div class=\"row\" style=\"margin-bottom:6px\"><div style=\"display:flex;align-items:center;gap:7px;min-width:0\"><span style=\"font-weight:500;font-size:12.5px;color:var(--ink)\">${esc(i.label)}<\u002Fspan>${i.badge?`<span class=\"badge\" style=\"background:${i.badgeBg};color:${i.badgeC}\">${i.badge}<\u002Fspan>`:''}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px\"><span class=\"mono\" style=\"font-size:11px;color:var(--faint)\">${fmt(i.actual)} /<\u002Fspan>${editable?plannedField(cid,i.kind,i.key,i.planned,i.floor):`<span class=\"mono\" style=\"font-size:12px;color:var(--ink2)\">${fmt(i.eff)}<\u002Fspan>`}${editable&&i.kind==='item'?`<button class=\"del\" data-action=\"edit-cat\" data-cid=\"${cid}\" data-id=\"${i.key}\" style=\"margin-left:4px;color:var(--green-d)\">Edit<\u002Fbutton><button class=\"del\" data-action=\"del-cat\" data-cid=\"${cid}\" data-id=\"${i.key}\" style=\"margin-left:2px\">✕<\u002Fbutton>`:''}<\u002Fdiv><\u002Fdiv>\n          <div class=\"bar\" style=\"height:6px\"><i style=\"width:${pct}%;background:${bc}\"><\u002Fi><\u002Fdiv>\n          ${i.sub?`<div style=\"font-size:10px;color:var(--faint);margin-top:4px\">${i.sub}<\u002Fdiv>`:''}<\u002Fdiv>`;}).join('')}\n      ${editable?`<div class=\"miniadd\" data-action=\"add-cat\" data-cid=\"${cid}\" data-type=\"${type}\">+ Add ${type.toLowerCase()} category<\u002Fdiv>`:''}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction renderBudget(){\n  const cid=UI.viewCycle;\n  if(!State.budgets[cid]){\n    const prev=State.budgets[shiftCycle(cid,-1)]?cycleLabel(shiftCycle(cid,-1)):null;\n    return `<div class=\"stack\" style=\"gap:14px\">${cycleSwitcher()}<div class=\"card\" style=\"text-align:center;padding:28px 18px\"><div style=\"font-weight:600;font-size:15px;color:var(--ink)\">No budget for this cycle yet<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);margin:8px 0 16px;line-height:1.5\">Start a fresh budget for ${cycleLabel(cid)}${prev?` by cloning planned amounts from ${prev}`:''}.<\u002Fdiv><button class=\"btn btn-pri\" style=\"width:auto;padding:12px 18px\" data-action=\"create-budget\">+ Create budget for this cycle<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n  }\n  // build display items per group\n  const fixedDisp=groupItems(cid,'Fixed').map(b=>{\n    if(b.isDebt){const eff=plannedDebt(cid),fl=debtFloor(cid);return {label:catLabel('Debt payments'),kind:'debt',key:b.id,planned:b.planned,eff,actual:debtPaidThisCycle(cid),floor:fl,badge:'FLOOR '+fmtShort(fl),badgeBg:'#fbeede',badgeC:'#a8790f',sub:'Minimum is the floor; plan higher to attack high-APR cards (Avalanche).'};}\n    return {label:catLabel(b.category),kind:'item',key:b.id,planned:b.planned,eff:b.planned,actual:spentForCategory(b.category,cid),badge:b.required?'REQUIRED':'',badgeBg:'#f0ece0',badgeC:'#a8790f'};\n  });\n  const flexDisp=groupItems(cid,'Flexible').map(b=>({label:catLabel(b.category),kind:'item',key:b.id,planned:b.planned,eff:b.planned,actual:spentForCategory(b.category,cid)}));\n  const nmDisp=groupItems(cid,'Non-Monthly').map(b=>({label:catLabel(b.category),kind:'item',key:b.id,planned:b.planned,eff:b.planned,actual:spentForCategory(b.category,cid)}));\n  const transfers=transfersToSavingsThisCycle(cid);\n  const savDisp=State.goals.map(g=>{const planned=plannedSavingFor(cid,g.id);const saved=savedFor(g);const hasTarget=(+g.target||0)>0;const prog=hasTarget?Math.min(100,Math.round(saved/g.target*100)):null;return {label:(g.icon?g.icon+' ':'')+g.name,kind:'saving',key:g.id,planned,eff:planned,actual:0,sub:`Saved ${fmt(saved)}`+(hasTarget?` of ${fmt(g.target)} · ${prog}%`:''),_goal:true};});\n  // savings actual is group-level (transfers); show group remaining = planned - transfers\n  const editable=cid>=currentCycleId();\n  const incItems=incomePlanItems(cid);\n  const plInc=plannedIncome(cid),acInc=actualIncome(cid);\n  const surplus=projectedSurplus(cid);\n  const incField=i=>editable?`<input class=\"seamless-input amt-fmt\" type=\"text\" inputmode=\"numeric\" data-plan=\"income\" data-cid=\"${cid}\" data-key=\"${i.id}\" value=\"${groupNum(String(Math.round(i.planned||0)))}\" style=\"width:108px\">`:`<span class=\"mono\" style=\"font-size:12px;color:var(--ink2)\">${fmt(i.planned)}<\u002Fspan>`;\n  const incomeBlock=`<div class=\"card\" data-group=\"Income\">\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:14px;color:var(--ink)\">Income plan<\u002Fspan><span style=\"font-weight:600;font-size:12px;color:var(--green)\">${fmt(acInc)} in<\u002Fspan><\u002Fdiv>\n    <div style=\"font-size:10.5px;color:var(--faint);margin-bottom:13px\">Received ${fmt(acInc)} of <span data-rem=\"IncomePlanned\">${fmt(plInc)}<\u002Fspan> planned this cycle<\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px\">\n      ${incItems.map(i=>`<div class=\"row\"><div style=\"display:flex;align-items:center;gap:7px;min-width:0\"><span style=\"font-weight:500;font-size:12.5px;color:var(--ink)\">${esc(i.source)}<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:6px\"><span style=\"font-size:10px;color:var(--faint)\">plan<\u002Fspan>${incField(i)}${editable?`<button class=\"del\" data-action=\"del-income\" data-cid=\"${cid}\" data-id=\ 'var(--faint)':'#fff'}\" data-action=\"settle\" data-id=\"${a.id}\"${settled?' disabled':''}>${settled?'Paid \\u2713':'Settle / Paid'}<\u002Fbutton><button class=\"del\" data-action=\"edit-person\" data-id=\"${a.id}\" style=\"margin-left:8px\">Edit<\u002Fbutton><button class=\"del\" data-action=\"del-person\" data-id=\"${a.id}\" style=\"margin-left:6px\">✕<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;};\n  let recvHtml=activeOwes.length?activeOwes.map(recvRow).join(''):`<div style=\"font-size:11.5px;color:var(--faint);text-align:center;padding:8px 4px\">No one owes you right now. Use Split bill when logging to track reimbursements.<\u002Fdiv>`;\n  if(settledOwes.length){recvHtml+=`<details style=\"margin-top:8px\"><summary style=\"font-size:12px;color:var(--muted);cursor:pointer;user-select:none;padding:6px 0\">Settled &amp; Inactive (${settledOwes.length})<\u002Fsummary><div class=\"stack\" style=\"gap:9px;margin-top:8px;opacity:0.6\">${settledOwes.map(recvRow).join('')}<\u002Fdiv><\u002Fdetails>`;}\n  return `<div class=\"stack\" style=\"gap:14px\">\n    <div style=\"margin:2px 2px 0\"><div style=\"font-weight:700;font-size:14px;color:var(--ink);letter-spacing:-.01em\">Credit cards<\u002Fdiv><div style=\"font-size:11px;color:var(--faint);margin-top:2px\">Avalanche order — highest APR gets attacked first<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:var(--ink);border-radius:16px;padding:18px;color:#fff\"><div class=\"lbl\" style=\"color:#9fb4a8\">Total card debt<\u002Fdiv><div class=\"mono\" style=\"font-weight:500;font-size:27px;margin-top:6px;letter-spacing:-.02em\">${fmt(tot)}<\u002Fdiv><div style=\"font-size:12px;color:#c2d3ca;margin-top:7px\">≈ ${fmt(monthlyInterest())}/month in interest if you pay minimums only<\u002Fdiv><\u002Fdiv>\n    ${tot>0?`<div class=\"card\"><div class=\"row\" style=\"margin-bottom:10px\"><span style=\"font-weight:600;font-size:13px;color:var(--ink)\">Payoff plan<\u002Fspan><span class=\"badge\" style=\"background:#e9f4ee;color:var(--gre f'},Low:{bg:'#e9f4ee',c:'#15875a'}};\nfunction renderGoals(){\n  const cid=currentCycleId();\n  const goals=State.goals;\n  const linkCount={};goals.forEach(g=>{if(g.linkedAccountId)linkCount[g.linkedAccountId]=(linkCount[g.linkedAccountId]||0)+1;});\n  /* savedFor / goalAccount are global helpers — goal progress = linked savings account balance */\n  const totalSaved=goals.reduce((s,g)=>s+savedFor(g),0);\n  const totalTarget=goals.reduce((s,g)=>s+(+g.target||0),0);\n  const totPct=totalTarget?Math.min(100,Math.round(totalSaved/totalTarget*100)):0;\n  const monthlyTotal=goals.reduce((s,g)=>s+plannedSavingFor(cid,g.id),0);\n  const header=`<div style=\"background:var(--green-d);border-radius:20px;padding:22px 20px;color:#fff\">\n    <div class=\"lbl\" style=\"color:#a9dcc4\">Total saved across goals<\u002Fdiv>\n    <div class=\"mono\" style=\"font-weight:500;font-size:34px;letter-spacing:-.02em;margin-top:6px;line-height:1\">${fmt(totalSaved)}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#a9dcc4;margin-top:6px\">of ${fmt(totalTarget)} target \\u00b7 ${totPct}%<\u002Fdiv>\n    <div class=\"bar\" style=\"height:8px;background:rgba(255,255,255,.18);margin-top:14px\"><i style=\"width:${totPct}%;background:#7fe3b4\"><\u002Fi><\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#a9dcc4;margin-top:10px\">Setting aside ${fmt(monthlyTotal)} this cycle \\u00b7 planned in Budget<\u002Fdiv>\n  <\u002Fdiv>`;\n  const cards=goals.length?goals.map(g=>{\n    const cur=savedFor(g),tgt=+g.target||0;\n    const linked=!!goalAccount(g);\n    const dangling=!!(g.linkedAccountId&&!State.accounts.find(a=>a.id===g.linkedAccountId));\n    const shared=!!(g.linkedAccountId&&linkCount[g.linkedAccountId]>1);\n    const pct=tgt?Math.min(100,Math.round(cur/tgt*100)):0;\n    const remain=Math.max(0,tgt-cur);\n    const planned=plannedSavingFor(cid,g.id);\n    const eta=planned>0&&remain>0?Math.ceil(remain/planned):null;\n    const p=PRIO[g.priority]||PRIO.Medium;\n    const done=pct>=100;\n    return `<div class=\"card\" style=\"padding:18px\">\n      <div class=\"row\" style=\"margin-bottom:14px;gap:10px;align-items:center\">\n        <div style=\"width:38px;height:38px;border-radius:11px;background:#eef4ef;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none\">${g.icon||'🎯'}<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"margin-bottom:5px\">Goal name<\u002Fdiv><input class=\"seamless-text\" data-bind=\"goal\" data-id=\"${g.id}\" data-f=\"name\" value=\"${esc(g.name)}\" placeholder=\"Goal name\" style=\"font-size:15px;width:100%\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:5px\">Priority<\u002Fdiv><select data-bind=\"goal\" data-id=\"${g.id}\" data-f=\"priority\" style=\"width:auto;padding:6px 26px 6px 9px;font-size:11px;font-weight:600;border-radius:8px;background:${p.bg};color:${p.c};border:none\">${GOAL_PRIORITIES.map(x=>`<option ${g.priority===x?'selected':''}>${x}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"align-items:flex-end;margin-bottom:10px\">\n        <div style=\"min-width:0\"><div class=\"mono\" style=\"font-weight:500;font-size:26px;color:var(--ink2);line-height:1\">${fmt(cur)}<\u002Fdiv><div style=\"font-size:11px;color:var(--faint);margin-top:3px\">saved of ${fmt(tgt)}<\u002Fdiv><\u002Fdiv>\n        <div class=\"mono\" style=\"font-weight:600;font-size:20px;color:${done?'var(--green)':'var(--green-d)'}\">${pct}%<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bar\" style=\"height:10px;margin-bottom:13px\"><i style=\"width:${pct}%;background:var(--green)\"><\u002Fi><\u002Fdiv>\n      <div class=\"row\" style=\"gap:10px;margin-bottom:13px\">\n        <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:9.5px;margin-bottom:4px\">Saved so far · ${linked?'auto':'manual'}<\u002Fdiv>${linked?`<div class=\"mono\" style=\"font-size:13.5px;color:var(--ink);font-weight:600\">${fmt(c
