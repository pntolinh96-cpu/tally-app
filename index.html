-plan=\"saving\" data-cid=\"${cid}\" data-key=\"${g.id}\" value=\"${groupNum(String(Math.round(planned)))}\" class=\"seamless-input amt-fmt\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"row\" style=\"gap:8px\"><span style=\"font-size:11px;color:var(--muted);min-width:0\">${done?'Goal reached \\u2713':(eta?`${fmt(remain)} to go \\u00b7 ~${eta} cycle${eta>1?'s':''} at ${fmt(planned)}/cycle`:`${fmt(remain)} to go`)}<\u002Fspan><button class=\"del\" data-action=\"del-goal\" data-id=\"${g.id}\">Remove<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join(''):`<div class=\"card\" style=\"text-align:center;padding:30px 18px\"><div style=\"font-weight:600;font-size:15px;color:var(--ink)\">No goals yet<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.5\">Add a savings goal or sinking fund to start tracking your progress.<\u002Fdiv><\u002Fdiv>`;\n  const phase1Note=userPhase()===1?`<div class=\"note\" style=\"background:var(--amber-bg);border:1px solid var(--amber-bd);color:#5c4a1a;line-height:1.5\">You\\u2019re still clearing debt \\u2014 park a small starter buffer (\\u20ab3\\u20135M) for emergencies so a surprise doesn\\u2019t become new debt. Full goals take priority once debt is under control.<\u002Fdiv>`:'';\n  return `<div class=\"stack\" style=\"gap:14px\">\n    ${phase1Note}\n    ${header}\n    <div style=\"font-size:11.5px;color:var(--muted);padding:0 2px;line-height:1.5\">Set a goal's name, target and priority here. <b>Saved so far<\u002Fb> reads the balance of the goal's <b>linked savings account<\u002Fb> below (so every transfer into it counts); plan the monthly amount in the <b>Budget<\u002Fb> tab.<\u002Fdiv>\n    ${cards}\n    <div class=\"miniadd\" data-action=\"add-goal\" style=\"padding:13px\">+ Add goal<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction renderHistory(){\n  const cid=UI.viewCycle;\n  const ft=UI.histType||'all';\n  const FILT=[['all','All'],['income','Income'],['expense','Expense'],['transfer','Transfer'],['card','Card']];\n  let txs=State.transactions.filter(t=>t.cid===cid);\n  if(ft!=='all')txs=txs.filter(t=>ft==='card'?(t.type==='cc_charge'||t.type==='cc_payment'):t.type===ft);\n  txs=txs.slice().sort((a,b)=>parseD(b.date)-parseD(a.date));\n  const chipsRow=`<div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px\">${FILT.map(([k,l])=>`<div data-action=\"hist-filter\" data-type=\"${k}\" style=\"cursor:pointer;font-size:11px;font-weight:600;padding:6px 11px;border-radius:999px;border:1px solid ${ft===k?'var(--green)':'var(--line)'};background:${ft===k?'#e9f4ee':'#fff'};color:${ft===k?'var(--green-d)':'var(--muted)'}\">${l}<\u002Fdiv>`).join('')}<\u002Fdiv>`;\n  const TY={income:{c:'#15875a',bg:'#e9f4ee',l:'Income'},expense:{c:'#6f7a73',bg:'#f3f5f1',l:'Expense'},transfer:{c:'#3a6ea5',bg:'#eef2f6',l:'Transfer'},cc_charge:{c:'#a8790f',bg:'#fbf6ea',l:'Card'},cc_payment:{c:'#15875a',bg:'#e9f4ee',l:'Payment'},adjustment:{c:'#6b4ea5',bg:'#efe9fb',l:'Adjust'}};\n  const rows=txs.length?txs.slice(0,historyRenderLimit).map(t=>{const ty=TY[t.type]||TY.expense;const inflow=(t.type==='income')||(t.type==='adjustment'&&t.amount>0);const sign=inflow?'+':(t.type==='transfer'||t.type==='cc_charge'?'':'\\u2212');const amt=(t.type==='adjustment'&&t.amount<0?'\\u2212':sign)+'\\u20ab'+Math.abs(t.amount).toLocaleString('en-US');const meta=t.type==='transfer'?`${accName(t.from)} → ${accName(t.to)}`:(t.type==='cc_charge'?`on ${accName(t.to)}`:(t.type==='cc_payment'?`${accName(t.from)} → ${accName(t.to)}`:accName(t.from||t.to)));\n    return `<div class=\"row tx-item\" style=\"padding:12px 14px;border-bottom:1px solid #f3f5f1\"><div style=\"min-width:0\"><div style=\"display:flex;align-items:center;gap:7px\"><span style=\"font-weight:500;font-size:12.5px;color:var(--ink)\">${esc(t.category)}<\u002Fspan><span class=\"badge\" style=\"background:${ty.bg};color:${ty.c}\">${ty.l}<\u002Fspan><\u002Fdiv><div style=\"font-size:10.5px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${fD(parseD(t.date))} · ${esc(t.note||meta)}<\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:11px\"><span class=\"mono\" style=\"font-size:13px;color:${inflow?'var(--green)':'var(--ink2)'}\">${amt}<\u002Fspan><button class=\"del\" data-action=\"edit-tx\" data-id=\"${t.id}\" style=\"color:var(--green-d)\">Edit<\u002Fbutton><button class=\"del\" data-action=\"del-tx\" data-id=\"${t.id}\">Delete<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;}).join(''):`<div style=\"text-align:center;padding:30px;color:var(--faint);font-size:13px\">No transactions in this cycle.<\u002Fdiv>`;\n  const more=txs.length>historyRenderLimit?`<button class=\"btn\" data-action=\"load-more-history\" style=\"background:#e9f4ee;color:var(--green-d);width:100%;border:none;border-top:1px solid #f3f5f1;padding:13px;border-radius:0\">Load 50 more<\u002Fbutton>`:'';\n  return `<div class=\"stack\" style=\"gap:14px\"><div class=\"row\" style=\"padding:0 2px\"><div style=\"display:flex;align-items:center;gap:9px;cursor:pointer\" data-action=\"tab\" data-tab=\"accounts\"><div class=\"navarrow\">‹<\u002Fdiv><span style=\"font-weight:600;font-size:15px;color:var(--ink)\">Transaction history<\u002Fspan><\u002Fdiv><\u002Fdiv>${cycleSwitcher()}<div style=\"font-size:11.5px;color:var(--muted);padding:0 2px;line-height:1.5\">${txs.length} transaction${txs.length===1?'':'s'} · deleting one instantly restores the affected balances and budget.<\u002Fdiv><input type=\"text\" id=\"hist-search\" class=\"seamless-input\" placeholder=\"Search history…\" style=\"margin-bottom:15px;background:#f8faf7;padding:8px 12px;border:1px solid #eef1ec;border-radius:8px;text-align:left;font-family:inherit;color:var(--ink)\">${chipsRow}<div class=\"card\" style=\"padding:0;overflow:hidden\">${rows}${more}<\u002Fdiv><\u002Fdiv>`;\n}\n\n/* update budget tab numbers in place (keeps input focus) */\nfunction refreshBudgetNumbers(){\n  const cid=UI.viewCycle;if(UI.tab!=='budget'||!State.budgets[cid])return;\n  const setRem=(type,planned,actual)=>{const el=document.querySelector(`[data-rem=\"${type}\"]`);if(el){const r=planned-actual;el.textContent=(type==='Savings'?fmtShort(Math.max(0,r))+' to set aside':fmtShort(r)+' left');el.style.color=r<0?'var(--red)':'var(--green)';}};\n  const fixedP=groupItems(cid,'Fixed').reduce((s,b)=>s+(b.isDebt?plannedDebt(cid):b.planned),0);\n  setRem('Fixed',fixedP,groupItems(cid,'Fixed').reduce((s,b)=>s+(b.isDebt?debtPaidThisCycle(cid):spentForCategory(b.category,cid)),0));\n  setRem('Flexible',groupItems(cid,'Flexible').reduce((s,b)=>s+b.planned,0),groupItems(cid,'Flexible').reduce((s,b)=>s+spentForCategory(b.category,cid),0));\n  setRem('Non-Monthly',groupItems(cid,'Non-Monthly').reduce((s,b)=>s+b.planned,0),groupItems(cid,'Non-Monthly').reduce((s,b)=>s+spentForCategory(b.category,cid),0));\n  setRem('Savings',savingsPlannedTotal(cid),transfersToSavingsThisCycle(cid));\n  const plIncEl=document.querySelector('[data-rem=\"IncomePlanned\"]');if(plIncEl)plIncEl.textContent=fmt(plannedIncome(cid));\n  const surplusEl=document.querySelector('[data-rem=\"IncomeSurplus\"]');if(surplusEl){const s=projectedSurplus(cid);surplusEl.textContent=fmt(s);surplusEl.style.color=s>=0?'var(--green)':'var(--red)';}\n  const tot=document.querySelector('[data-bt=\"total\"]');if(tot)tot.textContent=fmt(spendBudget(cid));\n  const bar=document.querySelector('[data-bt=\"bar\"]');if(bar)bar.style.width=Math.min(100,Math.round(cycleSpent(cid)/(spendBudget(cid)||1)*100))+'%';\n  // per-line bars: redraw actual-vs-planned live as the plan changes\n  document.querySelectorAll('[data-plan]').forEach(inp=>{\n    const wrap=inp.closest('.row');if(!wrap)return;const item=wrap.parentElement;if(!item)return;\n    const ib=item.querySelector('.bar > i');if(!ib)return;\n    const it=(State.budgets[cid]||[]).find(b=>b.id===inp.dataset.key);if(!it)return;\n    const eff=it.isDebt?plannedDebt(cid):it.planned;\n    const act=it.isDebt?debtPaidThisCycle(cid):spentForCategory(it.category,cid);\n    ib.style.width=Math.min(100,Math.round(act/(eff||1)*100))+'%';\n    ib.style.background=act>eff?'var(--red)':(eff&&act/eff>0.85?'#d9a330':'var(--green)');\n  });\n}\n\n/* ============================================================ MODALS ============================================================ */\n/* ---- amount input helpers: as-you-type grouping + parse ---- */\nfunction digitsOnly(s){return String(s==null?'':s).replace(/[^0-9.]/g,'');}\nfunction groupNum(s){s=digitsOnly(s);const dot=s.indexOf('.');if(dot>=0){const ip=s.slice(0,dot).replace(/[^0-9]/g,'');const dp=s.slice(dot+1).replace(/[^0-9]/g,'').slice(0,2);return (ip?parseInt(ip,10).toLocaleString('en-US'):'0')+'.'+dp;}const d=s.replace(/[^0-9]/g,'');return d?parseInt(d,10).toLocaleString('en-US'):'';}\nfunction parseAmt(s){return Math.round(parseFloat(String(s==null?'':s).replace(/,/g,''))||0);}\nconst FX_CURRENCIES=['SGD','THB','JPY','TWD','HKD','USD','EUR'];\nfunction formatAmtInput(el){const start=el.selectionStart||0;const sigBefore=el.value.slice(0,start).replace(/[^0-9.]/g,'').length;const formatted=groupNum(el.value);el.value=formatted;let pos=0,seen=0;while(pos<formatted.length&&seen<sigBefore){if(/[0-9.]/.test(formatted[pos]))seen++;pos++;}try{el.setSelectionRange(pos,pos);}catch(e){}}\nlet logDraft=null;\nfunction methodOptionsHTML(){const d=logDraft;let accts=State.accounts;if(d.type==='Expense'){const spendable=State.accounts.filter(a=>a.inCurrent);accts=spendable.length?spendable:State.accounts;}const cash=accts.map(a=>`<option value=\"${a.id}\" ${d.method===a.id?'selected':''}>${esc(a.name)}<\u002Foption>`).join('');if(d.type==='Income'||d.type==='Transfer')return cash;return cash+State.cards.map(c=>`<option value=\"${c.id}\" ${d.method===c.id?'selected':''}>${esc(c.name)} (credit)<\u002Foption>`).join('');}\nfunction openLog(){\n  const cid=currentCycleId();\n  let budgets=State.budgets[cid];\n  if(!budgets||!budgets.length){budgets=State.budgets[shift ><div id=\"log-amt-unit\" style=\"font-size:11px;color:var(--faint)\">VND<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-bottom:14px\"><button id=\"fx-toggle\" type=\"button\" data-action=\"toggle-fx\" class=\"chip\" style=\"display:inline-flex;align-items:center;gap:6px\">🌍 Foreign currency<\u002Fbutton><\u002Fdiv>\n      <div id=\"fx-box\" style=\"display:none;background:#f7f9f6;border:1px solid var(--line2);border-radius:13px;padding:13px;margin-bottom:15px\">\n        <div class=\"row\" style=\"gap:10px;margin-bottom:11px\">\n          <div style=\"flex:0 0 96px\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Currency<\u002Fdiv><select id=\"fx-currency\">${FX_CURRENCIES.map(c=>`<option value=\"${c}\" ${c==='SGD'?'selected':''}>${c}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n          <div style=\"flex:1;min-width:0\"><div class=\"row\" style=\"margin-bottom:5px\"><div class=\"lbl\" style=\"font-size:10px\">Rate · VND per 1 unit<\u002Fdiv><span id=\"fx-status\" style=\"font-size:9.5px;color:var(--faint)\"><\u002Fspan><\u002Fdiv><input id=\"fx-rate\" type=\"text\" inputmode=\"decimal\" class=\"mono amt-fmt\" placeholder=\"e.g. 25,400\" style=\"padding:10px 11px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">VND total <span style=\"color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0\">— adjust to match your statement<\u002Fspan><\u002Fdiv><input id=\"fx-vnd\" type=\"text\" inputmode=\"numeric\" class=\"mono amt-fmt\" placeholder=\"0\" style=\"padding:11px 12px;font-size:16px\"><\u002Fdiv>\n        <div id=\"fx-hint\" style=\"font-size:10.5px;color:var(--faint);margin-top:8px\">Pick a currency to fetch today’s rate.<\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"split-toggle-wrap\" style=\"display:flex;justify-content:center;margin-bottom:14px\"><button id=\"split-toggle\" type=\"button\" data-action=\"toggle-split\" class=\"chip\" style=\"display:inline-flex;align-items:center;gap:6px\">👥 Split bill / reimbursable<\u002Fbutton><\u002Fdiv>\n      <datalist id=\"recent-names\">${recentNames.map(n=>`<option value=\"${esc(n)}\"><\u002Foption>`).join('')}<\u002Fdatalist>\n      <div id=\"split-box\" style=\"display:none;background:#eef6fc;border:1px solid #d4e6f4;border-radius:13px;padding:13px;margin-bottom:15px\">\n        <div style=\"font-size:11px;line-height:1.5;color:#2b5c8f;margin-bottom:11px\">Log only your share as the expense. The rest is parked as money owed to you, so your budget &amp; Safe-to-Spend stay accurate.<\u002Fdiv>\n        <div class=\"row\" style=\"gap:10px;margin-bottom:11px\">\n          <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">My share (VND)<\u002Fdiv><input id=\"split-share\" type=\"text\" inputmode=\"numeric\" class=\"mono amt-fmt\" placeholder=\"0\" style=\"padding:10px 11px\"><\u002Fdiv>\n          <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Who owes? / note<\u002Fdiv><input id=\"split-who\" type=\"text\" list=\"recent-names\" placeholder=\"e.g. Minh, team lunch\" style=\"padding:10px 11px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Receivable account<\u002Fdiv><select id=\"split-acc\">${recvOpts}<\u002Fselect><\u002Fdiv>\n        <div id=\"split-hint\" style=\"font-size:10.5px;color:#2b5c8f;margin-top:8px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"log-income-block\" style=\"display:none;margin-bottom:15px\">\n        <div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Income source<\u002Fdiv>\n        <select id=\"log-income-source\" style=\"width:100%\">${incOpts.map(s=>`<option value=\"${esc(s)}\" ${s===incOpts[0]?'selected':''}>${s==='Others'?'✚ ':(catIcon(s)?catIcon(s)+' ':'')}${esc(s)}<\u002Foption>`).join('')}<\u002Fselect>\n        <input id=\"log-income-other\" type=\"text\" placeholder=\"Specify income source\" style=\"width:100%;margin-top:8px;display:none\">\n      <\u002Fdiv>\n      <div id=\"log-cat-block\" style=\"margin-bottom:15px\">\n        <div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Category<\u002Fdiv>\n        <select id=\"log-category\" style=\"margin-bottom:8px;width:100%\">${catOptions.map(c=>`<option value=\"${esc(c)}\" ${c===defCat?'selected':''}>${catIcon(c)?catIcon(c)+' ':''}${esc(c)}<\u002Foption>`).join('')}<\u002Fselect>\n        <div id=\"log-chips\" style=\"display:flex;flex-wrap:wrap;gap:8px\">${chips.map(c=>`<div class=\"chip ${c===defCat?'on':''}\" data-logcat=\"${esc(c)}\">${catIcon(c)?catIcon(c)+' ':''}${esc(c)}<\u002Fdiv>`).join('')}<\u002Fdiv>\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:13px\"><input type=\"checkbox\" id=\"log-exclude\" style=\"width:auto\"> Exclude from Cycle Budget (for large deferred CC purchases)<\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"stack\" style=\"gap:11px;margin-bottom:16px\">\n        <div><div class=\"lbl\" id=\"log-from-lbl\" style=\"font-size:10px;margin-bottom:5px\">Paid from<\u002Fdiv><select id=\"log-method\">${methodOptionsHTML()}<\u002Fselect><\u002Fdiv>\n        <div id=\"log-to-row\" style=\"display:none\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">To account<\u002Fdiv><select id=\"log-to\">${cashOpts}<\u002Fselect><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Date<\u002Fdiv><input id=\"log-date\" type=\"date\" value=\"${logDraft.date}\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Note<\u002Fdiv><input id=\"log-note\" type=\"text\" placeholder=\"Note (optional)\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"log-ccnote\" class=\"note\" style=\"display:none;margin-bottom:12px\">Paying by credit card raises that card\\u2019s debt — it won\\u2019t reduce your cash, but it counts against this cycle\\u2019s budget.<\u002Fdiv>\n      <button class=\"btn btn-pri\" data-action=\"submit-log\">Save<\u002Fbutton>\n    <\u002Fdiv>`;\n  showModal(html);\n  const amt=$('#log-amt');if(amt)setTimeout(()=>amt.focus(),30);\n}\nfunction applyLogType(t){\n  logDraft.type=t;\n  document.querySelectorAll('#log-seg>div').forEach(el=>el.classList.toggle('on',el.dataset.logtype===t));\n  const catBlock=$('#log-cat-block');if(catBlock)catBlock.style.display = t==='Expense'?'block':'none';\n  const incBlock=$('#log-income-block');if(incBlock)incBlock.style.display = t==='Income'?'block':'none';\n  const swrap=$('#split-toggle-wrap');if(swrap)swrap.style.display=t==='Expense'?'flex':'none';\n  if(t!=='Expense'&&logDraft.split){logDraft.split=false;const sb=$('#split-box');if(sb)sb.style.display='none';const sbtn=$('#split-toggle');if(sbtn)sbtn.classList.remove('on');}\n  $('#log-to-row').style.display = t==='Transfer'?'block':'none';\n  $('#log-from-lbl').textContent = t==='Income'?'To account':(t==='Transfer'?'From account':'Paid from');\n  if((t!=='Expense')&&isCard(logDraft.method))logDraft.method=State.accounts[0].id;\n  $('#log-method').innerHTML=methodOptionsHTML();\n  updateCcNote();\n  const amt=$('#log-amt');if(amt)amt.focus();\n}\nfunction updateCcNote(){const show=logDraft.type==='Expense'&&isCard(logDraft.method);$('#log-ccnote').style.display=show?'block':'none';}\nfunction updateFx(){\n  if(!logDraft||!logDraft.fx)return;\n  const foreign=parseFloat(((($('#log-amt')||{}).value)||'').replace(/,/g,''))||0;\n  const rate=parseFloat(((($('#fx-rate')||{}).value)||'').replace(/,/g,''))||0;\n  const total=Math.round(foreign*rate);\n  const vnd=$('#fx-vnd');if(vnd)vnd.value=total?total.toLocaleString('en-US'):'';\n  const hint=$('#fx-hint');if(hint)hint.textContent=(foreign&&rate)?`${groupNum(String(foreign))} foreign × ${groupNum(String(rate))} = ${fmt(total)}`:'Enter a rate to convert.';\n  if(logDraft.split)updateSplit();\n}\nfunction toggleFx(){\n  if(!logDraft)return;logDraft.fx=!logDraft.fx;\n  const box=$('#fx-box'),btn=$('#fx-toggle'),unit=$('#log-amt-unit');\n  if(logDraft.fx){if(box)box.style.display='block';if(btn)btn.classList.add('on');if(unit)unit.textContent='Foreign amount';updateFx();const cur=$('#fx-currency');if(!($('#fx-rate')||{}).value)fetchFxRate();const amt=$('#log-amt');if(amt)setTimeout(()=>amt.focus(),30);}\n  else{if(box)box.style.display='none';if(btn)btn.classList.remove('on');if(unit)unit.textContent='VND';const amt=$('#log-amt');if(amt)amt.focus();}\n}\nfunction splitTotal(){return logDraft&&logDraft.fx?parseAmt(($('#fx-vnd')||{}).value):parseAmt(($('#log-amt')||{}).value);}\nfunction updateSplit(){\n  if(!logDraft||!logDraft.split)return;\n  const hint=$('#split-hint');if(!hint)return;\n  const total=splitTotal();const share=parseAmt(($('#split-share')||{}).value);\n  if(!total){hint.textContent='Enter the total bill in the amount above first.';hint.style.color='#2b5c8f';return;}\n  if(share>total){hint.textContent='Your share can’t exceed the total bill.';hint.style.color='var(--red)';return;}\n  hint.innerHTML=`You spend <b>${fmt(share)}<\u002Fb> · owed back to you <b>${fmt(Math.max(0,total-share))}<\u002Fb>`;hint.style.color='#2b5c8f';\n}\nfunction toggleSplit(){\n  if(!logDraft)return;logDraft.split=!logDraft.split;\n  const box=$('#split-box'),btn=$('#split-toggle');\n  if(logDraft.split){if(box)box.style.display='block';if(btn)btn.classList.add('on');updateSplit();const s=$('#split-share');if(s)setTimeout(()=>s.focus(),30);}\n  else{if(box)box.style.display='none';if(btn)btn.classList.remove('on');}\n}\nlet fxFetchSeq=0;\nasync function fetchFxRate(){\n  const sel=$('#fx-currency'),rate=$('#fx-rate'),status=$('#fx-status');if(!sel)return;\n  const code=(sel.value||'SGD').toLowerCase();\n  const seq=++fxFetchSeq;\n  if(status){status.textContent='Fetching rate…';status.style.color='var(--muted)';}\n  try{\n    const res=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/vnd.json');\n    if(!res.ok)throw new Error('http '+res.status);\n    const data=await res.json();\n    if(seq!==fxFetchSeq)return; // a newer request superseded this one\n    const per=data&&data.vnd&&data.vnd[code];\n    if(!per||!isFinite(per))throw new Error('no rate');\n    const vndPerUnit=Math.round((1/per)*100)/100;\n    if(rate)rate.value=groupNum(String(vndPerUnit));\n    if(status){status.textContent='Live rate';status.style.color='var(--green)';}\n    updateFx();\n  }catch(err){\n    if(seq!==fxFetchSeq)return;\n    if(rate)rate.value='';\n    if(status){status.textContent='Enter manually';status.style.color='var(--amber)';}\n    updateFx();\n    toast('Failed to fetch rate');\n  }\n}\nfunction submitLog(){\n  const d=logDraft;const n=d.fx?parseAmt(($('#fx-vnd')||{}).value):parseAmt(($('#log-amt')||{}).value);\n  if(!n){closeModal();return;}\n  const date=$('#log-date').value||isoD(new Date());const note=($('#log-note')||{}).value||'';\n  const cid=cycleIdOfDate(parseD(date));\n  const exclude=($('#log-exclude')||{}).checked||false;\n  if(d.type==='Expense'){\n    d.category=($('#log-category')||{}).value||d.category;\n    if(d.split){\n      if(isCard(d.method)){toast('Pay split bills from a cash or bank account');return;}\n      const share=parseAmt(($('#split-share')||{}).value);\n      if(share>n){toast('Your share can’t exceed the total');return;}\n      const recvAcc=($('#split-acc')||{}).value;\n      if(!recvAcc){toast('Add a Receivable account in Settings');return;}\n      const who=(($('#split-who')||{}).value||'').trim();\n      const owed=n-share;\n      if(share>0)State.transactions.unshift({id:uid('t'),date,cid,type:'expense',from:d.method,to:null,category:d.category,note,amount:share,exclude});\n      if(owed>0)State.transactions.unshift({id:uid('t'),date,cid,type:'transfer',from:d.method,to:recvAcc,category:'Transfer',note:`Split: ${who||'shared'}${note?' - '+note:''}`,amount:owed});\n      save();closeModal();render();toast('Split logged');return;\n    }\n    if(isCard(d.method))State.transactions.unshift({id:uid('t'),date,cid,type:'cc_charge',from:null,to:d.method,category:d.category,note,amount:n,exclude});\n    else State.transactions.unshift({id:uid('t'),date,cid,type:'expense',from:d.method,to:null,category:d.category,note,amount:n,exclude});\n  }else if(d.type==='Income'){\n    let src=($('#log-income-source')||{}).value||d.incomeSource||'Income';\n    if(src==='Others'){src=(($('#log-income-other')||{}).value||'').trim()||'Other income';}\n    State.transactions.unshift({id:uid('t'),date,cid,type:'income',from:null,to:d.method,category:src,note,amount:n});\n  }else{\n    if(d.method===d.toId){toast('Pick two different accounts');return;}\n    State.transactions.unshift({id:uid('t'),date,cid,type:'transfer',from:d.method,to:d.toId,category:'Transfer',note,amount:n});\n  }\n  save();closeModal();render();toast('Logged');\n}\n\nlet reconcileId=null;\nfunction openEditAcc(id){\n  const a=State.accounts.find(x=>x.id===id);if(!a)return;\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:18px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Edit account<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px;margin-bottom:20px\">\n      <div><div class=\"lbl\" style=\"margin-bottom:6px\">Account name<\u002Fdiv><input type=\"text\" class=\"seamless-text\" data-bind=\"acc\" data-id=\"${id}\" data-f=\"name\" value=\"${esc(a.name)}\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Type<\u002Fdiv><select data-bind=\"acc\" data-id=\"${id}\" data-f=\"type\">${ACC_TYPES.filter(t=>t!=='Receivable').map(t=>`<option ${a.type===t?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Start balance (VND)<\u002Fdiv><input type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" data-bind=\"acc\" data-id=\"${id}\" data-f=\"start\" value=\"${groupNum(String(a.start))}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"close-modal\">Done<\u002Fbutton>\n    <button class=\"btn\" style=\"background:#fbe9e7;border:1px solid #f3cfc9;color:var(--red);width:100%;margin-top:10px\" data-action=\"del-acc\" data-id=\"${id}\">Remove account<\u002Fbutton>\n  <\u002Fdiv>`);\n}\nfunction openEditCard(id){\n  const c=State.cards.find(x=>x.id===id);if(!c)return;\n  const pctTxt=(+((c.minPayPct||0.05)*100)).toFixed(1);\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:18px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Edit card<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px;margin-bottom:20px\">\n      <div><div class=\"lbl\" style=\"margin-bottom:6px\">Card name<\u002Fdiv><input type=\"text\" class=\"seamless-text\" data-bind=\"card\" data-id=\"${id}\" data-f=\"name\" value=\"${esc(c.name)}\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Current balance (VND)<\u002Fdiv><input type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" data-bind=\"card\" data-id=\"${id}\" data-f=\"start\" value=\"${groupNum(String(c.start))}\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">APR (%)<\u002Fdiv><input type=\"number\" step=\"0.01\" inputmode=\"decimal\" class=\"seamless-input\" data-bind=\"card\" data-id=\"${id}\" data-f=\"aprPct\" value=\"${+(c.apr*100).toFixed(2)}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px\">\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Statement day<\u002Fdiv><input type=\"number\" min=\"1\" max=\"28\" inputmode=\"numeric\" class=\"seamless-input\" data-bind=\"card\" data-id=\"${id}\" data-f=\"statementDay\" value=\"${c.statementDay||1}\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Grace days<\u002Fdiv><input type=\"number\" min=\"0\" inputmode=\"numeric\" class=\"seamless-input\" data-bind=\"card\" data-id=\"${id}\" data-f=\"graceDays\" value=\"${c.graceDays||15}\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Min pay (%)<\u002Fdiv><input type=\"number\" step=\"0.1\" inputmode=\"decimal\" class=\"seamless-input\" data-bind=\"card\" data-id=\"${id}\" data-f=\"minPayPctPct\" value=\"${pctTxt}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Due day (override)<\u002Fdiv><input type=\"number\" min=\"0\" max=\"28\" inputmode=\"numeric\" class=\"seamless-input\" data-bind=\"card\" data-id=\"${id}\" data-f=\"dueDay\" value=\"${c.dueDay||''}\" placeholder=\"auto\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-end\"><div style=\"font-size:10.5px;color:var(--muted);line-height:1.4\">Exact day the payment is due; blank = auto from statement + grace.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;color:var(--faint);line-height:1.5\">Due date = statement day + grace days, unless you set a Due day override. Minimum due = card-linked installments + ${pctTxt}% of the remaining revolving balance.<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"close-modal\">Done<\u002Fbutton>\n    <button class=\"btn\" style=\"background:#eef1ec;border:1px solid var(--line);color:var(--ink2);width:100%;margin-top:10px\" data-action=\"${c.archived?'unarchive-card':'archive-card'}\" data-id=\"${id}\">${c.archived?'Reactivate card':'✓ Archive — paid off & closed'}<\u002Fbutton>\n    <button class=\"btn\" style=\"background:#fbe9e7;border:1px solid #f3cfc9;color:var(--red);width:100%;margin-top:10px\" data-action=\"del-card\" data-id=\"${id}\">Remove card<\u002Fbutton>\n  <\u002Fdiv>`);\n}\nlet instalEditId=null;\nfunction openInstallment(id){\n  instalEditId=id;\n  const it=id?(State.installments||[]).find(x=>x.id===id):null;\n  const cardOpts=`<option value=\"\" ${(!it||!it.cardId)?'selected':''}>External (not on a card)<\u002Foption>`+State.cards.map(c=>`<option value=\"${c.id}\" ${it&&it.cardId===c.id?'selected':''}>${esc(c.name)}<\u002Foption>`).join('');\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:18px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">${id?'Edit':'Add'} installment<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px;margin-bottom:20px\">\n      <div><div class=\"lbl\" style=\"margin-bottom:6px\">Name<\u002Fdiv><input id=\"instal-name\" type=\"text\" class=\"seamless-text\" value=\"${it?esc(it.name):''}\" placeholder=\"e.g. iPhone 16 Pro\"><\u002Fdiv>\n      <div><div class=\"lbl\" style=\"margin-bottom:6px\">Linked to<\u002Fdiv><select id=\"instal-card\">${cardOpts}<\u002Fselect><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Monthly amount (VND)<\u002Fdiv><input id=\"instal-monthly\" type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" value=\"${it?groupNum(String(it.monthlyAmt)):''}\" placeholder=\"0\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Total months<\u002Fdiv><input id=\"instal-months\" type=\"number\" min=\"0\" inputmode=\"numeric\" class=\"seamless-input\" value=\"${it?it.totalMonths:''}\" placeholder=\"0\"><\u002Fdiv>\n      <\u002Fdiv>\n      ${it?`<div style=\"font-size:11px;color:var(--muted);line-height:1.5\">Started ${esc(it.startMonth)} · ${getRemainingMonths(it)} of ${it.totalMonths} months remaining (auto-decrements each month).<\u002Fdiv>`:''}\n      <div style=\"font-size:11px;color:var(--faint);line-height:1.5\">Card-linked plans are absorbed into that card's minimum payment. External plans add directly to your monthly debt floor.<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"submit-installment\" data-id=\"${id||''}\">Save installment<\u002Fbutton>\n    ${id?`<button class=\"btn\" style=\"background:#fbe9e7;border:1px solid #f3cfc9;color:var(--red);width:100%;margin-top:10px\" data-action=\"del-installment\" data-id=\"${id}\">Remove<\u002Fbutton>`:''}\n  <\u002Fdiv>`);\n  const inp=$('#instal-name');if(inp)setTimeout(()=>inp.focus(),30);\n}\nfunction submitInstallment(id){\n  const name=(($('#instal-name')||{}).value||'').trim();if(!name){toast('Name required');return;}\n  const cardId=($('#instal-card')||{}).value||null;\n  const monthlyAmt=parseAmt(($('#instal-monthly')||{}).value);\n  const totalMonths=Math.max(0,parseInt(String(($('#instal-months')||{}).value||'0').replace(/[^0-9]/g,''),10)||0);\n  const d=new Date();const localMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');\n  if(!State.installments)State.installments=[];\n  if(id){const it=State.installments.find(x=>x.id===id);if(it){it.name=name;it.cardId=cardId;it.monthlyAmt=monthlyAmt;it.totalMonths=totalMonths;if(!it.startMonth)it.startMonth=localMonth;}}\n  else{State.installments.push({id:uid('i'),name:name,cardId:cardId,monthlyAmt:monthlyAmt,totalMonths:totalMonths,startMonth:localMonth});}\n  save();UI.tab='accounts';closeModal();toast('Installment saved');\n}\nfunction openReconcile(id){reconcileId=id;let a egory=v;}\n  const fromEl=$('#et-from');if(fromEl&&(t.type==='expense'||t.type==='transfer'||t.type==='cc_payment'))t.from=fromEl.value;\n  const toEl=$('#et-to');if(toEl&&(t.type==='income'||t.type==='transfer'||t.type==='cc_charge'||t.type==='cc_payment'||t.type==='adjustment'))t.to=toEl.value;\n  if(t.type==='transfer'&&t.from===t.to){toast('Pick two different accounts');return;}\n  const excEl=$('#et-exclude');\n  if(excEl)t.exclude=excEl.checked;\n  save();closeModal();toast('Transaction updated');\n}\n\n/* ---- in-app input sheets (replace native prompt() gray boxes) ---- */\nfunction openAddCat(cid,type){\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">New ${esc(type)} category<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:18px\">Name this envelope — set its planned amount right after in the budget list.<\u002Fdiv>\n    <div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Category name<\u002Fdiv>\n    <input id=\"addcat-name\" type=\"text\" class=\"seamless-text\" placeholder=\"e.g. Gym membership\" style=\"margin-bottom:22px\">\n    <button class=\"btn btn-pri\" data-action=\"submit-add-cat\" data-cid=\"${cid}\" data-type=\"${esc(type)}\">Add category<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#addcat-name');if(i)setTimeout(()=>i.focus(),30);\n}\nfunction submitAddCat(cid,type){\n  const name=(($('#addcat-name')||{}).value||'').trim();\n  if(!name){toast('Enter a category name');return;}\n  (State.budgets[cid]||(State.budgets[cid]=[])).push({id:uid('b'),type,category:name,planned:0});\n  save();closeModal();toast('Category added');\n}\nfunction openAddDebt(){\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><di 002Fdiv><input id=\"editperson-name\" type=\"text\" class=\"seamless-text\" value=\"${esc(acc.name)}\"><\u002Fdiv>\n      <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Amount they owe you (VND)<\u002Fdiv><input id=\"editperson-bal\" type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" value=\"${groupNum(String(cur))}\"><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"submit-edit-person\" data-id=\"${id}\">Save changes<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#editperson-name');if(i)setTimeout(()=>i.focus(),30);\n}\nfunction submitEditPerson(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc){closeModal();return;}\n  const nm=(($('#editperson-name')||{}).value||'').trim();if(nm)acc.name=nm;\n  const cur=Math.round(accountBalance(acc));\n  const amt=Math.max(0,parseAmt(($('#editperson-bal')||{}).value));\n  acc.start+=amt-cur;\n  save();closeModal();toast('Updated');\n}\nfunction openSettle(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc)return;\n  const bal=Math.max(0,Math.round(accountBalance(acc)));\n  if(bal<=0){toast('Already settled');return;}\n  const cashAccts=State.accounts.filter(a=>a.id!==id&&a.type!=='Receivable');\n  const defDest=(cashAccts.find(a=>a.inCurrent&&(a.type==='Cash'||a.type==='Bank'))||cashAccts.find(a=>a.type==='Cash'||a.type==='Bank')||cashAccts.find(a=>a.inCurrent)||cashAccts[0]||{}).id;\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Record repayment<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:16px\"><b>${esc(acc.name)}<\u002Fb> owes you <b class=\"mono\">${fmt(bal)}<\u002Fb>. Log the full amount or a partial installment.<\u002Fdiv>\n    <div style=\"text-align:center;margin-bottom:14px\"><input id=\"settle-amt\" type=\"text\" inputmode=\"numeric\" value=\"${groupNum(String(bal))}\" class=\"mono amt-fmt\" style=\"border:none;text-align:center;font-weight:500;font-size:40px;color:var(--ink2);padding:0;width:100%\"><div style=\"font-size:11px;color:var(--faint)\">VND<\u002Fdiv><\u002Fdiv>\n    <div id=\"settle-chips\" style=\"display:flex;gap:8px;margin-bottom:16px\">\n      <div class=\"chip\" data-settle-quick=\"${Math.round(bal/2)}\" style=\"flex:1;text-align:center\">Half<\u002Fdiv>\n      <div class=\"chip on\" data-settle-quick=\"${bal}\" style=\"flex:1;text-align:center\">Full<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Pay into<\u002Fdiv>\n    <select id=\"settle-dest\" style=\"margin-bottom:16px\">${cashAccts.length?cashAccts.map(a=>`<option value=\"${a.id}\" ${a.id===defDest?'selected':''}>${esc(a.name)}<\u002Foption>`).join(''):`<option value=\"\" disabled selected>Add a cash or bank account first<\u002Foption>`}<\u002Fselect>\n    <button class=\"btn btn-pri\" data-action=\"submit-settle\" data-id=\"${id}\">Confirm repayment<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#settle-amt');if(i)setTimeout(()=>{i.focus();i.select();},30);\n}\nfunction submitSettle(id){\n  const acc=State.accounts.find(x=>x.id===id);if(!acc){closeModal();return;}\n  const bal=Math.max(0,Math.round(accountBalance(acc)));\n  const paid=Math.min(bal,parseAmt(($('#settle-amt')||{}).value));\n  if(paid<=0){toast('Enter an amount');return;}\n  const dest=($('#settle-dest')||{}).value;\n  if(!dest){toast('Add a cash or bank account first');return;}\n  State.transactions.unshift({id:uid('t'),date:isoD(new Date()),cid:currentCycleId(),type:'transfer',from:acc.id,to:dest,category:'Transfer',note:'Repayment \\u2014 '+acc.name,amount:paid});\n  save();closeModal();toast('Received '+fmt(paid));\n}\nfunction openRenameCat(cid,id){\n  const it=(State.budgets[cid]||[]).find(b=>b.id===id);if(!it)return;\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Rename category<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div style=\"font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:18px\">Renaming also updates this label across your transaction history, keeping your ledger consistent.<\u002Fdiv>\n    <div class=\"lbl\" style=\"font-size:10px;margin-bottom:7px\">Category name<\u002Fdiv>\n    <input id=\"rencat-name\" type=\"text\" class=\"seamless-text\" value=\"${esc(it.category)}\" style=\"margin-bottom:22px\">\n    <button class=\"btn btn-pri\" data-action=\"submit-rename-cat\" data-cid=\"${cid}\" data-id=\"${id}\">Save name<\u002Fbutton>\n  <\u002Fdiv>`);\n  const i=$('#rencat-name');if(i)setTimeout(()=>{i.focus();i.select();},30);\n}\nfunction submitRenameCat(cid,id){\n  const it=(State.budgets[cid]||[]).find(b=>b.id===id);if(!it){closeModal();return;}\n  const oldName=it.category;\n  const newName=(($('#rencat-name')||{}).value||'').trim();\n  if(!newName){toast('Enter a name');return;}\n  if(newName!==oldName){it.category=newName;State.transactions.forEach(t=>{if(t.category===oldName)t.category=newName;});save();closeModal();toast('Category renamed');}\n  else{closeModal();}\n}\n\n/* ============================================================ EVENTS ============================================================ */\ndocument.addEventListener('click',e=>{\n  // quick-log chip / type (no re-render — keep keyboard)\n  const chip=e.target.closest('[data-logcat]');if(chip){document.querySelectorAll('#log-chips .chip').forEach(c=>c.classList.toggle('on',c===chip));logDraft.category=chip.dataset.logcat;const csel=$('#log-category');if(csel)csel.value=chip.dataset.logcat;const amt=$('#log-amt');if(amt)amt.focus();return;}\n  const seg=e.target.closest('[data-logtype]');if(seg){applyLogType(seg.dataset.logtype);return;}\n  const pq=e.target.closest('[data-pay-quick]');if(pq){const a=$('#pay-amt');if(a){a.value=groupNum(String(pq.dataset.payQuick));a.focus();}document.querySelectorAll('#pay-chips .chip').forEach(c=>c.classList.toggle('on',c===pq));return;}\n  const sq=e.target.closest('[data-settle-quick]');if(sq){const a=$('#settle-amt');if(a){a.value=groupNum(String(sq.dataset.settleQuick));a.focus();}document.querySelectorAll('#settle-chips .chip').forEach(c=>c.classList.toggle('on',c===sq));return;}\n  const el=e.target.closest('[data-action]');if(!el)return;\n  const a=el.dataset.action;\n  switch(a){\n    case 'tab':UI.tab=el.dataset.tab;historyRenderLimit=50;render();$('#scroll').scrollTop=0;break;\n    case 'select-insight-cycle':UI.insightCycle=el.dataset.cid;render();break;\n    case 'filter-ledger':UI.filterCid=el.dataset.cid;UI.filterMacro=el.dataset.macro||null;UI.insightCycle=el.dataset.cid;render();break;\n    case 'clear-filter':UI.filterMacro=null;render();break;\n    case 'load-more-history':historyRenderLimit+=50;render();break;\n    case 'open-log':openLog();break;\n    case 'open-settings':openSettings();break;\n    case 'close-modal':closeModal();break;\n    case 'cycle':UI.viewCycle=shiftCycle(UI.viewCycle,+el.dataset.d);historyRenderLimit=50;render();break;\n    case 'pay':openPay(el.dataset.id);break;\n    case 'undo-pay':{const tx=State.transactions.find(t=>t.type==='cc_payment'&&t.to===el.dataset.id&&t.cid===currentCycleId());if(tx){if(confirm('Undo this payment?'))delTx(tx.id);}else{toast('Payment not found');}break;}\n    case 'force-sync':{if(SYNC_URL){toast('Checking cloud...');loadCloud();}else{toast('Cloud sync only works when deployed to Google Apps Script');}break;}\n    case 'create-budget':createBudget();break;\n    case 'del-tx':if(confirm('Delete this transaction?'))delTx(el.dataset.id);break;\n    case 'edit-tx':openEditTx(el.dataset.id);break;\n    case 'submit-edit-tx':submitEditTx(el.dataset.id);break;\n    case 'reset':resetData();closeModal();break;\n    case 'start-fresh':{if(!confirm('WARNING: This will delete ALL transactions and reset account/card balances to 0. Your categories and setup will remain. Proceed?'))break;State.transactions=[];State.accounts.forEach(a=>a.start=0);State.cards.forEach(c=>c.start=0);State.installments=[];State.separateDebts=[];State.savingsPlan={};UI.viewCycle=currentCycleId();save();closeModal();toast('App reset to Day 1');break;}\n    case 'export-csv':exportCSV();break;\n    case 'archive-data':{\n      if(!confirm('Archive transactions older than 90 days? Their balances will be permanently merged into your accounts/cards starting balances to speed up the app.'))break;\n      const cutoff=isoD(new Date(Date.now()-90*86400000));\n      const oldTxs=State.transactions.filter(t=>t.date<cutoff);\n      const newTxs=State.transactions.filter(t=>t.date>=cutoff);\n      if(!oldTxs.length){toast('No old data to archive');break;}\n      State.accounts.forEach(a=>{let b=a.start;for(const t of oldTxs){if(t.type==='income'&&t.to===a.id)b+=t.amount;else if(t.type==='expense'&&t.from===a.id)b-=t.amount;else if(t.type==='transfer'){if(t.from===a.id)b-=t.amount;if(t.to===a.id)b+=t.amount;}else if(t.type==='cc_payment'&&t.from===a.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===a.id)b+=t.amount;}a.start=b;});\n      State.cards.forEach(c=>{let b=c.start;for(const t of oldTxs){if(t.type==='cc_charge'&&t.to===c.id)b+=t.amount;else if(t.type==='cc_payment'&&t.to===c.id)b-=t.amount;}c.start=b;});\n      exportCSV();alert('A CSV backup has been downloaded before archiving.');\n      State.transactions=newTxs;\n      save();render();toast(`Archived ${oldTxs.length} transactions`);\n      break;\n    }\n    case 'reconcile':openReconcile(el.dataset.id);break;\n    case 'toggle':{const o=State.accounts.find(x=>x.id===el.dataset.id);if(o){o[el.dataset.f]=!o[el.dataset.f];save();render();}break;}\n    case 'toggle-card':{const o=State.cards.find(x=>x.id===el.dataset.id);if(o){o[el.dataset.f]=!o[el.dataset.f];save();render();}break;}\n    case 'archive-card':{const o=State.cards.find(x=>x.id===el.dataset.id);if(o){if(Math.abs(cardDebt(o))>1&&!confirm('This card still shows a balance of '+fmt(cardDebt(o))+'. Archive it anyway? Its history stays — it just leaves your active debt views.'))break;o.archived=true;save();UI.tab='accounts';closeModal();toast('Card archived — nice work clearing it');}break;}\n    case 'unarchive-card':{const o=State.cards.find(x=>x.id===el.dataset.id);if(o){o.archived=false;save();UI.tab='accounts';closeModal();}break;}\n    case 'submit-log':submitLog();break;\n    case 'submit-pay':submitPay();break;\n    case 'toggle-split':toggleSplit();break;\n    case 'toggle-fx':toggleFx();break;\n    case 'submit-reconcile':submitReconcile();break;\n    case 'add-acc':{const a={id:uid('acc'),name:'New account',type:'Bank',start:0,inCurrent:true,inNet:true,updated:isoD(new Date())};State.accounts.push(a);save();UI.tab='accounts';openEditAcc(a.id);break;}\n    case 'edit-acc':openEditAcc(el.dataset.id);break;\n    case 'del-acc':{const hasHistory=State.transactions.some(t=>t.from===el.dataset.id||t.to===el.dataset.id);if(hasHistory){alert('Cannot delete: This account has transaction history. Please rename it, or Archive old data first.');break;}if(confirm('Remove account?')){State.accounts=State.accounts.filter(x=>x.id!==el.dataset.id);save();UI.tab='accounts';closeModal();}break;}\n    case 'add-card':{const c={id:uid('card'),name:'New card',start:0,apr:0.35,statementDay:1,graceDays:15,minPayPct:0.05};State.cards.push(c);save();UI.tab='accounts';openEditCard(c.id);break;}\n    case 'edit-card':openEditCard(el.dataset.id);break;\n    case 'del-card':{const hasHistory=State.transactions.some(t=>t.from===el.dataset.id||t.to===el.dataset.id);if(hasHistory){alert('This card has transaction history, so deleting it would break past records. If it’s paid off, use “Archive — paid off & closed” instead — that keeps your history but hides the card from active debt views.');break;}if(confirm('Remove card?')){State.cards=State.cards.filter(x=>x.id!==el.dataset.id);save();UI.tab='accounts';closeModal();}break;}\n    case 'add-installment':UI.tab='accounts';openInstallment(null);break;\n    case 'edit-installment':UI.tab='accounts';openInstallment(el.dataset.id);break;\n    case 'submit-installment':submitInstallment(el.dataset.id);break;\n    case 'del-installment':if(confirm('Remove this installment plan?')){State.installments=State.installments.filter(x=>x.id!==el.dataset.id);save();UI.tab='accounts';closeModal();}break;\n    case 'add-goal':{const name=(prompt('Goal name?','New goal')||'').trim();if(!name)break;const target=parseAmt(prompt('Target amount (VND)?','10000000')||'0')||10000000;const accId=uid('a');const g={id:uid('g'),name:name,target:target,current:0,monthly:1000000,priority:'Medium',linkedAccountId:accId};State.goals.push(g);if(!State.savingsPlan[UI.viewCycle])State.savingsPlan[UI.viewCycle]={};State.savingsPlan[UI.viewCycle][g.id]=g.monthly;State.accounts.push({id:accId,name:name,type:'Savings',start:0,inCurrent:false,inNet:true,updated:isoD(new Date())});save();render();toast('Goal added · linked savings account created');break;}\n    case 'del-goal':{const g=State.goals.find(x=>x.id===el.dataset.id);if(g&&g.linkedAccountId){const acc=State.accounts.find(a=>a.id===g.linkedAccountId);if(acc&&!State.transactions.some(t=>t.from===acc.id||t.to===acc.id)&&!State.goals.some(o=>o.id!==g.id&&o.linkedAccountId===acc.id)){if(confirm('Also remove the empty linked savings account \"'+acc.name+'\"?'))State.accounts=State.accounts.filter(a=>a.id!==acc.id);}}State.goals=State.goals.filter(x=>x.id!==el.dataset.id);save();render();break;}\n    case 'review-interest':markInterestReviewed();save();UI.tab='accounts';render();toast('Marked reviewed — reconcile each card below');break;\n    case 'dismiss-interest':markInterestReviewed();save();render();toast('Reminder reset for 3 months');break;\n    case 'add-income':{const cid=el.dataset.cid;const src=(prompt('Income source name?','Bonus')||'').trim();if(!src)break;const amt=parseAmt(prompt('Planned amount (VND)?','0')||'0');if(!State.incomePlan[cid])State.incomePlan[cid]=[];State.incomePlan[cid].push({id:uid('inc'),source:src,planned:amt});save();render();toast('Income source added');break;}\n    case 'del-income':{const cid=el.dataset.cid;State.incomePlan[cid]=(State.incomePlan[cid]||[]).filter(x=>x.id!==el.dataset.id);save();render();toast('Removed');break;}\n    case 'add-recurring':openRecurring(null);break;\n    case 'edit-recurring':openRecurring(el.dataset.id);break;\n    case 'del-recurring':if(confirm('Delete this recurring bill? Already-posted transactions stay.')){State.recurring=(State.recurring||[]).filter(x=>x.id!==el.dataset.id);save();render();toast('Recurring removed');}break;\n    case 'submit-recurring':submitRecurring(el.dataset.id||null);break;\n    case 'toggle-recurring':{const r=(State.recurring||[]).find(x=>x.id===el.dataset.id);if(r){r.active=!r.active;save();render();}break;}\n    case 'toggle-compact':State.settings.compactNumbers=(State.settings.compactNumbers===false);save();closeModal();openSettings();break;\n    case 'set-sync-secret':{const cur=syncSecret();const v=prompt('Enter your cloud-sync secret (stored only on this device):',cur);if(v!==null){try{if(v)localStorage.setItem(SYNC_SECRET_LS,v);else localStorage.removeItem(SYNC_SECRET_LS);}catch(e){}toast(v?'Sync key saved on this device':'Sync key cleared');closeModal();openSettings();if(v)loadCloud();}break;}\n    case 'hist-filter':UI.histType=el.dataset.type;render();break;\n    case 'undo-tx':{if(lastDeleted){State.transactions.splice(Math.min(lastDeleted.idx,State.transactions.length),0,lastDeleted.tx);lastDeleted=null;save();render();toast('Transaction restored');}break;}\n    case 'add-cat':openAddCat(el.dataset.cid,el.dataset.type);break;\n    case 'submit-add-cat':submitAddCat(el.dataset.cid,el.dataset.type);break;\n    case 'edit-cat':openRenameCat(el.dataset.cid,el.dataset.id);break;\n    case 'submit-rename-cat':submitRenameCat(el.dataset.cid,el.dataset.id);break;\n    case 'del-cat':if(confirm('Delete category? Past transactions will lose this label.')){State.budgets[el.dataset.cid]=(State.budgets[el.dataset.cid]||[]).filter(b=>b.id!==el.dataset.id);save();render();toast('Category removed');}break;\n    case 'del-debt':if(confirm('Remove this debt?')){State.separateDebts=State.separateDebts.filter(x=>x.id!==el.dataset.id);save();render();toast('Debt removed');}break;\n    case 'add-debt':openAddDebt();break;\n    case 'submit-add-debt':submitAddDebt();break;\n    case 'add-person':openAddPerson();break;\n    case 'submit-add-person':submitAddPerson();break;\n    case 'del-person':{const hasHistory=State.transactions.some(t=>t.from===el.dataset.id||t.to===el.dataset.id);if(hasHistory){alert('Cannot delete: This person has transaction history. Please rename it, or Archive old data first.');break;}if(confirm('Remove this person?')){State.accounts=State.accounts.filter(x=>x.id!==el.dataset.id);save();render();toast('Removed');}break;}\n    case 'edit-person':openEditPerson(el.dataset.id);break;\n    case 'submit-edit-person':submitEditPerson(el.dataset.id);break;\n    case 'settle':openSettle(el.dataset.id);break;\n    case 'submit-settle':submitSettle(el.dataset.id);break;\n  }\n});\n\n// live select changes in quick log (no full re-render)\ndocument.addEventListener('change',e=>{\n  const el=e.target;\n  if(el.id==='log-method'){logDraft.method=el.value;updateCcNote();const amt=$('#log-amt');if(amt)amt.focus();return;}\n  if(el.id==='log-income-source'){logDraft.incomeSource=el.value;const other=$('#log-income-other');if(other)other.style.display=el.value==='Others'?'block':'none';if(el.value==='Others'&&other)setTimeout(()=>other.focus(),30);return;}\n  if(el.id==='log-to'){logDraft.toId=el.value;return;}\n  if(el.id==='log-date'){logDraft.date=el.value;return;}\n  if(el.id==='fx-currency'){fetchFxRate();return;}\n  if(el.id==='log-category'){logDraft.category=el.value;document.querySelectorAll('#log-chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.logcat===el.value));return;}\n  // settings binds\n  const bind=el.dataset.bind;if(!bind)return;\n  const id=el.dataset.id,f=el.dataset.f;\n  let val=el.type==='checkbox'?el.checked:el.value;\n  if(el.classList.contains('amt-fmt')){val=Number(String(val).replace(/,/g,''))||0;}\n  else if(el.type==='number'){val=Number(val)||0;} // fallback for APR\n  if(bind==='acc'){const o=State.accounts.find(x=>x.id===id);if(o)o[f]=val;}\n  else if(bind==='card'){const o=State.cards.find(x=>x.id===id);if(o){if(f==='aprPct')o.apr=Math.max(0,Number(val)||0)/100;else if(f==='minPayPctPct')o.minPayPct=Math.max(0,Number(val)||0)/100;else if(f==='statementDay')o.statementDay=Math.min(28,Math.max(1,Number(val)||1));else if(f==='graceDays')o.graceDays=Math.max(0,Number(val)||0);else if(f==='dueDay'){const nn=parseInt(val,10);o.dueDay=(nn>=1&&nn<=28)?nn:null;}else o[f]=val;}}\n  else if(bind==='goal'){const o=State.goals.find(x=>x.id===id);if(o){if(f==='name'){const linkedAcc=goalAccount(o);o.name=val;if(linkedAcc&&!o.linkedAccountId)linkedAcc.name=val;}else if(f==='linkedAccountId'){o.linkedAccountId=val||null;}else if(f==='target'||f==='current')o[f]=Math.max(0,Number(val)||0);else o[f]=val;}}\n  else if(bind==='setting'){State.settings[f]=Math.min(28,Math.max(1,Number(val)||SALARY_DAY_DEFAULT));if(f==='salaryDay')retagCycles();}\n  save();\n  if(bind==='setting'){UI.viewCycle=currentCycleId();render();}\n  else if(bind==='goal'&&UI.tab==='goals')render();\n});\n\n// as-you-type currency grouping for amount inputs (Quick Log, Pay, Reconcile, FX)\ndocument.addEventListener('input',e=>{\n  const el=e.target;\n  if(el.id==='hist-search'){const q=el.value.toLowerCase();document.querySelectorAll('.tx-item').forEach(row=>{row.style.display=row.innerText.toLowerCase().includes(q)?'flex':'none';});return;}\n  if(!el.classList||!el.classList.contains('amt-fmt'))return;\n  formatAmtInput(el);\n  if((el.id==='log-amt'||el.id==='fx-rate')&&logDraft&&logDraft.fx)updateFx();\n  if(logDraft&&logDraft.split)updateSplit();\n});\n// editable planned amounts — live, focus-preserving\ndocument.addEventListener('input',e=>{\n  const el=e.target;if(!el.dataset.plan)return;\n  const cid=el.dataset.cid,kind=el.dataset.plan,key=el.dataset.key;const val=Math.round(Number(String(el.value).replace(/,/g,''))||0);\n  if(kind==='saving'){if(!State.savingsPlan[cid])State.savingsPlan[cid]={};State.savingsPlan[cid][key]=Math.max(0,val);}\n  else if(kind==='income'){const it=incomePlanItems(cid).find(x=>x.id===key);if(it)it.planned=Math.max(0,val);}\n  else{const it=(State.budgets[cid]||[]).find(b=>b.id===key);if(it)it.planned=Math.max(0,val);}\n  save();refreshBudgetNumbers();\n});\n// clamp debt floor on blur\ndocument.addEventListener('blur',e=>{\n  const el=e.target;if(!el.dataset||el.dataset.plan!=='debt')return;\n  const floor=Number(el.dataset.floor)||0;const currentVal=Number(String(el.value).replace(/,/g,''))||0;if(currentVal<floor){const it=(State.budgets[el.dataset.cid]||[]).find(b=>b.id===el.dataset.key);if(it){it.planned=floor;save();}el.value=groupNum(String(floor));refreshBudgetNumbers();toast('Debt plan can\\u2019t go below the minimums floor');}\n},true);\n\n// desktop keyboard: Enter = confirm primary action, Esc = close (only while a sheet is open)\ndocument.addEventListener('keydown',e=>{\n  if(!$('#modal').classList.contains('show'))return;\n  if(e.key==='Escape'){e.preventDefault();closeModal();return;}\n  if(e.key==='Enter'){\n    const t=e.target;\n    if(t&&(t.tagName==='TEXTAREA'||t.tagName==='SELECT'))return; // let these handle Enter natively\n    const btn=document.querySelector('#modal .sheet .btn-pri[data-action]');\n    if(btn){e.preventDefault();btn.click();}\n  }\n});\n\n/* ---------- init ---------- */\nload();\nmigrateState();\nUI.viewCycle=currentCycleId();\npostDueRecurring();\nrender();\n\n// Trigger sync on initial load if enabled\nif(syncEnabled()){\n  setTimeout(loadCloud,500);\n}\n\n// Trigger sync when PWA resumes from background\ndocument.addEventListener('visibilitychange',()=>{\n  if(document.visibilityState==='visible'&&syncEnabled()){\n    loadCloud();\n  }\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
