  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:var(--green);color:#fff;border-color:var(--green);}\n  #fab{position:absolute;left:50%;transform:translateX(-50%);bottom:80px;width:58px;height:58px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(15,107,72,.42);cursor:pointer;z-index:20;}\n  #fab span{color:#fff;font-weight:300;font-size:32px;line-height:1;margin-top:-3px;}\n  #nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 2px calc(20px + env(safe-area-inset-bottom));z-index:15;}\n  #nav .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;}\n  #nav .tab svg{width:22px;height:22px;stroke:var(--faint);fill:none;stroke-width:1.9;}\n  #nav .tab span{font-weight:600;font-size:9px;color:var(--faint);}\n  #nav .tab.on svg{stroke:var(--green);}\n  #nav .tab.on span{color:var(--green);}\n  #modal{position:absolute;inset:0;z-index:30;display:none;}\n  #modal.show{display:flex;align-items:flex-end;}\n  .scrim{position:absolute;inset:0;background:rgba(20,30,25,.42);animation:fade .15s ease;}\n  .sheet{position:relative;width:100%;max-height:92%;overflow-y:auto;background:#fff;border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));animation:up .24s cubic-bezier(.2,.7,.3,1);}\n  .grip{width:38px;height:4px;border-radius:2px;background:#dfe3dd;margin:0 auto 14px;}\n  @keyframes fade{from{opacity:0;}to{opacity:1;}}\n  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}\n  .note{font-size:11px;line-height:1.5;color:var(--amber-d);background:var(--amber-bg);border-radius:9px;padding:9px 11px;}\n  .x{cursor:pointer;font-size:22px;color:var(--faint);line-height:1;}\n  .navarrow{cursor:pointer;width:30px;height:30px;border-radius:8px;background:#f3f5f1;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono';color:var(--muted);font- ==========\n   Tally — vanilla JS Safe-to-Spend / envelope budgeting app.\n   No frameworks. Real-time dates. Double-entry ledger.\n   Per-cycle editable envelopes; dynamic STS.\n   ============================================================ */\nconst LS_KEY='tally_vanilla_v2';\nconst SYNC_URL="https://script.google.com/macros/s/AKfycbx8j48oMH9ysWmh37D9A87QXulCVOBRDexR60P30MGa31opDuc3aVnJFO986U8uSFwImQ/exec";\nfunction setSyncStatus(state){const el=document.getElementById('sync-status');if(!el)return;if(state==='syncing'){el.textContent='⏳';el.style.color='';}else if(state==='synced'){el.textContent='☁️✓';el.style.color='var(--green)';}else if(state==='error'){el.textContent='☁️✕';el.style.color='var(--red)';}else{el.textContent='☁️';el.style.color='';}}\nconst SALARY_DAY_DEFAULT=9;\nconst pad=n=>String(n).padStart(2,'0');\nconst uid=p=>(p||'id')+Math.random().toString(36).slice(2,7)+Date.now().toString(36).slice(-3);\n\n/* ---------- dates ---------- */\nconst MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nconst dOnly=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());\nconst parseD=s=>{const p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);};\nconst isoD=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;\nconst diffDays=(a,b)=>Math.round((dOnly(b)-dOnly(a))/86400000);\nconst fD=d=>`${d.getDate()} ${MON[d.getMonth()]}`;\nconst fDY=d=>`${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`;\nfunction salaryDay(){return (State&&State.settings.salaryDay)||SALARY_DAY_DEFAULT;}\nfunction cycleStartOfDate(date){const d=salaryDay();return date.getDate()>=d?new Date(date.getFullYear(),date.getMonth(),d):new Date(date.getFullYear(),date.getMonth()-1,d);}\nfunction cycleIdOfStart(s){return `${s.getFullYear()}-${pad(s.getMonth()+1)}`;}\nfunction cycleIdOfDate(date){return cycleIdOfStart(cycleStartOfDate(date));}\nfunction startOfCycleId(id){const[y,m]=id.split('-').map(Number);return new Date(y,m-1,salaryDay());}\nfunction endOfCycleId(id){const s=startOfCycleId(id);return new Date(s.getFullYear(),s.getMonth()+1,salaryDay()-1);}\nfunction nextPaydayOfCycleId(id){const s=startOfCycleId(id);return new Date(s.getFullYear(),s.getMonth()+1,salaryDay());}\nfunction shiftCycle(id,delta){const s=startOfCycleId(id);return cycleIdOfStart(new Date(s.getFullYear(),s.getMonth()+delta,salaryDay()));}\nfunction cycleLabel(id){return `${fD(startOfCycleId(id))} – ${fD(endOfCycleId(id))}`;}\nfunction currentCycleId(){return cycleIdOfDate(new Date());}\nfunction daysToPayday(){return diffDays(new Date(),nextPaydayOfCycleId(currentCycleId()));}\nfunction cycleProgress(){const id=currentCycleId(),s=startOfCycleId(id),p=nextPaydayOfCycleId(id);const total=diffDays(s,p)||1;return Math.max(2,Math.min(100,Math.round(diffDays(s,new Date())/total*100)));}\nfunction inCycle(dateStr,id){return cycleIdOfDate(parseD(dateStr))===id;}\nfunction daysUntil(dateStr){return diffDays(new Date(),parseD(dateStr));}\nfunction activeDueDate(dueStr){let d=parseD(dueStr);const today=new Date();while(diffDays(today,d)<-15){d=new Date(d.getFullYear(),d.getMonth()+1,d.getDate());}return isoD(d);}\n\n/* ---------- format ---------- */\nconst fmt=n=>{const s=Math.round(Math.abs(n)).toLocaleString('en-US');return (n<0?'\\u2212\\u20ab':'\\u20ab')+s;};\nconst fmtShort=n=>{const a=Math.abs(n);let s;if(a>=1e9)s=(a/1e9).toFixed(2)+'B';else if(a>=1e6)s=(a/1e6).toFixed(1)+'M';else if(a>=1e3)s=Math.round(a/1e3)+'k';else s=String(Math.round(a));return (n<0?'\\u2212\\u20ab':'\\u20ab')+s;};\nconst aprFmt=a=>(a*100).toFixed((a*100)%1?2:0)+'%';\nconst esc=s=>String(s==null?'':s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\n\n/* ============================================================ STATE ============================================================ */\nlet State=null;\nlet UI={tab:'home',viewCycle:null};\nlet historyRenderLimit=50;\n\nfunction defaultBudgetTemplate(){\n  return [\n    {id:uid('b'),type:'Fixed',category:'Housing / rent',planned:5000000,required:true},\n    {id:uid('b'),type:'Fixed',category:'Debt payments',planned:15400000,required:true,isDebt:true},\n    {id:uid('b'),type:'Fixed',category:'Utilities',planned:1200000,required:true},\n    {id:uid('b'),type:'Fixed',category:'Insurance',planned:800000,required:true},\n    {id:uid('b'),type:'Fixed',category:'Subscriptions',planned:450000,required:false},\n    {id:uid('b'),type:'Flexible',category:'Food & Dining',planned:5000000},\n    {id:uid('b'),type:'Flexible',category:'Transport',planned:1500000},\n    {id:uid('b'),type:'Flexible',category:'Shopping',planned:2000000},\n    {id:uid('b'),type:'Flexible',category:'Entertainment',planned:1000000},\n    {id:uid('b'),type:'Non-Monthly',category:'Annual fees',planned:500000},\n    {id:uid('b'),type:'Non-Monthly',category:'Home maintenance',planned:800000}\n  ];\n}\nfunction buildSeed(){\n  const today=new Date();\n  const cid=currentCycleIdRaw(today);\n  const cs=startOfCycleIdRaw(cid);\n  const elapsed=Math.max(0,diffDays(cs,today));\n  const onDay=off=>isoD(new Date(cs.getFullYear(),cs.getMonth(),cs.getDate()+Math.min(off,elapsed)));\n  const dueIn=k=>isoD(new Date(today.getFullYear(),today.getMonth(),today.getDate()+k));\n  const payday=new Date(cs.getFullYear(),cs.getMonth()+1,SALARY_DAY_DEFAULT);\n  const beforePayday=Math.max(1,Math.min(diffDays(today,payday)-1,6));\n  const prevId=shiftCycleRaw(cid,-1);\n  const pcs=startOfCycleIdRaw(prevId);\n  const pOn=off=>isoD(new Date(pcs.getFullYear(),pcs.getMonth(),pcs.getDate()+off));\n  const monthsAgo=n=>{const d=new Date(today.getFullYear(),today.getMonth()-n,1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;};\n  const seed={\n    settings:{currency:'VND',salaryDay:SALARY_DAY_DEFAULT},\n    accounts:[\n      {id:'acc_vcb',name:'Vietcombank',type:'Bank',start:1000000,inCurrent:true,inNet:true,updated:onDay(elapsed)},\n      {id:'acc_cash',name:'Cash Wallet',type:'Cash',start:5100000,inCurre rity:'Medium'}\n    ],\n    budgets:{[cid]:defaultBudgetTemplate(),[prevId]:defaultBudgetTemplate()},\n    // savings planned per cycle, keyed by cycleId -> { goalId: planned }\n    savingsPlan:{[cid]:{g1:3000000,g2:2000000,g3:1000000},[prevId]:{g1:3000000,g2:2000000,g3:1000000}},\n    transactions:[\n      {id:uid('t'),date:onDay(0),type:'income',from:null,to:'acc_vcb',category:'Salary',note:'Monthly salary',amount:42000000},\n      {id:uid('t'),date:onDay(0),type:'expense',from:'acc_vcb',to:null,category:'Housing / rent',note:'Rent',amount:5000000},\n      {id:uid('t'),date:onDay(0),type:'expense',from:'acc_vcb',to:null,category:'Debt service',note:'Prior-cycle card payments',amount:22000000},\n      {id:uid('t'),date:onDay(0),type:'transfer',from:'acc_vcb',to:'acc_save',category:'Transfer',note:'To Emergency Savings',amount:3000000},\n      {id:uid('t'),date:onDay(1),type:'expense',from:'acc_vcb',to:null,category:'Utilities',note:'Internet',amount:300000},\n      {id:uid('t'),date:onDay(3),type:'expense',from:'acc_vcb',to:null,category:'Utilities',note:'Electricity',amount:900000},\n      {id:uid('t'),date:onDay(0),type:'expense',from:'acc_vcb',to:null,category:'Subscriptions',note:'Streaming',amount:450000},\n      {id:uid('t'),date:onDay(2),type:'expense',from:'acc_cash',to:null,category:'Food & Dining',note:'Groceries',amount:600000},\n      {id:uid('t'),date:onDay(6),type:'expense',from:'acc_cash',to:null,category:'Food & Dining',note:'Dinner out',amount:800000},\n      {id:uid('t'),date:onDay(10),type:'expense',from:'acc_momo',to:null,category:'Food & Dining',note:'Lunch + coffee',amount:900000},\n      {id:uid('t'),date:onDay(4),type:'expense',from:'acc_momo',to:null,category:'Transport',note:'Grab',amount:400000},\n      {id:uid('t'),date:onDay(8),type:'expense',from:'acc_momo',to:null,category:'Transport',note:'Fuel',amount:500000},\n      {id:uid('t'),date:onDay(5),type:'expense',from:'acc_tcb',to:null,category:'Shopping',note:'Clothes',amount:1400000},\n      {id:uid('t'),date:onDay(7),type:'expense',from:'acc_momo',to:null,category:'Entertainment',note:'Cinema',amount:350000},\n      {id:uid('t'),date:onDay(9),type:'cc_charge',from:null,to:'cardA',category:'Shopping',note:'Home stuff (Card A)',amount:1000000},\n      {id:uid('t'),date:pOn(2),type:'expense',from:'acc_cash',to:null,category:'Food & Dining',note:'Groceries (prev cycle)',amount:1200000},\n      {id:uid('t'),date:pOn(6),type:'expense',from:'acc_tcb',to:null,category:'Shopping',note:'Shoes (prev cycle)',amount:1800000}\n    ]\n  };\n  seed.transactions.forEach(t=>t.cid=cycleIdOfDate(parseD(t.date)));\n  return seed;\n}\nfunction startOfCycleIdRaw(id){const[y,m]=id.split('-').map(Number);return new Date(y,m-1,SALARY_DAY_DEFAULT);}\nfunction currentCycleIdRaw(date){const d=SALARY_DAY_DEFAULT;const s=date.getDate()>=d?new Date(date.getFullYear(),date.getMonth(),d):new Date(date.getFullYear(),date.getMonth()-1,d);return `${s.getFullYear()}-${pad(s.getMonth()+1)}`;}\nfunction shiftCycleRaw(id,delta){const s=startOfCycleIdRaw(id);const n=new Date(s.getFullYear(),s.getMonth()+delta,SALARY_DAY_DEFAULT);return `${n.getFullYear()}-${pad(n.getMonth()+1)}`;}\n\nfunction migrateState(){\n  if(!State.installments)State.installments=[];\n  (State.cards||[]).forEach(c=>{\n    if(c.statementDay==null){let sd=15;if(c.due){const d=parseD(c.due);const st=new Date(d.getFullYear(),d.getMonth(),d.getDate()-(c.graceDays||15));sd=st.getDate();}c.statementDay=Math.min(28,Math.max(1,sd));}\n    if(c.graceDays==null)c.graceDays=15;\n    if(c.minPayPct==null)c.minPayPct=0.05;\n  });\n  (State.installments||[]).forEach(i=>{\n    if(!i.id)i.id=uid('i');\n    if(i.cardId===undefined)i.cardId=null;\n    if(i.monthlyAmt==null)i.monthlyAmt=+i.monthly||0;\n    if(i.startMonth==null){\n      /* migrate legacy decrement model -> time-derived; anchor start to this month so current remaining is preserved */\n      const rem=i.remainingMonths!=null?i.remainingMonths:(i.monthlyAmt>0?Math.max(1,Math.round((+i.remaining||0)/i.monthlyAmt)):0);\n      const now=new Date();\n      i.startMonth=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;\n      if(i.totalMonths==null)i.totalMonths=rem;\n    }\n    if(i.totalMonths==null)i.totalMonths=i.remainingMonths||0;\n    delete i.remainingMonths;\n  });\n}\nfunction load(){try{const r=localStorage.getItem(LS_KEY);if(r){State=JSON.parse(r);if(!State.savingsPlan)State.savingsPlan={};if(State.transactions)State.transactions.forEach(t=>{if(!t.cid)t.cid=cycleIdOfDate(parseD(t.date));});migrateState();return;}}catch(e){}State=buildSeed();save();}\nfunction loadCloud(){\n  if(!SYNC_URL)return;\n  if(State.unsynced){save();return;}\n  setSyncStatus('syncing');\n  fetch(SYNC_URL+'?action=load&key=eDwardthumieu9803@').then(r=>r.json()).then(data=>{\n    if(data&&typeof data==='object'&&(data.transactions||data.accounts)){\n      const cloudTime=data.lastUpdated||0;\n      const localTime=State.lastUpdated||0;\n      if(cloudTime>localTime){\n        State=data;if(!State.savingsPlan)State.savingsPlan={};if(State.transactions)State.transactions.forEach(t=>{if(!t.cid)t.cid=cycleIdOfDate(parseD(t.date));});migrateState();\n        try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}\n        UI.viewCycle=currentCycleId();render();\n        setSyncStatus('synced');\n      }else if(localTime>cloudTime){\n        save();\n      }else{\n        setSyncStatus('synced');\n      }\n    }else{\n      setSyncStatus('synced');\n    }\n  }).catch(()=>{setSyncStatus('error');});\n}\nfunction save(){\n  State.lastUpdated=Date.now();\n  try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}\n  if(SYNC_URL){\n    setSyncStatus('syncing');\n    fetch(SYNC_URL,{method:'POST',body:JSON.stringify({...State,_secret:\"eDwardthumieu9803@\"})})\n      .then(()=>{State.unsynced=false;try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}setSyncStatus('synced');})\n      .catch(()=>{State.unsynced=true;try{localStorage.setItem(LS_KEY,JSON.stringify(State));}catch(e){}setSyncStatus('error');toast('Saved locally (Offline)');});\n  }\n}\nfunction resetData(){State=buildSeed();UI.viewCycle=currentCycleId();save();render();toast('Sample data restored');}\n\n/* ============================================================ DERIVED ============================================================ */\nconst isCard=id=>State.cards.some(c=>c.id===id);\nfunction accountBalance(acc){let b=acc.start;for(const t of State.transactions){if(t.type==='income'&&t.to===acc.id)b+=t.amount;else if(t.type==='expense'&&t.from===acc.id)b-=t.amount;else if(t.type==='transfer'){if(t.from===acc.id)b-=t.amount;if(t.to===acc.id)b+=t.amount;}else if(t.type==='cc_payment'&&t.from===acc.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===acc.id)b+=t.amount;}return b;}\nfunction cardDebt(card){let b=card.start;for(const t of State.transactions){if(t.type==='cc_charge'&&t.to===card.id)b+=t.amount;else if(t.type==='cc_payment'&&t.to===card.id)b-=t.amount;else if(t.type==='adjustment'&&t.to===card.id)b+=t.amount;}return b;}\nconst currentBalance=()=>State.accounts.filter(a=>a.inCurrent).reduce((s,a)=>s+accountBalance(a),0);\nconst assets=()=>State.accounts.filter(a=>a.inNet).reduce((s,a)=>s+accountBalance(a),0);\nconst liabilities=()=>State.cards.reduce((s,c)=>s+cardDebt(c),0)+State.separateDebts.reduce((s,x)=>s+x.balance,0);\nconst netWorth=()=>assets()-liabilities();\n\nconst cardPaidThisCycle=card=>State.transactions.some(t=>t.type==='cc_payment'&&t.to===card.id&&t.cid===currentCycleId());\nfunction spentForCategory(cat,cid){return State.transactions.filter(t=>(t.type==='expense'||t.type==='cc_charge')&&t.category===cat&&t.cid===cid&&!t.exclude).reduce((s,t)=>s+t.amount,0);}\nfunction getRemainingMonths(inst){\n  const today=new Date();\n  const currAbsMonth=today.getFullYear()*12+today.getMonth();\n  const [sY,sM]=String(inst.startMonth||'').split('-').map(Number);\n  const startAbsMonth=(sY||0)*12+((sM||1)-1);\n  const passed=Math.max(0,currAbsMonth-startAbsMonth);\n  return Math.max(0,(inst.totalMonths||0)-passed);\n}\nfunction getCardDates(card){\n  const sd=Math.min(28,Math.max(1,card.statementDay||1));\n  const today=new Date();\n  let stmt=new Date(today.getFullYear(),today.getMonth(),sd);\n  if(stmt>today)stmt=new Date(today.getFullYear(),today.getMonth()-1,sd);\n  const due=new Date(stmt.getFullYear(),stmt.getMonth(),stmt.getDate()+(card.graceDays||15));\n  return isoD(due);\n}\nfunction getCardMinimum(card){\n  const rawDebt=Math.max(0,cardDebt(card));\n  if(rawDebt<=0)return 0;\n  const cardInstals=(State.installments||[]).filter(i=>i.cardId===card.id&&getRemainingMonths(i)>0);\n  const instalMonthlyTotal=cardInstals.reduce((s,i)=>s+i.monthlyAmt,0);\n  const instalPrincipalRemaining=cardInstals.reduce((s,i)=>s+(i.monthlyAmt*getRemainingMonths(i)),0);\n  let regDebt=Math.max(0,rawDebt-instalPrincipalRemaining);\n  const calculatedMin=instalMonthlyTotal+(regDebt*(card.minPayPct||0.05));\n  return Math.min(rawDebt,(calculatedMin<500000&&calculatedMin>0)?Math.min(rawDebt,500000):calculatedMin);\n}\nfunction debtFloor(cid){\n  let f=State.cards.reduce((s,c)=>s+Math.min(getCardMinimum(c),Math.max(0,cardDebt(c))),0);\n  const extInstals=(State.installments||[]).filter(i=>!i.cardId&&getRemainingMonths(i)>0);\n  f+=extInstals.reduce((s,i)=>s+i.monthlyAmt,0);\n  return f;\n}\nfunction debtItem(cid){return (State.budgets[cid]||[]).find(b=>b.isDebt);}\nfunction plannedDebt(cid){const it=debtItem(cid);return Math.max(debtFloor(cid),it?it.planned:0);}\nfunction debtPaidThisCycle(cid){return State.transactions.filter(t=>t.type==='cc_payment'&&t.cid===cid).reduce((s,t)=>s+t.amount,0);}\nfunction fixedItems(cid){return (State.budgets[cid]||[]).filter(b=>b.type==='Fixed'&&!b.isDebt);}\nfunction fixedRemaining(cid){return fixedItems(cid).reduce((s,b)=>s+Math.max(0,b.planned-spentForCategory(b.category,cid)),0);}\nfunction remainingDebt(cid){return Math.max(0,plannedDebt(cid)-debtPaidThisCycle(cid));}\nfunction plannedSavingFor(cid,goalId){const m=(State.savingsPlan&&State.savingsPlan[cid])||{};if(m[goalId]!=null)return m[goalId];const g=State.goals.find(x=>x.id===goalId);return g?g.monthly:0;}\nfunction savingsPlannedTotal(cid){return State.goals.reduce((s,g)=>s+plannedSavingFor(cid,g.id),0);}\nfunction transfersToSavingsThisCycle(cid){const sav=State.accounts.filter(a=>a.type==='Savings').map(a=>a.id);return State.transactions.filter(t=>t.type==='transfer'&&sav.includes(t.to)&&t.cid===cid).reduce((s,t)=>s+t.amount,0);}\nfunction remainingGoals(cid){return Math.max(0,savingsPlannedTotal(cid)-transfersToSavingsThisCycle(cid));}\n/* Net-flow savings deduction: for each savings account deduct max(planned this cycle, net transferred this cycle) */\nfunction effectiveSavingsDeduction(cid){\n  const plan=State.savingsPlan[cid]||{};\n  let total=0;\n  State.accounts.filter(a=>a.type==='Savings').forEach(acc=>{\n    const goal=State.goals.find(g=>g.name===acc.name);\n    const plannedAmt=goal?(plan[goal.id]||0):0;\n    let netActual=0;\n    State.transactions.forEach(t=>{if(t.cid===cid){if(t.to===acc.id)netActual+=t.amount;if(t.from===acc.id)netActual-=t.amount;}});\n    total+=Math.max(plannedAmt,netActual);\n  });\n  return total;\n}\n/* RECALIBRATED Safe-to-Spend (uses CURRENT cycle) */\nfunction safeToSpend(){const cid=currentCycleId();return currentBalance()-remainingDebt(cid)-fixedRemaining(cid)-effectiveSavingsDeduction(cid);}\n\nfunction groupItems(cid,type){return (State.budgets[cid]||[]).filter(b=>b.type===type);}\nconst plannedTotal=cid=>(State.budgets[cid]||[]).reduce((s,b)=>s+(b.isDebt?plannedDebt(cid):b.planned),0)+savingsPlannedTotal(cid);\nfunction cycleSpent(cid){return State.transactions.filter(t=>(t.type==='expense'||t.type==='cc_charge')&&t.cid===cid&&!t.exclude&&t.category!=='Debt service'&&t.category!=='Balance adjustment').reduce((s,t)=>s+t.amount,0);}\nconst monthlyInterest=()=>State.cards.reduce((s,c)=>s+cardDebt(c)*c.apr/12,0);\nfunction avalancheCard(){const u=State.cards.filter(c=>cardDebt(c)>0).slice().sort((a,b)=>b.apr-a.apr);return u[0]||null;}\nfunction cardStatus(c){if(cardPaidThisCycle(c))return 'Paid';const d=daysUntil(getCardDates(c));if(d<0)return 'Overdue';if(d<=7)return 'Urgent';if(d<=14)return 'Upcoming';return 'Safe';}\nconst STATUS={Overdue:{dot:'#c43d33',bg:'#fbe9e7',bd:'#f3cfc9',sub:'#c43d33',badgeBg:'#c43d33',badgeC:'#fff'},Urgent:{dot:'#c47d12',bg:'#fbf1de',bd:'#eedcb6',sub:'#c47d12',badgeBg:'#c47d12',badgeC:'#fff'},Upcoming:{dot:'#d9a330',bg:'#fff',bd:'#ebeee9',sub:'#6f7a73',badgeBg:'#eef1ec',badgeC:'#6f7a73'},Safe:{dot:'#15875a',bg:'#fff',bd:'#ebeee9',sub:'#6f7a73',badgeBg:'#e9f4ee',badgeC:'#15875a'},Paid:{dot:'#9aa39d',bg:'#f5f7f4',bd:'#e6e9e4',sub:'#9aa39d',badgeBg:'#eef1ec',badgeC:'#9aa39d'}};\nconst accName=id=>{const a=State.accounts.find(x=>x.id===id);if(a)return a.name;const c=State.cards.find(x=>x.id===id);return c?c.name:'—';};\n\n/* ============================================================ RENDER ============================================================ */\nconst $=s=>document.querySelector(s);\nconst view=()=>$('#view');\nconst NAV=[\n  ['home','Home','M3 11l9-8 9 8M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9'],\n  ['budget','Budget','M3 12h18M3 6h18M3 18h18'],\n  ['goals','Goals','M6 3v18M6 4h12l-2 4 2 4H6'],\n  ['debt','Debt & IOUs','M3 10h18M7 15h2M3 6h18v12H3z'],\n  ['accounts','Accounts','M3 7h18v10H3zM3 11h18M7 15h3']\n];\nfunction renderNav(){$('#nav').innerHTML=NAV.map(([k,l,p])=>`<div class=\"tab ${UI.tab===k?'on':''}\" data-action=\"tab\" data-tab=\"${k}\"><svg viewBox=\"0 0 24 24\"><path d=\"${p}\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg><span>${l}<\u002Fspan><\u002Fdiv>`).join('');}\nfunction render(){\n  if(!UI.viewCycle)UI.viewCycle=currentCycleId();\n  $('#hdr-cycle').textContent='Cycle '+cycleLabel(currentCycleId());\n  renderNav();\n  const v=view();\n  if(UI.tab==='home')v.innerHTML=renderHome();\n  else if(UI.tab==='budget')v.innerHTML=renderBudget();\n  else if(UI.tab==='goals')v.innerHTML=renderGoals();\n  else if(UI.tab==='accounts')v.innerHTML=renderAccounts();\n  else if(UI.tab==='debt')v.innerHTML=renderDebt();\n  else if(UI.tab==='history')v.innerHTML=renderHistory();\n}\n\nconst stsRow=(l,v,last)=>`<div class=\"row\" style=\"font-size:12px;color:#fff;opacity:.92;${last?'':'margin-bottom:6px'}\"><span>${l}<\u002Fspan><span class=\"mono\">${v}<\u002Fspan><\u002Fdiv>`;\nfunction renderHome(){\n  const cid=currentCycleId();\n  const sts=safeToSpend(),cb=currentBalance();\n  const neg=sts<0,deep=sts<-0.08*Math.max(cb,1);\n  const bg=neg?(deep?'var(--clay-d)':'var(--clay)'):'var(--green-d)';\n  const lblC=neg?'rgba(255,255,255,.82)':'#a9dcc4';\n  const msg=neg?(deep?'You\\u2019ve committed more than you hold. Trim a planned envelope below, or hold off spending until payday.':'Very tight \\u2014 your plan uses almost everything. Spend carefully until payday.'):'Yours to spend after planned bills, debt and savings are set aside for this cycle.';\n  const top=avalancheCard();\n  const tip=top?`Funnel any spare cash into <b>${esc(top.name)}<\u002Fb> first \\u2014 highest APR (${aprFmt(top.apr)}), so every extra \\u20ab there cuts the most interest.`:'No active card debt \\u2014 nicely done.';\n  const ob=State.cards.slice().filter(c=>{const dd=getCardDates(c);const d=daysUntil(dd);return (!cardPaidThisCycle(c)&&parseD(dd)<=nextPaydayOfCycleId(cid))||d<=14;}).sort((a,b)=>{const aP=cardPaidThisCycle(a)?1:0;const bP=cardPaidThisCycle(b)?1:0;if(aP!==bP)return aP-bP;return daysUntil(getCardDates(a))-daysUntil(getCardDates(b));});\n  const lqRisk=daysToPayday()<=5;\n  const recvTotal=State.accounts.filter(a=>a.type==='Receivable').reduce((s,a)=>s+Math.max(0,accountBalance(a)),0);\n  const recvBlock=recvTotal>0?`<div style=\"background:#eef6fc;border:1px solid #d4e6f4;border-radius:16px;padding:15px 16px\"><div class=\"row\" style=\"margin-bottom:5px\"><div style=\"display:flex;align-items:center;gap:8px\"><div class=\"dot\" style=\"background:#2b5c8f;width:6px;height:6px\"><\u002Fdiv><span class=\"lbl\" style=\"color:#2b5c8f\">People owe you<\u002Fspan><\u002Fdiv><span class=\"mono\" style=\"font-size:13px;color:#2b5c8f\">${fmt(recvTotal)}<\u002Fspan><\u002Fdiv><div style=\"font-size:12.5px;line-height:1.5;color:#3a5670\">Don\\u2019t forget to collect your receivables. Track and settle them in the Debt &amp; IOUs tab.<\u002Fdiv><\u002Fdiv>`:'';\n  return `<div class=\"stack\" style=\"gap:14px\">\n    <div style=\"background:${bg};border-radius:20px;padding:22px 20px;color:#fff\">\n      <div class=\"lbl\" style=\"color:${lblC}\">Safe to spend<\u002Fdiv>\n      <div class=\"mono\" style=\"font-weight:500;font-size:38px;letter-spacing:-.02em;margin-top:6px;line-height:1\">${fmt(sts)}<\u002Fdiv>\n      <div style=\"font-size:12.5px;line-height:1.45;color:${lblC};margin-top:8px\">${msg}<\u002Fdiv>\n      <div style=\"margin-top:16px;background:rgba(255,255,255,.13);border-radius:13px;padding:13px 14px\">\n        ${stsRow('Current balance (spendable)',fmt(cb))}\n        ${stsRow('− Planned bills left','\\u2212'+fmt(fixedRemaining(cid)))}\n        ${stsRow('− Planned debt left','\\u2212'+fmt(remainingDebt(cid)))}\n        ${stsRow('− Set aside for goals','\\u2212'+fmt(remainingGoals(cid)),true)}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"row\" style=\"margin-bottom:10px\"><span style=\"font-weight:600;font-size:13px;color:var(--ink)\">${daysToPayday()} days to payday<\u002Fspan><span style=\"font-size:11.5px;color:var(--faint)\">Next salary ${fD(nextPaydayOfCycleId(cid))}<\u002Fspan><\u002Fdiv>\n      <div class=\"bar\"><i style=\"width:${cycleProgress()}%\"><\u002Fi><\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:7px\"><span style=\"font-size:10.5px;color:var(--faint)\">Cycle ${fD(startOfCycleId(cid))}<\u002Fspan><span style=\"font-size:10.5px;color:${lqRisk?'var(--amber)':'var(--faint)'}\">${lqRisk?'High-liquidity-risk window':'On track'}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"row\" style=\"margin:2px 2px 9px\"><span class=\"sublbl\">Upcoming obligations<\u002Fspan><span style=\"font-weight:500;font-size:11px;color:var(--red)\">Reserve ${fmt(remainingDebt(cid)+fixedRemaining(cid))}<\u002Fspan><\u002Fdiv>\n      <div class=\"stack\" style=\"gap:9px\">\n        ${ob.map(c=>{const dd=getCardDates(c);const st=cardStatus(c),m=STATUS[st],d=daysUntil(dd),paid=st==='Paid';const sub=paid?'Minimum paid this cycle':(d<0?`Overdue ${Math.abs(d)} days`:`Due in ${d} days`+(parseD(dd)<=nextPaydayOfCycleId(cid)?' · before payday':''));const payable=!paid&&parseD(dd)<=nextPaydayOfCycleId(cid);\n          return `<div class=\"row\" style=\"padding:13px 14px;border-radius:13px;background:${m.bg};border:1px solid ${m.bd}\"><div style=\"display:flex;align-items:center;gap:11px\"><div class=\"dot\" style=\"background:${m.dot};width:8px;height:8px\"><\u002Fdiv><div><div style=\"font-weight:600;font-size:13px;color:var(--ink)\">${esc(c.name)}<\u002Fdiv><div style=\"font-size:11px;color:${m.sub}\">${sub}<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:9px\"><span class=\"mono\" style=\"font-size:12.5px;color:var(--ink2)\">min ${fmt(getCardMinimum(c))}<\u002Fspan>${paid?`<button class=\"btn btn-sm\" style=\"background:#eef1ec;color:var(--muted)\" data-action=\"undo-pay\" data-id=\"${c.id}\">Undo<\u002Fbutton>`:(payable?`<button class=\"btn btn-sm\" style=\"background:var(--green);color:#fff\" data-action=\"pay\" data-id=\"${c.id}\">Pay<\u002Fbutton>`:'')}<\u002Fdiv><\u002Fdiv>`;}).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${recvBlock}\n    <div style=\"background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:16px;padding:15px 16px\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><div class=\"dot\" style=\"background:var(--amber);width:6px;height:6px\"><\u002Fdiv><span class=\"lbl\" style=\"color:var(--amber-d)\">Debt strategy<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.5;color:#5c4a1a\">${tip}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction cycleSwitcher(){const id=UI.viewCycle,isCur=id===currentCycleId();return `<div class=\"card\" style=\"padding:11px 13px\"><div class=\"row\"><div class=\"navarrow\" data-action=\"cycle\" data-d=\"-1\">‹<\u002Fdiv><div style=\"text-align:center\"><div style=\"font-weight:600;font-size:13px;color:var(--ink)\">${cycleLabel(id)}<\u002Fdiv><div style=\"font-size:10px;color:var(--faint)\">${isCur?'Current cycle':(startOfCycleId(id)>new Date()?'Future cycle':'Past cycle')}<\u002Fdiv><\u002Fdiv><div class=\"navarrow\" data-action=\"cycle\" data-d=\"1\">›<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;}\n\n// editable planned input\nfunction plannedField(cid,kind,key,val,floor){return `<input class=\"seamless-input amt-fmt\" type=\"text\" inputmode=\"numeric\" data-plan=\"${kind}\" data-cid=\"${cid}\" data-key=\"${key}\" value=\"${groupNum(String(Math.round(val)))}\"${floor!=null?` data-floor=\"${floor}\"`:''} style=\"width:108px\">`;}\n\nfunction groupBlock(cid,type,items){\n  const editable=cid>=currentCycleId(); // can edit current & future cycles\n  const planned=items.reduce((s,i)=>s+i.eff,0);\n  const actual=items.reduce((s,i)=>s+i.actual,0);\n  const rem=planned-actual;\n  return `<div class=\"card\" data-group=\"${type}\">\n    <div class=\"row\" style=\"margin-bottom:14px\"><span style=\"font-weight:600;font-size:14px;color:var(--ink)\">${type}<\u002Fspan><span style=\"font-weight:600;font-size:12px;color:${rem<0?'var(--red)':'var(--green)'}\" data-rem=\"${type}\">${fmtShort(rem)} left<\u002Fspan><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px\">\n      ${items.map(i=>{const pct=Math.min(100,Math.round(i.actual/(i.eff||1)*100));const bc=i.actual>i.eff?'var(--red)':(i.eff&&i.actual/i.eff>0.85?'#d9a330':'var(--green)');\n        return `<div><div class=\"row\" style=\"margin-bottom:6px\"><div style=\"display:flex;align-items:center;gap:7px;min-width:0\"><span style=\"font-weight:500;font-size:12.5px;color:var(--ink)\">${esc(i.label)}<\u002Fspan>${i.badge?`<span class=\"badge\" style=\"background:${i.badgeBg};color:${i.badgeC}\">${i.badge}<\u002Fspan>`:''}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px\"><span class=\"mono\" style=\"font-size:11px;color:var(--faint)\">${fmt(i.actual)} /<\u002Fspan>${editable?plannedField(cid,i.kind,i.key,i.planned,i.floor):`<span class=\"mono\" style=\"font-size:12px;color:var(--ink2)\">${fmt(i.eff)}<\u002Fspan>`}${editable&&i.kind==='item'?`<button class=\"del\" data-action=\"edit-cat\" data-cid=\"${cid}\" data-id=\"${i.key}\" style=\"margin-left:4px;color:var(--green-d)\">Edit<\u002Fbutton><button class=\"del\" data-action=\"del-cat\" data-cid=\"${cid}\" data-id=\"${i.key}\" style=\"margin-left:2px\">✕<\u002Fbutton>`:''}<\u002Fdiv><\u002Fdiv>\n          <div class=\"bar\" style=\"height:6px\"><i style=\"width:${pct}%;background:${bc}\"><\u002Fi><\u002Fdiv>\n          ${i.sub?`<div style=\"font-size:10px;color:var(--faint);margin-top:4px\">${i.sub}<\u002Fdiv>`:''}<\u002Fdiv>`;}).join('')}\n      ${editable?`<div class=\"miniadd\" data-action=\"add-cat\" data-cid=\"${cid}\" data-type=\"${type}\">+ Add ${type.toLowerCase()} category<\u002Fdiv>`:''}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction renderBudget(){\n  const cid=UI.viewCycle;\n  if(!State.budgets[cid]){\n    const prev=State.budgets[shiftCycle(cid,-1)]?cycleLabel(shiftCycle(cid,-1)):null;\n    return `<div class=\"stack\" style=\"gap:14px\">${cycleSwitcher()}<div class=\"card\" style=\"text-align:center;padding:28px 18px\"><div style=\"font-weight:600;font-size:15px;color:var(--ink)\">No budget for this cycle yet<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);margin:8px 0 16px;line-height:1.5\">Start a fresh budget for ${cycleLabel(cid)}${prev?` by cloning planned amounts from ${prev}`:''}.<\u002Fdiv><button class=\"btn btn-pri\" style=\"width:auto;padding:12px 18px\" data-action=\"create-budget\">+ Create budget for this cycle<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n  }\n  // build display items per group\n  const fixedDisp=groupItems(cid,'Fixed').map(b=>{\n    if(b.isDebt){const eff=plannedDebt(cid),fl=debtFloor(cid);return {label:'Debt payments',kind:'debt',key:b.id,planned:b.planned,eff,actual:debtPaidThisCycle(cid),floor:fl,badge:'FLOOR '+fmtShort(fl),badgeBg:'#fbeede',badgeC:'#a8790f',sub:'Minimum is the floor; plan higher to attack high-APR cards (Avalanche).'};}\n    return {label:b.category,kind:'item',key:b.id,planned:b.planned,eff:b.planned,actual:spentForCategory(b.category,cid),badge:b.required?'REQUIRED':'',badgeBg:'#f0ece0',badgeC:'#a8790f'};\n  });\n  const flexDisp=groupItems(cid,'Flexible').map(b=>({label:b.category,kind:'item',key:b.id,planned:b.planned,eff:b.planned,actual:spentForCategory(b.category,cid)}));\n  const nmDisp=groupItems(cid,'Non-Monthly').map(b=>({label:b.category,kind:'item',key:b.id,planned:b.planned,eff:b.planned,actual:spentForCategory(b.category,cid)}));\n  const transfers=transfersToSavingsThisCycle(cid);\n  const savDisp=State.goals.map(g=>{const planned=plannedSavingFor(cid,g.id);const prog=Math.round(g.current/(g.target||1)*100);return {label:g.name,kind:'saving',key:g.id,planned,eff:planned,actual:0,sub:`Saved ${fmt(g.current)} of ${fmt(g.target)} · ${prog}%`,_goal:true};});\n  // savings actual is group-level (transfers); show group remaining = planned - transfers\n  const editable=cid>=currentCycleId();\n  const savPlanned=savDisp.reduce((s,i)=>s+i.eff,0);\n  const savBlock=`<div class=\"card\" data-group=\"Savings\">\n    <div class=\"row\" style=\"margin-bottom:6px\"><span style=\"font-weight:600;font-size:14px;color:var(--ink)\">Savings &amp; Goals<\u002Fspan><span style=\"font-weight:600;font-size:12px;color:${(savPlanned-transfers)<0?'var(--red)':'var(--green)'}\" data-rem=\"Savings\">${fmtShort(Math.max(0,savPlanned-transfers))} to set aside<\u002Fspan><\u002Fdiv>\n    <div style=\"font-size:10.5px;color:var(--faint);margin-bottom:13px\">Moved to savings this cycle: ${fmt(transfers)} of ${fmt(savPlanned)} planned<\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px\">\n      ${savDisp.map(i=>`<div><div class=\"row\" style=\"margin-bottom:6px\"><div style=\"display:flex;align-items:center;gap:7px;min-width:0\"><span style=\"font-weight:500;font-size:12.5px;color:var(--ink)\">${esc(i.label)}<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:6px\"><span style=\"font-size:10px;color:var(--faint)\">plan<\u002Fspan>${editable?plannedField(cid,'saving',i.key,i.planned):`<span class=\"mono\" style=\"font-size:12px;color:var(--ink2)\">${fmt(i.eff)}<\u002Fspan>`}<\u002Fdiv><\u002Fdiv><div style=\"font-size:10px;color:var(--faint)\">${i.sub}<\u002Fdiv><\u002Fdiv>`).join('')}\n      ${editable&&savDisp.length?'':`<div style=\"font-size:11px;color:var(--faint);text-align:center;padding:6px\">No goals yet — add them in the Goals tab<\u002Fdiv>`}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  return `<div class=\"stack\" style=\"gap:14px\">\n    ${cycleSwitcher()}\n    <div class=\"card\">\n      <div class=\"row\" style=\"margin-bottom:10px\"><span style=\"font-weight:600;font-size:13px;color:var(--ink)\">Cycle budget<\u002Fspan><span style=\"font-size:11.5px;color:var(--faint)\">${cid===currentCycleId()?daysToPayday()+' days left':(startOfCycleId(cid)>new Date()?'upcoming':'closed')}<\u002Fspan><\u002Fdiv>\n      <div class=\"bar\" style=\"height:9px\"><i data-bt=\"bar\" style=\"width:${Math.min(100,Math.round(cycleSpent(cid)/(plannedTotal(cid)||1)*100))}%\"><\u002Fi><\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:8px\"><span style=\"font-size:11.5px;color:var(--muted)\">Spent <span class=\"mono\" data-bt=\"spent\">${fmt(cycleSpent(cid))}<\u002Fspan><\u002Fspan><span style=\"font-size:11.5px;color:var(--muted)\">planned <span class=\"mono\" data-bt=\"t ass=\"note\" style=\"margin-top:8px;background:#f3f5f1;color:var(--muted);border:none\"><b>Note:<\u002Fb> Initial balances entered here are tracked in your Net Worth, but safely excluded from Safe-to-Spend until they pay you back.<\u002Fdiv><\u002Fdiv>\n    <div class=\"card\">\n      ${activeOwes.length?`<div class=\"row\" style=\"margin-bottom:11px\"><span class=\"sublbl\">Total owed to you<\u002Fspan><span class=\"mono\" style=\"font-size:13px;color:var(--green)\">${fmt(recvTotal)}<\u002Fspan><\u002Fdiv>`:''}\n      <div class=\"stack\" style=\"gap:9px\">\n        ${recvHtml}\n        <div class=\"miniadd\" data-action=\"add-person\">+ Add person<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nconst PRIO={High:{bg:'#fbe9e7',c:'#c43d33'},Medium:{bg:'#fbf6ea',c:'#a8790f'},Low:{bg:'#e9f4ee',c:'#15875a'}};\nfunction renderGoals(){\n  const cid=currentCycleId();\n  const goals=State.goals;\n  const savedFor=g=>{const la=State.accounts.find(a=>a.type==='Savings'&&a.name===g.name);return la?Math.round(accountBalance(la)):0;};\n  const totalSaved=goals.reduce((s,g)=>s+savedFor(g),0);\n  const totalTarget=goals.reduce((s,g)=>s+(+g.target||0),0);\n  const totPct=totalTarget?Math.min(100,Math.round(totalSaved/totalTarget*100)):0;\n  const monthlyTotal=goals.reduce((s,g)=>s+plannedSavingFor(cid,g.id),0);\n  const header=`<div style=\"background:var(--green-d);border-radius:20px;padding:22px 20px;color:#fff\">\n    <div class=\"lbl\" style=\"color:#a9dcc4\">Total saved across goals<\u002Fdiv>\n    <div class=\"mono\" style=\"font-weight:500;font-size:34px;letter-spacing:-.02em;margin-top:6px;line-height:1\">${fmt(totalSaved)}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#a9dcc4;margin-top:6px\">of ${fmt(totalTarget)} target \\u00b7 ${totPct}%<\u002Fdiv>\n    <div class=\"bar\" style=\"height:8px;background:rgba(255,255,255,.18);margin-top:14px\"><i style=\"width:${totPct}%;background:#7fe3b4\"><\u002Fi><\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#a9dcc4;margin-top:10px\">Setting aside ${fmt(monthlyTotal)} this cycle \\u00b7 planned in Budget<\u002Fdiv>\n  <\u002Fdiv>`;\n  const cards=goals.length?goals.map(g=>{\n    const cur=savedFor(g),tgt=+g.target||0;\n    const pct=tgt?Math.min(100,Math.round(cur/tgt*100)):0;\n    const remain=Math.max(0,tgt-cur);\n    const planned=plannedSavingFor(cid,g.id);\n    const eta=planned>0&&remain>0?Math.ceil(remain/planned):null;\n    const p=PRIO[g.priority]||PRIO.Medium;\n    const done=pct>=100;\n    return `<div class=\"card\" style=\"padding:18px\">\n      <div class=\"row\" style=\"margin-bottom:14px;gap:10px;align-items:flex-end\">\n        <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"margin-bottom:5px\">Goal name<\u002Fdiv><input class=\"seamless-text\" data-bind=\"goal\" data-id=\"${g.id}\" data-f=\"name\" value=\"${esc(g.name)}\" placeholder=\"Goal name\" style=\"font-size:15px;width:100%\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:5px\">Priority<\u002Fdiv><select data-bind=\"goal\" data-id=\"${g.id}\" data-f=\"priority\" style=\"width:auto;padding:6px 26px 6px 9px;font-size:11px;font-weight:600;border-radius:8px;background:${p.bg};color:${p.c};border:none\">${GOAL_PRIORITIES.map(x=>`<option ${g.priority===x?'selected':''}>${x}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"align-items:flex-end;margin-bottom:10px\">\n        <div style=\"min-width:0\"><div class=\"mono\" style=\"font-weight:500;font-size:26px;color:var(--ink2);line-height:1\">${fmt(cur)}<\u002Fdiv><div style=\"font-size:11px;color:var(--faint);margin-top:3px\">saved of ${fmt(tgt)}<\u002Fdiv><\u002Fdiv>\n        <div class=\"mono\" style=\"font-weight:600;font-size:20px;color:${done?'var(--green)':'var(--green-d)'}\">${pct}%<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bar\" style=\"height:10px;margin-bottom:13px\"><i style=\"width:${pct}%;background:var(--green)\"><\u002Fi><\u002Fdiv>\n      <div class=\"row\" style=\"gap:10px;margin-bottom:13px\">\n        <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:9.5px;margin-bottom:4px\">Saved so far · auto<\u002Fdiv><div class=\"mono\" style=\"font-size:13.5px;color:var(--ink);font-weight:600\">${fmt(cur)}<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:9.5px;margin-bottom:4px\">Target<\u002Fdiv><input type=\"text\" inputmode=\"numeric\" data-bind=\"goal\" data-id=\"${g.id}\" data-f=\"target\" value=\"${groupNum(String(tgt))}\" class=\"seamless-input amt-fmt\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:8px\"><span style=\"font-size:11px;color:var(--muted);min-width:0\">${done?'Goal reached \\u2713':(eta?`${fmt(remain)} to go \\u00b7 ~${eta} cycle${eta>1?'s':''} at ${fmt(planned)}/cycle`:`${fmt(remain)} to go`)}<\u002Fspan><button class=\"del\" data-action=\"del-goal\" data-id=\"${g.id}\">Remove<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join(''):`<div class=\"card\" style=\"text-align:center;padding:30px 18px\"><div style=\"font-weight:600;font-size:15px;color:var(--ink)\">No goals yet<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.5\">Add a savings goal or sinking fund to start tracking your progress.<\u002Fdiv><\u002Fdiv>`;\n  return `<div class=\"stack\" style=\"gap:14px\">\n    ${header}\n    <div style=\"font-size:11.5px;color:var(--muted);padding:0 2px;line-height:1.5\">Set a goal's name, target and priority here. <b>Saved so far<\u002Fb> updates automatically from transfers into its matching savings account; plan the monthly amount in the <b>Budget<\u002Fb> tab.<\u002Fdiv>\n    ${cards}\n    <div class=\"miniadd\" data-action=\"add-goal\" style=\"padding:13px\">+ Add goal<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction renderHistory(){\n  const cid=UI.viewCycle;\n  const txs=State.transactions.filter(t=>t.cid===cid).slice().sort((a,b)=>parseD(b.date)-parseD(a.date));\n  const TY={income:{c:'#15875a',bg:'#e9f4ee',l:'Income'},expense:{c:'#6f7a73',bg:'#f3f5f1',l:'Expense'},transfer:{c:'#3a6ea5',bg:'#eef2f6',l:'Transfer'},cc_charge:{c:'#a8790f',bg:'#fbf6ea',l:'Card'},cc_payment:{c:'#15875a',bg:'#e9f4ee',l:'Payment'},adjustment:{c:'#6b4ea5',bg:'#efe9fb',l:'Adjust'}};\n  const rows=txs.length?txs.slice(0,historyRenderLimit).map(t=>{const ty=TY[t.type]||TY.expense;const inflow=(t.type==='income')||(t.type==='adjustment'&&t.amount>0);const sign=inflow?'+':(t.type==='transfer'||t.type==='cc_charge'?'':'\\u2212');const amt=(t.type==='adjustment'&&t.amount<0?'\\u2212':sign)+'\\u20ab'+Math.abs(t.amount).toLocaleString('en-US');const meta=t.type==='transfer'?`${accName(t.from)} → ${accName(t.to)}`:(t.type==='cc_charge'?`on ${accName(t.to)}`:(t.type==='cc_payment'?`${accName(t.from)} → ${accName(t.to)}`:accName(t.from||t.to)));\n    return `<div class=\"row tx-item\" style=\"padding:12px 14px;border-bottom:1px solid #f3f5f1\"><div style=\"min-width:0\"><div style=\"display:flex;align-items:center;gap:7px\"><span style=\"font-weight:500;font-size:12.5px;color:var(--ink)\">${esc(t.category)}<\u002Fspan><span class=\"badge\" style=\"background:${ty.bg};color:${ty.c}\">${ty.l}<\u002Fspan><\u002Fdiv><div style=\"font-size:10.5px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${fD(parseD(t.date))} · ${esc(t.note||meta)}<\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:11px\"><span class=\"mono\" style=\"font-size:13px;color:${inflow?'var(--green)':'var(--ink2)'}\">${amt}<\u002Fspan><button class=\"del\" data-action=\"edit-tx\" data-id=\"${t.id}\" style=\"color:var(--green-d)\">Edit<\u002Fbutton><button class=\"del\" data-action=\"del-tx\" data-id=\"${t.id}\">Delete<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;}).join(''):`<div style=\"text-align:center;padding:30px;color:var(--faint);font-size:13px\">No transactions in this cycle.<\u002Fdiv>`;\n  const more=txs.length>historyRenderLimit?`<button class=\"btn\" data-action=\"load-more-history\" style=\"background:#e9f4ee;color:var(--green-d);width:100%;border:none;border-top:1px solid #f3f5f1;padding:13px;border-radius:0\">Load 50 more<\u002Fbutton>`:'';\n  return `<div class=\"stack\" style=\"gap:14px\"><div class=\"row\" style=\"padding:0 2px\"><div style=\"display:flex;align-items:center;gap:9px;cursor:pointer\" data-action=\"tab\" data-tab=\"accounts\"><div class=\"navarrow\">‹<\u002Fdiv><span style=\"font-weight:600;font-size:15px;color:var(--ink)\">Transaction history<\u002Fspan><\u002Fdiv><\u002Fdiv>${cycleSwitcher()}<div style=\"font-size:11.5px;color:var(--muted);padding:0 2px;line-height:1.5\">${txs.length} transaction${txs.length===1?'':'s'} · deleting one instantly restores the affected balances and budget.<\u002Fdiv><input type=\"text\" id=\"hist-search\" class=\"seamless-input\" placeholder=\"Search history…\" style=\"margin-bottom:15px;background:#f8faf7;padding:8px 12px;border:1px solid #eef1ec;border-radius:8px;text-align:left;font-family:inherit;color:var(--ink)\"><div class=\"card\" style=\"padding:0;overflow:hidden\">${rows}${more}<\u002Fdiv><\u002Fdiv>`;\n}\n\n/* update budget tab numbers in place (keeps input focus) */\nfunction refreshBudgetNumbers(){\n  const cid=UI.viewCycle;if(UI.tab!=='budget'||!State.budgets[cid])return;\n  const setRem=(type,planned,actual)=>{const el=document.querySelector(`[data-rem=\"${type}\"]`);if(el){const r=planned-actual;el.textContent=(type==='Savings'?fmtShort(Math.max(0,r))+' to set aside':fmtShort(r)+' left');el.style.color=r<0?'var(--red)':'var(--green)';}};\n  const fixedP=groupItems(cid,'Fixed').reduce((s,b)=>s+(b.isDebt?plannedDebt(cid):b.planned),0);\n  setRem('Fixed',fixedP,groupItems(cid,'Fixed').reduce((s,b)=>s+(b.isDebt?debtPaidThisCycle(cid):spentForCategory(b.category,cid)),0));\n  setRem('Flexible',groupItems(cid,'Flexible').reduce((s,b)=>s+b.planned,0),groupItems(cid,'Flexible').reduce((s,b)=>s+spentForCategory(b.category,cid),0));\n  setRem('Non-Monthly',groupItems(cid,'Non-Monthly').reduce((s,b)=>s+b.planned,0),groupItems(cid,'Non-Monthly').reduce((s,b)=>s+spentForCategory(b.category,cid),0));\n  setRem('Savings',savingsPlannedTotal(cid),transfersToSavingsThisCycle(cid));\n  const tot=document.querySelector('[data-bt=\"total\"]');if(tot)tot.textContent=fmt(plannedTotal(cid));\n  const bar=document.querySelector('[data-bt=\"bar\"]');if(bar)bar.style.width=Math.min(100,Math.round(cycleSpent(cid)/(plannedTotal(cid)||1)*100))+'%';\n}\n\n/* ============================================================ MODALS ============================================================ */\n/* ---- amount input helpers: as-you-type grouping + parse ---- */\nfunction digitsOnly(s){return String(s==null?'':s).replace(/[^0-9.]/g,'');}\nfunction groupNum(s){s=digitsOnly(s);const dot=s.indexOf('.');if(dot>=0){const ip=s.slice(0,dot).replace(/[^0-9]/g,'');const dp=s.slice(dot+1).replace(/[^0-9]/g,'').slice(0,2);return (ip?parseInt(ip,10).toLocaleString('en-US'):'0')+'.'+dp;}const d=s.replace(/[^0-9]/g,'');return d?parseInt(d,10).toLocaleString('en-US'):'';}\nfunction parseAmt(s){return Math.round(parseFloat(String(s==null?'':s).replace(/,/g,''))||0);}\nconst FX_CURRENCIES=['SGD','THB','JPY','TWD','HKD','USD','EUR'];\nfunction formatAmtInput(el){const start=el.selectionStart||0;const sigBefore=el.value.slice(0,start).replace(/[^0-9.]/g,'').length;const formatted=groupNum(el.value);el.value=formatted;let pos=0,seen=0;while(pos<formatted.length&&seen<sigBefore){if(/[0-9.]/.test(formatted[pos]))seen++;pos++;}try{el.setSelectionRange(pos,pos);}catch(e){}}\nlet logDraft=null;\nfunction methodOptionsHTML(){const d=logDraft;const cash=State.accounts.map(a=>`<option value=\"${a.id}\" ${d.method===a.id?'selected':''}>${esc(a.name)}<\u002Foption>`).join('');if(d.type==='Income'||d.type==='Transfer')return cash;return cash+State.cards.map(c=>`<option value=\"${c.id}\" ${d.method===c.id?'selected':''}>${esc(c.name)} (credit)<\u002Foption>`).join('');}\nfunction openLog(){\n  const cid=currentCycleId();\n  let budgets=State.budgets[cid];\n  if(!budgets||!budgets.length){budgets=State.budgets[shiftCycle(cid,-1)]||defaultBudgetTemplate();}\n  budgets=budgets.filter(b=>!b.isDebt);\n  const catOptions=(budgets.length?budgets.map(b=>b.category):['Other']);\n  const chips=budgets.filter(b=>b.type==='Flexible').map(b=>b.category).slice(0,5);\n  const defCat=chips[0]||catOptions[0]||'Other';\n  logDraft={type:'Expense',category:defCat,method:'acc_vcb',toId:'acc_save',date:isoD(new Date()),amount:'',note:'',fx:false,split:false};\n  const cashOpts=State.accounts.map(a=>`<option value=\"${a.id}\">${esc(a.name)}<\u002Foption>`).join('');\n  const recv=State.accounts.filter(a=>a.type==='Receivable');\n  const recvOpts=recv.length?recv.map(a=>`<option value=\"${a.id}\">${esc(a.name)}<\u002Foption>`).join(''):`<option value=\"\" disabled selected>Create a Receivable account in Settings<\u002Foption>`;\n  const recentNames=State.accounts.filter(a=>a.type==='Receivable'&&Math.round(accountBalance(a))!==0).map(a=>a.name);\n  const html=`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv>\n    <div class=\"sheet\">\n      <div class=\"grip\"><\u002Fdiv>\n      <div class=\"row\" style=\"margin-bottom:15px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Quick log<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n      <div class=\"seg\" id=\"log-seg\" style=\"margin-bottom:15px\">${['Expense','Income','Transfer'].map(t=>`<div class=\"${t==='Expense'?'on':''}\" data-logtype=\"${t}\">${t}<\u002Fdiv>`).join('')}<\u002Fdiv>\n      <div style=\"text-align:center;margin-bottom:10px\"><input id=\"log-amt\" type=\"text\" inputmode=\"numeric\" placeholder=\"0\" class=\"mono amt-fmt\" style=\"border:none;text-align:center;font-weight:500;font-size:40px;color:var(--ink2);padding:0;width:100%\"><div id=\"log-amt-unit\" style=\"font-size:11px;color:var(--faint)\">VND<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-bottom:14px\"><button id=\"fx-toggle\" type=\"button\" data-action=\"toggle-fx\" class=\"chip\" style=\"display:inline-flex;align-items:center;gap:6px\">🌍 Foreign currency<\u002Fbutton><\u002Fdiv>\n      <div id=\"fx-box\" style=\"display:none;background:#f7f9f6;border:1px solid var(--line2);border-radius:13px;padding:13px;margin-bottom:15px\">\n        <div class=\"row\" style=\"gap:10px;margin-bottom:11px\">\n          <div style=\"flex:0 0 96px\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Currency<\u002Fdiv><select id=\"fx-currency\">${FX_CURRENCIES.map(c=>`<option value=\"${c}\" ${c==='SGD'?'selected':''}>${c}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n          <div style=\"flex:1;min-width:0\"><div class=\"row\" style=\"margin-bottom:5px\"><div class=\"lbl\" style=\"font-size:10px\">Rate · VND per 1 unit<\u002Fdiv><span id=\"fx-status\" style=\"font-size:9.5px;color:var(--faint)\"><\u002Fspan><\u002Fdiv><input id=\"fx-rate\" type=\"text\" inputmode=\"decimal\" class=\"mono amt-fmt\" placeholder=\"e.g. 25,400\" style=\"padding:10px 11px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">VND total <span style=\"color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0\">— adjust to match your statement<\u002Fspan><\u002Fdiv><input id=\"fx-vnd\" type=\"text\" inputmode=\"numeric\" class=\"mono amt-fmt\" placeholder=\"0\" style=\"padding:11px 12px;font-size:16px\"><\u002Fdiv>\n        <div id=\"fx-hint\" style=\"font-size:10.5px;color:var(--faint);margin-top:8px\">Pick a currency to fetch today’s rate.<\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"split-toggle-wrap\" style=\"display:flex;justify-content:center;margin-bottom:14px\"><button id=\"split-toggle\" type=\"button\" data-action=\"toggle-split\" class=\"chip\" style=\"display:inline-flex;align-items:center;gap:6px\">👥 Split bill / reimbursable<\u002Fbutton><\u002Fdiv>\n      <datalist id=\"recent-names\">${recentNames.map(n=>`<option value=\"${esc(n)}\"><\u002Foption>`).join('')}<\u002Fdatalist>\n      <div id=\"split-box\" style=\"display:none;background:#eef6fc;border:1px solid #d4e6f4;border-radius:13px;padding:13px;margin-bottom:15px\">\n        <div style=\"font-size:11px;line-height:1.5;color:#2b5c8f;margin-bottom:11px\">Log only your share as the expense. The rest is parked as money owed to you, so your budget &amp; Safe-to-Spend stay accurate.<\u002Fdiv>\n        <div class=\"row\" style=\"gap:10px;margin-bottom:11px\">\n          <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">My share (VND)<\u002Fdiv><input id=\"split-share\" type=\"text\" inputmode=\"numeric\" class=\"mono amt-fmt\" placeholder=\"0\" style=\"padding:10px 11px\"><\u002Fdiv>\n          <div style=\"flex:1;min-width:0\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Who owes? / note<\u002Fdiv><input id=\"split-who\" type=\"text\" list=\"recent-names\" placeholder=\"e.g. Minh, team lunch\" style=\"padding:10px 11px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Receivable account<\u002Fdiv><select id=\"split-acc\">${recvOpts}<\u002Fselect><\u002Fdiv>\n        <div id=\"split-hint\" style=\"font-size:10.5px;color:#2b5c8f;margin-top:8px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"log-cat-block\" style=\"margin-bottom:15px\">\n        <div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Category<\u002Fdiv>\n        <select id=\"log-category\" style=\"margin-bottom:8px;width:100%\">${catOptions.map(c=>`<option value=\"${esc(c)}\" ${c===defCat?'selected':''}>${esc(c)}<\u002Foption>`).join('')}<\u002Fselect>\n        <div id=\"log-chips\" style=\"display:flex;flex-wrap:wrap;gap:8px\">${chips.map(c=>`<div class=\"chip ${c===defCat?'on':''}\" data-logcat=\"${esc(c)}\">${esc(c)}<\u002Fdiv>`).join('')}<\u002Fdiv>\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:13px\"><input type=\"checkbox\" id=\"log-exclude\" style=\"width:auto\"> Exclude from Cycle Budget (for large deferred CC purchases)<\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"stack\" style=\"gap:11px;margin-bottom:16px\">\n        <div><div class=\"lbl\" id=\"log-from-lbl\" style=\"font-size:10px;margin-bottom:5px\">Paid from<\u002Fdiv><select id=\"log-method\">${methodOptionsHTML()}<\u002Fselect><\u002Fdiv>\n        <div id=\"log-to-row\" style=\"display:none\"><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">To account<\u002Fdiv><select id=\"log-to\">${cashOpts}<\u002Fselect><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Date<\u002Fdiv><input id=\"log-date\" type=\"date\" value=\"${logDraft.date}\"><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"font-size:10px;margin-bottom:5px\">Note<\u002Fdiv><input id=\"log-note\" type=\"text\" placeholder=\"Note (optional)\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"log-ccnote\" class=\"note\" style=\"display:none;margin-bottom:12px\">Paying by credit card raises that card\\u2019s debt — it won\\u2019t reduce your cash, but it counts against this cycle\\u2019s budget.<\u002Fdiv>\n      <button class=\"btn btn-pri\" data-action=\"submit-log\">Save<\u002Fbutton>\n    <\u002Fdiv>`;\n  showModal(html);\n  const amt=$('#log-amt');if(amt)setTimeout(()=>amt.focus(),30);\n}\nfunction applyLogType(t){\n  logDraft.type=t;\n  document.querySelectorAll('#log-seg>div').forEach(el=>el.classList.toggle('on',el.dataset.logtype===t));\n  const catBlock=$('#log-cat-block');if(catBlock)catBlock.style.display = t==='Expense'?'block':'none';\n  const swrap=$('#split-toggle-wrap');if(swrap)swrap.style.display=t==='Expense'?'flex':'none';\n  if(t!=='Expense'&&logDraft.split){logDraft.split=false;const sb=$('#split-box');if(sb)sb.style.display='none';const sbtn=$('#split-toggle');if(sbtn)sbtn.classList.remove('on');}\n  $('#log-to-row').style.display = t==='Transfer'?'block':'none';\n  $('#log-from-lbl').textContent = t==='Income'?'To account':(t==='Transfer'?'From account':'Paid from');\n  if((t!=='Expense')&&isCard(logDraft.method))logDraft.method=State.accounts[0].id;\n  $('#log-method').innerHTML=methodOptionsHTML();\n  updateCcNote();\n  const amt=$('#log-amt');if(amt)amt.focus();\n}\nfunction updateCcNote(){const show=logDraft.type==='Expense'&&isCard(logDraft.method);$('#log-ccnote').style.display=show?'block':'none';}\nfunction updateFx(){\n  if(!logDraft||!logDraft.fx)return;\n  const foreign=parseFloat(((($('#log-amt')||{}).value)||'').replace(/,/g,''))||0;\n  const rate=parseFloat(((($('#fx-rate')||{}).value)||'').replace(/,/g,''))||0;\n  const total=Math.round(foreign*rate);\n  const vnd=$('#fx-vnd');if(vnd)vnd.value=total?total.toLocaleString('en-US'):'';\n  const hint=$('#fx-hint');if(hint)hint.textContent=(foreign&&rate)?`${groupNum(String(foreign))} foreign × ${groupNum(String(rate))} = ${fmt(total)}`:'Enter a rate to convert.';\n  if(logDraft.split)updateSplit();\n}\nfunction toggleFx(){\n  if(!logDraft)return;logDraft.fx=!logDraft.fx;\n  const box=$('#fx-box'),btn=$('#fx-toggle'),unit=$('#log-amt-unit');\n  if(logDraft.fx){if(box)box.style.display='block';if(btn)btn.classList.add('on');if(unit)unit.textContent='Foreign amount';updateFx();const cur=$('#fx-currency');if(!($('#fx-rate')||{}).value)fetchFxRate();const amt=$('#log-amt');if(amt)setTimeout(()=>amt.focus(),30);}\n  else{if(box)box.style.display='none';if(btn)btn.classList.remove('on');if(unit)unit.textContent='VND';const amt=$('#log-amt');if(amt)amt.focus();}\n}\nfunction splitTotal(){return logDraft&&logDraft.fx?parseAmt(($('#fx-vnd')||{}).value):parseAmt(($('#log-amt')||{}).value);}\nfunction updateSplit(){\n  if(!logDraft||!logDraft.split)return;\n  const hint=$('#split-hint');if(!hint)return;\n  const total=splitTotal();const share=parseAmt(($('#split-share')||{}).value);\n  if(!total){hint.textContent='Enter the total bill in the amount above first.';hint.style.color='#2b5c8f';return;}\n  if(share>total){hint.textContent='Your share can’t exceed the total bill.';hint.style.color='var(--red)';return;}\n  hint.innerHTML=`You spend <b>${fmt(share)}<\u002Fb> · owed back to you <b>${fmt(Math.max(0,total-share))}<\u002Fb>`;hint.style.color='#2b5c8f';\n}\nfunction toggleSplit(){\n  if(!logDraft)return;logDraft.split=!logDraft.split;\n  const box=$('#split-box'),btn=$('#split-toggle');\n  if(logDraft.split){if(box)box.style.display='block';if(btn)btn.classList.add('on');updateSplit();const s=$('#split-share');if(s)setTimeout(()=>s.focus(),30);}\n  else{if(box)box.style.display='none';if(btn)btn.classList.remove('on');}\n}\nlet fxFetchSeq=0;\nasync function fetchFxRate(){\n  const sel=$('#fx-currency'),rate=$('#fx-rate'),status=$('#fx-status');if(!sel)return;\n  const code=(sel.value||'SGD').toLowerCase();\n  const seq=++fxFetchSeq;\n  if(status){status.textContent='Fetching rate…';status.style.color='var(--muted)';}\n  try{\n    const res=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/vnd.json');\n    if(!res.ok)throw new Error('http '+res.status);\n    const data=await res.json();\n    if(seq!==fxFetchSeq)return; // a newer request superseded this one\n    const per=data&&data.vnd&&data.vnd[code];\n    if(!per||!isFinite(per))throw new Error('no rate');\n    const vndPerUnit=Math.round((1/per)*100)/100;\n    if(rate)rate.value=groupNum(String(vndPerUnit));\n    if(status){status.textContent='Live rate';status.style.color='var(--green)';}\n    updateFx();\n  }catch(err){\n    if(seq!==fxFetchSeq)return;\n    if(rate)rate.value='';\n    if(status){status.textContent='Enter manually';status.style.color='var(--amber)';}\n    updateFx();\n    toast('Failed to fetch rate');\n  }\n}\nfunction submitLog(){\n  const d=logDraft;const n=d.fx?parseAmt(($('#fx-vnd')||{}).value):parseAmt(($('#log-amt')||{}).value);\n  if(!n){closeModal();return;}\n  const date=$('#log-date').value||isoD(new Date());const note=($('#log-note')||{}).value||'';\n  const cid=cycleIdOfDate(parseD(date));\n  const exclude=($('#log-exclude')||{}).checked||false;\n  if(d.type==='Expense'){\n    d.category=($('#log-category')||{}).value||d.category;\n    if(d.split){\n      if(isCard(d.method)){toast('Pay split bills from a cash or bank account');return;}\n      const share=parseAmt(($('#split-share')||{}).value);\n      if(share>n){toast('Your share can’t exceed the total');return;}\n      const recvAcc=($('#split-acc')||{}).value;\n      if(!recvAcc){toast('Add a Receivable account in Settings');return;}\n      const who=(($('#split-who')||{}).value||'').trim();\n      const owed=n-share;\n      if(share>0)State.transactions.unshift({id:uid('t'),date,cid,type:'expense',from:d.method,to:null,category:d.category,note,amount:share,exclude});\n      if(owed>0)State.transactions.unshift({id:uid('t'),date,cid,type:'transfer',from:d.method,to:recvAcc,category:'Transfer',note:`Split: ${who||'shared'}${note?' - '+note:''}`,amount:owed});\n      save();closeModal();render();toast('Split logged');return;\n    }\n    if(isCard(d.method))State.transactions.unshift({id:uid('t'),date,cid,type:'cc_charge',from:null,to:d.method,category:d.category,note,amount:n,exclude});\n    else State.transactions.unshift({id:uid('t'),date,cid,type:'expense',from:d.method,to:null,category:d.category,note,amount:n,exclude});\n  }else if(d.type==='Income'){\n    State.transactions.unshift({id:uid('t'),date,cid,type:'income',from:null,to:d.method,category:'Income',note,amount:n});\n  }else{\n    if(d.method===d.toId){toast('Pick two different accounts');return;}\n    State.transactions.unshift({id:uid('t'),date,cid,type:'transfer',from:d.method,to:d.toId,category:'Transfer',note,amount:n});\n  }\n  save();closeModal();render();toast('Logged');\n}\n\nlet reconcileId=null;\nfunction openEditAcc(id){\n  const a=State.accounts.find(x=>x.id===id);if(!a)return;\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:18px\"><span style=\"font-weight:600;font-size:16px;color:var(--ink)\">Edit account<\u002Fspan><div class=\"x\" data-action=\"close-modal\">×<\u002Fdiv><\u002Fdiv>\n    <div class=\"stack\" style=\"gap:14px;margin-bottom:20px\">\n      <div><div class=\"lbl\" style=\"margin-bottom:6px\">Account name<\u002Fdiv><input type=\"text\" class=\"seamless-text\" data-bind=\"acc\" data-id=\"${id}\" data-f=\"name\" value=\"${esc(a.name)}\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Type<\u002Fdiv><select data-bind=\"acc\" data-id=\"${id}\" data-f=\"type\">${ACC_TYPES.filter(t=>t!=='Receivable').map(t=>`<option ${a.type===t?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n        <div><div class=\"lbl\" style=\"margin-bottom:6px\">Start balance (VND)<\u002Fdiv><input type=\"text\" inputmode=\"numeric\" class=\"seamless-input amt-fmt\" data-bind=\"acc\" data-id=\"${id}\" data-f=\"start\" value=\"${groupNum(String(a.start))}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-pri\" data-action=\"close-modal\">Done<\u002Fbutton>\n    <button class=\"btn\" style=\"background:#fbe9e7;border:1px solid #f3cfc9;color:var(--red);width:100%;margin-top:10px\" data-action=\"del-acc\" data-id=\"${id}\">Remove account<\u002Fbutton>\n  <\u002Fdiv>`);\n}\nfunction openEditCard(id){\n  const c=State.cards.find(x=>x.id===id);if(!c)return;\n  const pctTxt=(+((c.minPayPct||0.05)*100)).toFixed(1);\n  showModal(`<div class=\"scrim\" data-action=\"close-modal\"><\u002Fdiv><div class=\"sheet\">\n    <div class=\"grip\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-bottom:18px\"><
